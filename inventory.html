<style>
* { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 14px; }
body { overflow-x: hidden; background: #f1f5f9; }

/* Sidebar */
.sidebar { width: 240px; min-width: 240px; background: #0f2744; }
.main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
/* Desktop: sidebar sticky, content scrolls */
@media (min-width: 769px) {
  #main-sidebar { position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; scrollbar-width: none; }
  #main-sidebar::-webkit-scrollbar { display: none; }
  #main-sidebar nav::-webkit-scrollbar { display: none; }
  #main-sidebar nav { scrollbar-width: none; }
  .main-content { height: 100vh; }
}
/* Sticky table headers — works inside .tbl-wrap scroll container */
.tbl-wrap { overflow: auto; max-height: calc(100vh - 200px); }
.tbl-wrap thead th { position: sticky; top: 0; z-index: 20; background: #f8fafc; box-shadow: 0 1px 0 #e2e8f0; }

/* Nav links */
.nav-link { transition: background 0.12s, color 0.12s; border-radius: 8px; }
.nav-link.active { background: #1e4080; color: #fff !important; }
.nav-link:not(.active):hover { background: rgba(255,255,255,0.08); }

/* Badges */
.badge-low { background:#fef3c7; color:#92400e; }
.badge-ok  { background:#d1fae5; color:#065f46; }
.badge-out { background:#fee2e2; color:#991b1b; }
.badge-pending  { background:#e0e7ff; color:#3730a3; }
.badge-approved { background:#d1fae5; color:#065f46; }
.badge-rejected { background:#fee2e2; color:#991b1b; }

/* Tables */
.table-sticky-last td:last-child,
.table-sticky-last th:last-child {
  position: sticky; right: 0; background: #fff; z-index: 1;
}
.table-sticky-last thead th:last-child { background: #f8fafc; }
table { table-layout: auto; }
th { white-space: nowrap; }

/* Animations */
.animate-spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.skeleton { background: linear-gradient(90deg,#e2e8f0,#f8fafc,#e2e8f0);
  background-size:200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Toast */
#toast-container { position:fixed; top:1rem; right:1rem; z-index:9999;
  display:flex; flex-direction:column; gap:.5rem; pointer-events:none; }
.toast-item { padding:.75rem 1.1rem; border-radius:10px; font-size:.9rem;
  font-weight:500; box-shadow:0 4px 16px rgba(0,0,0,.15); opacity:1;
  transition:opacity .4s; pointer-events:all; min-width:240px; }
.toast-success { background:#d1fae5; color:#065f46; border-left:4px solid #10b981; }
.toast-error   { background:#fee2e2; color:#991b1b; border-left:4px solid #ef4444; }
.toast-info    { background:#dbeafe; color:#1e40af; border-left:4px solid #3b82f6; }
.toast-warn    { background:#fef3c7; color:#92400e; border-left:4px solid #f59e0b; }

/* Modal */
#modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5);
  z-index:5000; align-items:center; justify-content:center; padding:1rem; }
#modal-overlay:not(.hidden) { display:flex; }
#modal-box { background:#fff; border-radius:14px; width:100%;
  max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); }

/* Mobile responsive */
@media (max-width: 768px) {
  input, select, textarea { font-size: 16px !important; }
  .sidebar { position:fixed; top:0; bottom:0; left:0; z-index:1000;
    transform:translateX(-100%); transition:transform .25s; overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .main-content { margin-left:0 !important; width:100% !important; }
  .hide-mobile { display:none !important; }
}
@media (min-width: 769px) {
  .show-mobile-only { display:none !important; }
  #mobile-nav { display:none !important; }
}

/* Bottom nav mobile */
#mobile-nav { position:fixed; bottom:0; left:0; right:0; z-index:900;
  background:#0f2744; border-top:1px solid rgba(255,255,255,.1);
  display:flex; align-items:stretch; }
#mobile-nav a { flex:1; display:flex; flex-direction:column;
  align-items:center; gap:1px; padding:8px 4px;
  color:rgba(255,255,255,.6); font-size:10px; text-decoration:none; transition:.15s; }
#mobile-nav a.active, #mobile-nav a:hover { color:#fff; }

/* ===== MOBILE UX IMPROVEMENTS ===== */
@media (max-width: 768px) {
  /* KPI cards: 2 คอลัมน์ */
  .kpi-card { padding:.9rem 1rem; }
  .kpi-card .kpi-val { font-size:1.2rem; }
  .kpi-card .kpi-label { font-size:.72rem; }

  /* Tables: scroll แนวนอน + font เล็กลง */

  .overflow-x-auto th, .overflow-x-auto td { padding:6px 8px; white-space:nowrap; }

  /* Sticky last column (จัดการ) */
  .table-sticky-last th:last-child,
  .table-sticky-last td:last-child {
    position:sticky; right:0;
    background:#fff;
    box-shadow:-2px 0 5px rgba(0,0,0,.06);
  }
  .table-sticky-last thead th:last-child { background:#f9fafb; }

  /* Forms: single column */
  form .grid { grid-template-columns:1fr !important; }
  form .col-span-2, form .col-span-3, form .col-span-4 { grid-column:span 1 !important; }

  /* Modal: full width bottom sheet */
  #modal-overlay { align-items:flex-end; padding:0; }
  #modal-box { border-radius:20px 20px 0 0; max-height:92vh; }

  /* Buttons: touch-friendly */

  /* Charts: shorter height */

  /* Page content bottom padding สำหรับ bottom nav */

  /* เพิ่ม gap ระหว่าง filter controls */
  .space-y-5 > .bg-white { padding:1rem; }
  .space-y-5 > .bg-white .grid { gap:.75rem; }

  /* Hide ข้อความยาวใน badge */
  .badge-pending, .badge-approved, .badge-rejected,
  .badge-ok, .badge-low, .badge-out { font-size:10px; }
}

/* ===== BADGE COLORS ===== */
.badge-pending  { background:#fef3c7; color:#92400e; }
.badge-approved { background:#d1fae5; color:#065f46; }
.badge-rejected { background:#fee2e2; color:#991b1b; }
.badge-ok       { background:#d1fae5; color:#065f46; }
.badge-low      { background:#fef3c7; color:#92400e; }

/* Print styles */
@media print {

@page { size: A4; margin: 10mm; }

/* Session timer */

/* KPI cards */

<script>
'use strict';
// =====================================================================
// SECTION 0: CONFIG & SUPABASE CLIENT
// =====================================================================
const SUPABASE_URL      = 'https://pcmpwkcmvsxrvbximjgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_RckQgaumQeIgaCICUc_6ZQ_T42qI2Nq';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SESSION_KEY    = '_sn_inv_sess';
const SESSION_SECS   = 7200; // 2 ชั่วโมง (ยกเว้น admin)
const FACTORIES = () => _invConfig.factories || [];

// =====================================================================
// SECTION 1: GLOBAL STATE (in-memory only — ห้ามใช้ localStorage สำหรับข้อมูล)
// =====================================================================
let currentUser          = null;
let currentPage          = 'landing';
let sessionTimerInterval = null;
let sessionSecondsLeft   = 0;
let sessionWarnShown     = false;
let chartRegistry        = {};
let _isSidebarOpen       = false;

// Master data cache
let _invConfig = { factories:[],
  categories : [],
  units      : [],
  locations  : [],
  departments: [],
};
let _invItems     = [];  // inventory_items (active)
let _stockMap     = {};  // item_id → current_quantity
let _lotsMap      = {};  // item_id → [{id,lot_no,received_date,remaining_qty,unit_cost}] (FIFO order)
let _suppliers    = [];  // inv_suppliers
let _pendingCount = 0;   // จำนวนรออนุมัติ (withdraw pending)

// =====================================================================
// SECTION 2: MENU DEFINITIONS
// =====================================================================
// prefix inv- ทั้งหมด
const INV_MENUS_MAIN = [
  { key:'inv-dashboard',  label:'ภาพรวมคลัง',    icon:'layout-dashboard' },
  { key:'inv-balance',    label:'วัสดุคงเหลือ',   icon:'package-search' },
  { key:'inv-qr',         label:'QR / Label',      icon:'qr-code' },
  { key:'inv-stock',      label:'รับวัสดุเข้า',   icon:'package-plus' },
  { key:'inv-withdraw',   label:'เบิกวัสดุ',       icon:'package-minus' },
  { key:'inv-approvals',  label:'รออนุมัติ',       icon:'clipboard-check', badge:true },
  { key:'inv-po',         label:'ใบสั่งซื้อ (PO)', icon:'file-text' },
  { key:'inv-chem',       label:'สารตกตะกอน',      icon:'flask-conical' },
  { key:'inv-report',     label:'รายงาน',           icon:'bar-chart-2' },
  { key:'inv-settings',   label:'ตั้งค่า',          icon:'settings' },
];

// สิทธิ์ default แต่ละ role (ถ้าไม่มี extra_manage override)
const ROLE_DEFAULT_MENUS = {
  admin      : INV_MENUS_MAIN.map(m=>m.key),
  manager    : ['inv-dashboard','inv-balance','inv-qr','inv-stock','inv-withdraw','inv-approvals','inv-po','inv-chem','inv-report'],
  user       : ['inv-dashboard','inv-balance','inv-qr','inv-withdraw','inv-chem'],
  management : ['inv-dashboard','inv-balance','inv-qr','inv-report'],
};

// =====================================================================
// SECTION 3: RBAC
// =====================================================================
function getAllowedInvMenus(user) {
  if (!user) return [];
  if (user.role === 'admin') return INV_MENUS_MAIN.map(m => m.key);

  // ตรวจ extra_manage ที่มี prefix 'inv-'
  const extra = (user._extraManage || []).filter(k => k.startsWith('inv-'));
  if (extra.length > 0) return extra;

  // fallback: role default
  return ROLE_DEFAULT_MENUS[user.role] || [];
}

function canAccess(menuKey) {
  return getAllowedInvMenus(currentUser).includes(menuKey);
}

function isAdmin()   { return currentUser && currentUser.role === 'admin'; }
function isManager() { return currentUser && (currentUser.role === 'admin' || currentUser.role === 'manager' || canAccess('inv-approvals')); }

// =====================================================================
// SECTION 4: UTILS
// =====================================================================
function fmtNum(n, dec = 0) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '0';
  return Number(n).toLocaleString('th-TH', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtMoney(n) { return fmtNum(n, 2); }
function fmtDate(d) {
  if (!d) return '-';
  try {
    const dt = new Date(d);
    const y = dt.getFullYear() + 543;
    const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][dt.getMonth()];
    return `${dt.getDate()} ${m} ${y}`;
  } catch { return String(d); }
}
function fmtDateTime(d) {
  if (!d) return '-';
  try {
    const dt = new Date(d);
    const y = dt.getFullYear() + 543;
    const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][dt.getMonth()];
    const hh = String(dt.getHours()).padStart(2,'0');
    const mm = String(dt.getMinutes()).padStart(2,'0');
    return `${dt.getDate()} ${m} ${y} ${hh}:${mm}`;
  } catch { return String(d); }
}
function pad2(n) { return String(n).padStart(2,'0'); }
function pad4(n) { return String(n).padStart(4,'0'); }
function todayISO() { return new Date().toISOString().slice(0,10); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function qs(sel, p) { return (p||document).querySelector(sel); }
function qsa(sel, p) { return Array.from((p||document).querySelectorAll(sel)); }

function destroyChart(key) {
  if (chartRegistry[key]) { try { chartRegistry[key].destroy(); } catch(_){} delete chartRegistry[key]; }
}
function refreshIcons() { if (window.lucide) lucide.createIcons(); }

// สร้าง Running Number: prefix + ปี พ.ศ. 2 หลัก + เดือน 2 หลัก + ลำดับ 4 หลัก
// เช่น SI6907001, SO6907001, PO6907001
function genRunNo(prefix, seq) {
  const now = new Date();
  const yy = String((now.getFullYear()+543) % 100).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  return `${prefix}${yy}${mm}${pad4(seq)}`;
}

// ดึงเลขลำดับถัดไปจาก inv_config (key = 'seq_SI'/'seq_SO'/'seq_PO')
async function nextSeq(seqKey) {
  const { data } = await db.from('inv_config').select('value').eq('key', seqKey).single();
  const next = data ? (Number(data.value) + 1) : 1;
  await db.from('inv_config').upsert({ key: seqKey, value: next });
  return next;
}

// แปลงตัวเลขเป็นตัวหนังสือภาษาไทย (สำหรับใบ PO)
function thaiNum(amount) {
  const ONES=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  const TENS=['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];
  const PLACES=['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];
  if (!amount || amount === 0) return 'ศูนย์บาทถ้วน';
  amount = Math.round(Number(amount) * 100) / 100;
  const [intPart, decPart] = String(amount.toFixed(2)).split('.');
  function readInt(n) {
    if (n === '0') return '';
    let r = '', digits = n.split('').reverse();
    for (let i = 0; i < digits.length; i++) {
      const d = Number(digits[i]);
      if (d === 0) continue;
      if (i === 0 && d === 1 && digits.length > 1) r = 'เอ็ด' + r;
      else if (i === 1 && d === 2) r = 'ยี่' + r;
      else if (i === 1 && d === 1) r = '' + r;
      else r = ONES[d] + (i > 0 ? PLACES[i % 7] : '') + r;
    }
    return r;
  }
  const intText = readInt(intPart) || 'ศูนย์';
  const decNum = Number(decPart);
  const decText = decNum > 0 ? readInt(String(decNum)) + 'สตางค์' : 'ถ้วน';
  return intText + 'บาท' + decText;
}

// Stock status
function stockStatus(item, qty) {
  qty = Number(qty) || 0;
  if (qty <= 0) return 'out';
  if (qty <= Number(item.min_stock || 0)) return 'low';
  return 'ok';
}
function stockBadgeHtml(item, qty) {
  const s = stockStatus(item, qty);
  const label = s === 'out' ? 'หมด' : s === 'low' ? 'ใกล้หมด' : 'ปกติ';
  return `<span class="badge-${s} px-2 py-0.5 rounded-full text-xs font-medium">${label}</span>`;
}

// =====================================================================
// SECTION 5: TOAST NOTIFICATION
// =====================================================================
function showToast(msg, type = 'info', ms = 3500) {
  const c = qs('#toast-container');
  if (!c) return;
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, ms);
}

// =====================================================================
// SECTION 6: MODAL DIALOG
// =====================================================================
function showModal({ title = '', body = '', footer = '', wide = false, onClose } = {}) {
  const overlay = qs('#modal-overlay');
  const box     = qs('#modal-box');
  qs('#modal-title').textContent = title;
  qs('#modal-body').innerHTML    = body;
  qs('#modal-footer').innerHTML  = footer;
  box.style.maxWidth = wide ? '900px' : '640px';
  overlay.classList.remove('hidden');
  overlay.style.display = 'flex';
  if (onClose) overlay._onClose = onClose;
  refreshIcons();
}
function closeModal() {
  const overlay = qs('#modal-overlay');
  overlay.classList.add('hidden');
  overlay.style.display = '';
  if (overlay._onClose) { overlay._onClose(); delete overlay._onClose; }
}
// ปิด modal เมื่อกดนอก box
qs('#modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// =====================================================================
// SECTION 7: AUTH — Custom Auth (query app_users ตรง, ไม่ใช้ Supabase Auth)
// =====================================================================
async function doLogin(username, password) {
  username = (username || '').trim().toLowerCase();
  if (!username || !password) return { error: 'กรุณากรอก Username และ Password' };

  const { data, error } = await db
    .from('app_users')
    .select('*')
    .eq('username', username)
    .eq('password', password)
    .maybeSingle();

  if (error || !data) return { error: 'Username หรือ Password ไม่ถูกต้อง' };
  if (data.status === 'pending')  return { error: 'บัญชีนี้รอการอนุมัติจากผู้ดูแลระบบ' };
  if (data.status === 'inactive') return { error: 'บัญชีนี้ถูกระงับการใช้งาน' };

  // ดึง extra_manage จาก user_permissions (override รายบุคคล)
  let extraManage = data.extra_manage || [];
  const { data: perm } = await db
    .from('user_permissions')
    .select('extra_manage')
    .eq('user_id', data.id)
    .maybeSingle();
  if (perm?.extra_manage?.length) extraManage = perm.extra_manage;

  // ถ้า role มี inv- ใน role_permissions ให้รวมด้วย
  const { data: rp } = await db
    .from('role_permissions')
    .select('extra_manage')
    .eq('role_name', data.role)
    .maybeSingle();
  if (rp?.extra_manage?.length) {
    const roleInv = rp.extra_manage.filter(k => k.startsWith('inv-'));
    extraManage = [...new Set([...extraManage, ...roleInv])];
  }

  currentUser = { ...data, _extraManage: extraManage };

  // บันทึก session ใน sessionStorage (เฉพาะ id กับ username เพื่อ restore)
  try {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
      id       : data.id,
      username : data.username,
      full_name: data.full_name,
      role     : data.role,
      _extraManage: extraManage,
    }));
  } catch(_) {}

  return { data: currentUser };
}

async function doLogout() {
  currentUser = null;
  _invItems   = [];
  _stockMap   = {};

// SECTION 7B: SESSION TIMER (2 ชั่วโมง, ยกเว้น admin)
// =====================================================================
function startSessionTimer() {
  stopSessionTimer();
  if (!currentUser || currentUser.role === 'admin') return;
  sessionSecondsLeft = SESSION_SECS;
  sessionWarnShown   = false;
  sessionTimerInterval = setInterval(() => {
    sessionSecondsLeft--;
    updateSessionBar();
    if (sessionSecondsLeft <= 300 && !sessionWarnShown) {
      sessionWarnShown = true;
      showToast('⚠️ Session จะหมดอายุในอีก 5 นาที', 'warn', 8000);
      const bar = qs('#session-bar');
      if (bar) bar.classList.add('warn');
    }
    if (sessionSecondsLeft <= 0) {
      stopSessionTimer();
      showToast('Session หมดอายุ — กรุณา Login ใหม่', 'error', 5000);
      setTimeout(doLogout, 1500);
    }
  }, 1000);
}

function stopSessionTimer() {
  if (sessionTimerInterval) { clearInterval(sessionTimerInterval); sessionTimerInterval = null; }
}

function updateSessionBar() {
  const bar = qs('#session-bar');
  if (!bar) return;
  if (!currentUser || currentUser.role === 'admin') { bar.textContent = ''; return; }
  const h = Math.floor(sessionSecondsLeft / 3600);
  const m = Math.floor((sessionSecondsLeft % 3600) / 60);
  const s = sessionSecondsLeft % 60;
  bar.textContent = h > 0
    ? `Session: ${h}:${pad2(m)}:${pad2(s)}`
    : `Session: ${pad2(m)}:${pad2(s)}`;
}

async function loadInvConfig() {

  if (data) {

      if (row.key === 'categories')  _invConfig.categories  = row.value || [];
      if (row.key === 'units')       _invConfig.units       = row.value || [];
      if (row.key === 'locations')   _invConfig.locations   = row.value || [];
      if (row.key === 'departments') _invConfig.departments = row.value || [];
      if (row.key === 'factories')   _invConfig.factories   = row.value || [];
    });

}

async function loadInvItems() {
  const { data } = await db
    .from('inventory_items')
    .select('*')
    .eq('status','active')
    .order('code');
  _invItems = data || [];
}

async function loadStockData() {
  const { data } = await db.from('inventory_stock').select('item_id,current_quantity');
  _stockMap = {};
  (data || []).forEach(r => { _stockMap[r.item_id] = Number(r.current_quantity) || 0; });
}

async function loadLots() {
  const { data } = await db.from('inventory_lots')
    .select('id,item_id,lot_no,received_date,initial_qty,remaining_qty,unit_cost,reference_no')
    .gt('remaining_qty', 0)
    .order('received_date', { ascending: true });
  _lotsMap = {};
  (data || []).forEach(l => {
    if (!_lotsMap[l.item_id]) _lotsMap[l.item_id] = [];
    _lotsMap[l.item_id].push(l);
  });
}

// คำนวณต้นทุน FIFO สำหรับเบิก qty หน่วย
function calcFifoCost(item_id, qty) {
  const lots = (_lotsMap[item_id] || []).filter(l => l.remaining_qty > 0);
  let remaining = qty, totalCost = 0;
  const breakdown = [];
  for (const lot of lots) {
    if (remaining <= 0) break;
    const use = Math.min(remaining, lot.remaining_qty);
    const cost = use * lot.unit_cost;
    breakdown.push({ lot_id: lot.id, lot_no: lot.lot_no, qty: use, unit_cost: lot.unit_cost, total: cost });
    totalCost += cost;
    remaining -= use;
  }
  return { breakdown, totalCost, shortage: remaining, avgCost: qty > 0 ? totalCost / (qty - remaining) : 0 };
}

// หมายเลข Lot อัตโนมัติ
function genLotNo(dateStr) {
  const d = dateStr ? dateStr.replace(/-/g,'') : todayISO().replace(/-/g,'');
  const r = Math.floor(Math.random()*900)+100;
  return 'LOT-' + d + '-' + r;
}

async function loadSuppliers() {
  const { data } = await db
    .from('inv_suppliers')
    .select('*')
    .eq('status','active')
    .order('name');
  _suppliers = data || [];
}

async function loadPendingCount() {
  const { count } = await db
    .from('inventory_transactions')
    .select('id', { count:'exact', head:true })
    .eq('status','pending');
  _pendingCount = count || 0;
  updatePendingBadge();
}

function updatePendingBadge() {
  qsa('.pending-badge').forEach(el => {
    el.textContent = _pendingCount > 0 ? String(_pendingCount) : '';
    el.classList.toggle('hidden', _pendingCount === 0);
  });

async function loadAllMasterData() {
  await Promise.all([loadInvConfig(), loadInvItems(), loadStockData(), loadSuppliers(), loadLots()]);
  if (canAccess('inv-approvals')) await loadPendingCount();
}

const PAGE_RENDERERS = {};  // registered by each section: PAGE_RENDERERS['inv-xxx'] = fn

async function navigateTo(page) {
  currentPage = page;
  // ปิด mobile sidebar drawer ทุกครั้งที่ navigate
  closeSidebar();

  if (page === 'landing') {
    renderLanding();
    return;
  }

  if (!currentUser) { renderLanding(); return; }
  if (page === 'no-access') { renderNoAccess(); return; }

  if (!canAccess(page) && page !== 'inv-profile') {
    renderNoAccess();
    return;
  }

  // Re-render shell (updates active state)
  renderShell();
  // ปิด sidebar อีกครั้งหลัง re-render (overlay อยู่นอก #app-root ต้องซ้ำ)
  closeSidebar();

  // Render page content
  const contentEl = qs('#page-content');
  if (!contentEl) return;
  contentEl.innerHTML = `
    <div class="flex items-center gap-2 p-8 text-gray-400">
      <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
      <span>กำลังโหลด...</span>
    </div>`;
  refreshIcons();

  if (PAGE_RENDERERS[page]) {
    await PAGE_RENDERERS[page](contentEl);
  } else {
    contentEl.innerHTML = `<div class="p-8 text-gray-400">ยังไม่ได้เปิดใช้งานเมนูนี้</div>`;

}

async function loadDashboard() {
  const range = qs('#dash-range')?.value || 'month';
  const factory = qs('#dash-factory')?.value || '';
  const now = new Date();
  let ds, de;
  if (range==='today') { ds=de=todayISO(); }
  else if (range==='week') { const d=new Date(now); d.setDate(d.getDate()-d.getDay()); ds=d.toISOString().slice(0,10); de=todayISO(); }
  else if (range==='custom') { ds=qs('#dash-start')?.value||todayISO(); de=qs('#dash-end')?.value||todayISO(); }
  else { ds=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10); de=todayISO(); }

  let q=db.from('inventory_transactions').select('id,transaction_type,quantity,unit_price,total_amount,factory,item_id,created_at').gte('created_at',ds).lte('created_at',de+'T23:59:59').eq('status','approved');
  if (factory) q=q.eq('factory',factory);
  const {data:txns}=await q;
  const rcv=(txns||[]).filter(t=>t.transaction_type==='receive');
  const wdw=(txns||[]).filter(t=>t.transaction_type==='withdraw');
  const tRcv=rcv.reduce((s,t)=>s+Number(t.quantity||0),0);
  const tWdw=wdw.reduce((s,t)=>s+Number(t.quantity||0),0);
  const tAmt=wdw.reduce((s,t)=>s+Number(t.total_amount||0),0);
  const low=_invItems.filter(i=>{const q=_stockMap[i.id]||0;return q>0&&q<=(i.min_stock||0);});
  const out=_invItems.filter(i=>(_stockMap[i.id]||0)<=0);

  const kEl=qs('#dash-kpi');
  if(kEl) kEl.innerHTML=[
    {l:'รายการวัสดุ',v:fmtNum(_invItems.length),c:'text-blue-600'},
    {l:'รับเข้า',v:fmtNum(tRcv),c:'text-green-600'},
    {l:'เบิกออก',v:fmtNum(tWdw),c:'text-orange-500'},
    {l:'มูลค่าเบิก (บาท)',v:fmtMoney(tAmt),c:'text-purple-600'},
    {l:'ใกล้หมด',v:fmtNum(low.length),c:'text-amber-500'},
    {l:'วัสดุหมด',v:fmtNum(out.length),c:'text-red-500'},
  ].map(k=>`<div class="kpi-card"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c} mt-1">${k.v}</div></div>`).join('');

  const lEl=qs('#dash-low');
  if(lEl) lEl.innerHTML=low.length?low.map(i=>`<div class="px-4 py-2 flex justify-between"><span>${escapeHtml(i.name)}</span><span class="text-amber-600 font-medium">${fmtNum(_stockMap[i.id]||0)} ${escapeHtml(i.unit)}</span></div>`).join(''):'<div class="px-4 py-3 text-gray-400 text-center">ไม่มีรายการ ✓</div>';
  const oEl=qs('#dash-out');
  if(oEl) oEl.innerHTML=out.length?out.map(i=>`<div class="px-4 py-2 flex justify-between"><span>${escapeHtml(i.name)}</span><span class="text-red-500 font-medium">หมด</span></div>`).join(''):'<div class="px-4 py-3 text-gray-400 text-center">ไม่มีรายการ ✓</div>';

  const topMap={};
  wdw.forEach(t=>{if(!topMap[t.item_id])topMap[t.item_id]={qty:0,amt:0};topMap[t.item_id].qty+=Number(t.quantity||0);topMap[t.item_id].amt+=Number(t.total_amount||0);});
  const topArr=Object.entries(topMap).sort((a,b)=>b[1].qty-a[1].qty).slice(0,10);
  const tb=qs('#dash-top-body');
  if(tb) tb.innerHTML=topArr.length?topArr.map(([id,v],i)=>{const it=_invItems.find(x=>x.id===id);return `<tr class="border-t"><td class="px-4 py-2 text-gray-400">${i+1}</td><td class="px-4 py-2">${escapeHtml(it?.name||id)}</td><td class="px-4 py-2 text-right font-medium">${fmtNum(v.qty)}</td><td class="px-4 py-2 text-right text-gray-600">${fmtMoney(v.amt)}</td></tr>`;}).join(''):'<tr><td colspan="4" class="px-4 py-6 text-center text-gray-400">ยังไม่มีข้อมูล</td></tr>';

  destroyChart('mvmt'); destroyChart('cat');
  const mvCtx=qs('#chart-movement');
  if(mvCtx){
    const days=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return d.toISOString().slice(0,10);});
    const rMap={},wMap={};days.forEach(d=>{rMap[d]=0;wMap[d]=0;});
    rcv.forEach(t=>{const d=(t.created_at||'').slice(0,10);if(rMap[d]!==undefined)rMap[d]+=Number(t.quantity||0);});
    wdw.forEach(t=>{const d=(t.created_at||'').slice(0,10);if(wMap[d]!==undefined)wMap[d]+=Number(t.quantity||0);});
    chartRegistry['mvmt']=new Chart(mvCtx,{type:'bar',data:{labels:days.map(d=>d.slice(5)),datasets:[{label:'รับเข้า',data:days.map(d=>rMap[d]),backgroundColor:'#22c55e60',borderRadius:3},{label:'เบิก',data:days.map(d=>wMap[d]),backgroundColor:'#f9731660',borderRadius:3}]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{x:{ticks:{font:{size:9}}}}}});
  }
  const catCtx=qs('#chart-category');
  if(catCtx){
    const cm={};wdw.forEach(t=>{const it=_invItems.find(x=>x.id===t.item_id);const c=it?.category||'อื่นๆ';cm[c]=(cm[c]||0)+Number(t.quantity||0);});
    const cats=Object.keys(cm);const vals=cats.map(c=>cm[c]);
    const colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316'];
    chartRegistry['cat']=new Chart(catCtx,{type:'doughnut',data:{labels:cats,datasets:[{data:vals,backgroundColor:colors.slice(0,cats.length),borderWidth:2}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
  }
  refreshIcons();
}

async function saveStockIn(e){

  const btn=qs('#si-btn');btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    const item_id=qs('#si-item')?.value,qty=parseFloat(qs('#si-qty')?.value||0),price=parseFloat(qs('#si-price')?.value||0);
    const supplier_id=qs('#si-supplier')?.value||null,factory=qs('#si-factory')?.value||null,note=qs('#si-note')?.value||null;

    const seq=await nextSeq('seq_SI');const doc_no=genRunNo('SI',seq);
    // บันทึก transaction
    const {error}=await db.from('inventory_transactions').insert({
      item_id,transaction_type:'receive',quantity:qty,
      unit_price:price,unit_cost:price,total_amount:qty*price,
      lot_no,supplier_id,factory,note,doc_no,
      status:'approved',created_by:currentUser.id,
      created_at:qs('#si-date').value+'T00:00:00'
    });
    if(error)throw error;
    // บันทึก Lot
    const {error:le}=await db.from('inventory_lots').insert({
      item_id,lot_no,
      received_date:qs('#si-date').value,
      initial_qty:qty,remaining_qty:qty,
      unit_cost:price,reference_no:doc_no
    });
    if(le)throw le;
    await Promise.all([loadStockData(),loadLots()]);

async function saveWithdraw(e){
  e.preventDefault();
  const btn=qs('#wo-btn');btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    const item_id=qs('#wo-item')?.value,qty=parseFloat(qs('#wo-qty')?.value||0);
    const o=qs('#wo-item')?.selectedOptions[0];const stock=_stockMap[item_id]||0;
    const factory=qs('#wo-factory')?.value||null,dept=qs('#wo-dept')?.value||null;
    const requester=qs('#wo-req')?.value||null,purpose=qs('#wo-purpose')?.value||null;
    if(!item_id||qty<=0){showToast('กรุณาเลือกวัสดุและระบุจำนวน','error');return;}
    if(!factory){showToast('กรุณาเลือกโรงงาน','error');return;}
    const apv=isManager();
    if(apv&&qty>stock){showToast('คลังเหลือ '+fmtNum(stock)+' — ไม่พอเบิก','error');return;}
    // คำนวณ FIFO cost
    const {breakdown,totalCost,shortage}=calcFifoCost(item_id,qty);
    if(apv&&shortage>0){showToast('Lot ในคลังไม่เพียงพอ กรุณารับวัสดุเข้าก่อน','error');return;}
    const avgUnit=qty>0&&totalCost>0?totalCost/(qty-shortage):0;
    const seq=await nextSeq('seq_SO');const doc_no=genRunNo('SO',seq);
    const {error}=await db.from('inventory_transactions').insert({
      item_id,transaction_type:'withdraw',quantity:qty,
      unit_cost:avgUnit||null,total_amount:totalCost||null,
      lot_breakdown:breakdown.length?breakdown:null,
      factory,department:dept,requested_by:requester,purpose,doc_no,
      status:apv?'approved':'pending',created_by:currentUser.id,
      created_at:qs('#wo-date').value+'T00:00:00'
    });
    if(error)throw error;
    // ถ้า approved → หัก Lot ทันที
    if(apv&&breakdown.length){
      for(const b of breakdown){
        // หักยอด remaining_qty
        const lot=(_lotsMap[item_id]||[]).find(l=>l.id===b.lot_id);
        if(lot){
          const newQty=Math.max(0,lot.remaining_qty-b.qty);

        }
      }
    }

    showToast(apv?'เบิกสำเร็จ — '+doc_no:'ส่งคำขอแล้ว — '+doc_no+' (รออนุมัติ)','success');

}

async function savePo(){
  const supplier_id=qs('#po-supplier')?.value;if(!supplier_id){showToast('กรุณาเลือกผู้จำหน่าย','error');return;}
  const lines=[];let ln=1;
  qs('#po-lines')?.querySelectorAll('[id^="poline-"]').forEach(row=>{
    const i=row.id.replace('poline-','');
    const qty=parseFloat(row.querySelector('[name^="qty_"]')?.value||0);
    if(qty>0)lines.push({line_no:ln++,item_id:row.querySelector('[name^="item_id_"]')?.value||null,item_detail:row.querySelector('[name^="detail_"]')?.value||null,quantity:qty,unit_price:parseFloat(row.querySelector('[name^="price_"]')?.value||0)||null});
  });
  if(!lines.length){showToast('กรุณาเพิ่มรายการอย่างน้อย 1 รายการ','error');return;}
  const seq=await nextSeq('seq_PO');const po_no=genRunNo('PO',seq);
  const {data:po,error}=await db.from('inventory_po').insert({po_no,supplier_id,po_date:qs('#po-date')?.value,expected_date:qs('#po-expect')?.value||null,factory:qs('#po-factory')?.value||null,credit_days:parseInt(qs('#po-credit')?.value||30),ship_by:qs('#po-ship')?.value||null,note:qs('#po-note')?.value||null,status:'open',created_by:currentUser.id}).select().single();
  if(error){showToast('เกิดข้อผิดพลาด: '+error.message,'error');return;}
  await db.from('inventory_po_items').insert(lines.map(l=>({...l,po_id:po.id})));
  closeModal();showToast('สร้าง PO สำเร็จ — '+po_no,'success');navigateTo('inv-po');
}

function chItemChange(){const o=qs('#ch-item')?.selectedOptions[0];if(qs('#ch-stock'))qs('#ch-stock').value=fmtNum(o?.dataset.stock||0);chCalc();}
function chCalc(){const o=qs('#ch-item')?.selectedOptions[0];const u=parseFloat(qs('#ch-used')?.value||0),w=parseFloat(o?.dataset.wpkg||0);if(qs('#ch-kg'))qs('#ch-kg').value=w>0?fmtNum(u*w,2)+' กก.':'-';}

async function saveChemUsage(e){
  e.preventDefault();
  const btn=qs('#ch-btn');btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    const item_id=qs('#ch-item')?.value,factory=qs('#ch-factory')?.value;
    const qty_used=parseFloat(qs('#ch-used')?.value||0),qty_purchase=parseFloat(qs('#ch-buy')?.value||0);
    const o=qs('#ch-item')?.selectedOptions[0];const wpkg=parseFloat(o?.dataset.wpkg||0);
    if(!item_id||!factory){showToast('กรุณาเลือกสารและโรงงาน','error');return;}
    if(qty_used<=0&&qty_purchase<=0){showToast('กรุณาระบุจำนวนที่ใช้หรือจัดซื้อ','error');return;}
    const kg_used=qty_used*wpkg||null;
    const {error}=await db.from('chem_daily_usage').insert({usage_date:qs('#ch-date').value,factory,item_id,qty_used,qty_purchase:qty_purchase||0,kg_used,note:qs('#ch-note')?.value||null,created_by:currentUser.id});
    if(error)throw error;
    await loadStockData();showToast('บันทึกสำเร็จ','success');qs('#chem-form')?.reset();qs('#ch-date').value=todayISO();navigateTo('inv-chem');
  }catch(err){showToast('เกิดข้อผิดพลาด: '+err.message,'error');}
  finally{btn.disabled=false;btn.textContent='บันทึก';}
}

async function loadChemSummary(){
  const {data}=await db.from('v_chem_monthly').select('*').order('month_date',{ascending:false}).limit(48);
  const el=qs('#chem-summary');if(!el)return;
  if(!data?.length){el.innerHTML='<tr><td colspan="7" class="text-center py-4 text-gray-400">ยังไม่มีข้อมูล</td></tr>';return;}
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  el.innerHTML=data.map(r=>{
    const d=new Date(r.month_date);const label=`${months[d.getMonth()]} ${d.getFullYear()+543}`;
    return `<tr class="border-t hover:bg-gray-50">
      <td class="px-3 py-2">${label}</td><td class="px-3 py-2">${escapeHtml(r.factory)}</td>
      <td class="px-3 py-2 text-sm">${escapeHtml(r.item_name)}</td>
      <td class="px-3 py-2 text-right">${fmtNum(r.total_qty_used,2)}</td>
      <td class="px-3 py-2 text-right">${r.total_kg_used?fmtNum(r.total_kg_used,1):'-'}</td>
      <td class="px-3 py-2 text-right">${r.production_ton?fmtNum(r.production_ton,1):'-'}</td>
      <td class="px-3 py-2 text-right font-medium ${r.rate_kg_per_ton?'text-teal-700':''}">${r.rate_kg_per_ton?fmtNum(r.rate_kg_per_ton,4):'-'}</td>

async function saveItem(){
  const id=qs('#it-id')?.value;const name=qs('#it-name')?.value?.trim();
  if(!name){showToast('กรุณาระบุชื่อวัสดุ','error');return;}
  let code=qs('#it-code')?.value?.trim();
  if(!code&&!id){const {data:_maxRow}=await db.from('inventory_items').select('code').order('code',{ascending:false}).limit(1);const _lastNum=_maxRow?.[0]?.code?parseInt(_maxRow[0].code.replace('ITM-',''))||0:0;code='ITM-'+pad4(_lastNum+1);}
  const payload={name,category:qs('#it-cat')?.value||null,unit:qs('#it-unit')?.value||null,unit_price:parseFloat(qs('#it-price')?.value)||null,min_stock:parseFloat(qs('#it-min')?.value)||0,location:qs('#it-loc')?.value||null,status:qs('#it-status')?.value||'active',description:qs('#it-desc')?.value||null};
  let error;
  if(id){({error}=await db.from('inventory_items').update(payload).eq('id',id));}
  else{({error}=await db.from('inventory_items').insert({...payload,code,created_by:currentUser.id}));}
  if(error){showToast('เกิดข้อผิดพลาด: '+error.message,'error');return;}
  await loadInvItems();
  if(!id) {
    // วัสดุใหม่ → หา item ที่เพิ่งบันทึก แล้วเด้ง QR modal
    const newItem = _invItems.find(i=>i.code===code) || _invItems[_invItems.length-1];
    closeModal();
    showToast('เพิ่มวัสดุสำเร็จ ✅','success');
    setTimeout(()=>{
      if(newItem) showQRModal(newItem);
    }, 300);
    if(currentPage==='inv-balance') renderBalanceTable();
    else if(currentPage==='inv-qr') renderQRGrid();
    else settingsTab('items');
  } else {
    closeModal();showToast('บันทึกสำเร็จ','success');
    if(currentPage==='inv-balance') renderBalanceTable();
    else if(currentPage==='inv-qr') renderQRGrid();
    else settingsTab('items');
  }
}

async function saveSup(){

async function addConfigItem(key){
  const label={factories:'โรงงาน',categories:'ประเภทวัสดุ',units:'หน่วยนับ',locations:'ที่เก็บ',departments:'ฝ่าย/กลุ่มงาน'}[key];
  const val=prompt('เพิ่ม '+label+':');if(!val?.trim())return;
  const cur=_invConfig[key]||[];if(cur.includes(val.trim())){showToast('มีรายการนี้อยู่แล้ว','warn');return;}
  const newArr=[...cur,val.trim()];
  const {error}=await db.from('inv_config').upsert({key,value:newArr});
  if(error){showToast('เกิดข้อผิดพลาด','error');return;}
  _invConfig[key]=newArr;showToast('เพิ่มสำเร็จ','success');settingsTab('config');
}

async function removeConfigItem(key,val){
  if(!confirm('ลบ "'+val+'" ออกจาก'+key+'?'))return;
  const newArr=(_invConfig[key]||[]).filter(v=>v!==val);
  const {error}=await db.from('inv_config').upsert({key,value:newArr});
  if(error){showToast('เกิดข้อผิดพลาด','error');return;}
  _invConfig[key]=newArr;showToast('ลบสำเร็จ','success');settingsTab('config');
}

function _extractFactory(item) {
  const match = (item.location||'').match(/\(([^)]+)\)/);
  if(match) return match[1];
  const fac = FACTORIES().find(f => (item.category||'').includes(f) || (item.name||'').startsWith(f));
  return fac || '-';
}

function renderBalanceTable() {
  const search = (qs('#bal-search')?.value||'').toLowerCase();
  const catFilter = qs('#bal-filter-cat')?.value||'';
  const facFilter = qs('#bal-filter-factory')?.value||'';
  const stFilter = qs('#bal-filter-status')?.value||'';

  let rows = _invItems.filter(i => {
    const qty = _stockMap[i.id]||0;
    const factory = _extractFactory(i);
    if(search && !i.code?.toLowerCase().includes(search) && !i.name?.toLowerCase().includes(search)) return false;
    if(catFilter && i.category !== catFilter) return false;
    if(facFilter && factory !== facFilter) return false;
    if(stFilter === 'out' && qty > 0) return false;
    if(stFilter === 'low' && !(qty > 0 && qty <= (i.min_stock||0))) return false;
    if(stFilter === 'ok' && qty <= (i.min_stock||0)) return false;
    return true;
  });

  const tbody = qs('#bal-tbody');
  if(!tbody) return;

  if(!rows.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="py-8 text-center text-gray-400">ไม่พบรายการ</td></tr>';
    if(qs('#bal-footer')) qs('#bal-footer').textContent = '';
    return;
  }

  tbody.innerHTML = rows.map((i, idx) => {
    const qty = _stockMap[i.id]||0;
    const factory = _extractFactory(i);
    const isOut = qty <= 0;
    const isLow = qty > 0 && qty <= (i.min_stock||0);
    const statusBadge = isOut
      ? '<span class="badge-out px-2 py-0.5 rounded-full text-xs">หมด</span>'
      : isLow
        ? '<span class="badge-low px-2 py-0.5 rounded-full text-xs">ใกล้หมด</span>'
        : '<span class="badge-ok px-2 py-0.5 rounded-full text-xs">ใช้งาน</span>';
    const rowBg = isOut ? 'bg-red-50' : isLow ? 'bg-amber-50' : '';
    const itemJson = JSON.stringify(i).replace(/'/g,"&#39;");
    return `<tr class="border-t hover:bg-gray-50 ${rowBg}">
      <td class="px-3 py-2 text-center text-gray-400 text-xs">${idx+1}</td>
      <td class="px-3 py-2 font-mono text-xs text-blue-700">${escapeHtml(i.code)}</td>
      <td class="px-3 py-2 text-xs text-gray-500 hide-mobile">${escapeHtml(factory)}</td>
      <td class="px-3 py-2 text-xs text-gray-500 hide-mobile">${escapeHtml(i.category||'-')}</td>
      <td class="px-3 py-2 font-medium">${escapeHtml(i.name)}</td>
      <td class="px-3 py-2 text-right font-semibold ${isOut?'text-red-600':isLow?'text-amber-600':'text-gray-800'}">${fmtNum(qty)}</td>
      <td class="px-3 py-2 text-xs text-gray-500 hide-mobile">${escapeHtml(i.unit||'-')}</td>
      <td class="px-3 py-2 text-right text-xs hide-mobile">${i.unit_price?fmtMoney(i.unit_price):'-'}</td>
      <td class="px-3 py-2 text-right text-xs text-gray-400 hide-mobile">${fmtNum(i.min_stock||0)}</td>
      <td class="px-3 py-2 text-center">${statusBadge}</td>
      <td class="px-3 py-2 text-center sticky right-0 bg-white">
        <div class="flex items-center justify-center gap-1">
          <button onclick='showQRModal(${itemJson})' title="QR/Barcode" class="px-2 py-1 text-xs border border-indigo-200 text-indigo-600 rounded hover:bg-indigo-50">QR</button>
          <button onclick='openItemModal(${itemJson})' class="px-2 py-1 text-xs border border-blue-200 text-blue-600 rounded hover:bg-blue-50">แก้ไข</button>
          <button onclick="deleteInvItem('${i.id}')" class="px-2 py-1 text-xs border border-red-200 text-red-500 rounded hover:bg-red-50">ลบ</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  if(qs('#bal-footer')) qs('#bal-footer').textContent = `แสดง ${rows.length} จาก ${_invItems.length} รายการ`;
}

async function deleteInvItem(id) {
  const item = _invItems.find(i => i.id === id);
  const nm = item ? `"${item.name}"` : 'วัสดุนี้';
  if(!confirm(`ยืนยันปิดการใช้งาน ${nm}?\nวัสดุจะไม่แสดงในระบบ แต่ประวัติการเคลื่อนไหวยังคงอยู่`)) return;

function printQRLabel(code, name) {
  const qrEl = document.getElementById('qr-container');
  const bcEl = document.getElementById('barcode-svg');
  const qrHtml = qrEl ? qrEl.innerHTML : '';
  const bcHtml = bcEl ? bcEl.outerHTML : '';

  if(!w) { showToast('กรุณาอนุญาต Popup เพื่อพิมพ์','warn'); return; }
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Label</title>
  <style>body{font-family:sans-serif;text-align:center;padding:24px;margin:0;}
  h3{font-size:15px;margin:0 0 4px;} .code{font-size:11px;color:#555;margin:0 0 12px;font-family:monospace;}

}

let _html5Scanner = null;
let _scanTarget = '';

let _scanCallback = null;

function openScanner(callbackOrSelectId) {
  // รองรับทั้ง callback function และ string selectId (legacy)
  if(typeof callbackOrSelectId === 'function') {
    _scanCallback = callbackOrSelectId;
  } else {
    _scanTarget = callbackOrSelectId;
    _scanCallback = (item) => {
      const sel = qs('#' + _scanTarget);
      if(sel) { sel.value = item.id; sel.dispatchEvent(new Event('change')); }
      showToast('✅ พบวัสดุ: ' + item.name, 'success');
    };
  }
  showModal({
    title: '📷 สแกน QR / Barcode',
    body: `
    <div class="space-y-3">
      <p class="text-sm text-gray-500 text-center">จ่อกล้องไปที่ QR Code หรือ Barcode ของวัสดุ</p>
      <div id="qr-scanner-view" style="width:100%;max-width:360px;margin:0 auto;border-radius:12px;overflow:hidden;min-height:200px;background:#000;"></div>
      <div id="scan-msg" class="text-center text-sm font-medium" style="min-height:20px;"></div>
    </div>`,
    footer: `<button onclick="stopScanner()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm">❌ ยกเลิก</button>`
  });
  setTimeout(() => {
    if(typeof Html5Qrcode === 'undefined') {
      showToast('ไม่พบ library scanner','error'); return;
    }
    _html5Scanner = new Html5Qrcode('qr-scanner-view');
    _html5Scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.0 },
      (text) => onScanResult(text),
      () => {}
    ).catch(() => {
      const msg = qs('#scan-msg');
      if(msg) { msg.textContent = '⚠️ ไม่สามารถเปิดกล้องได้ — ตรวจสอบการอนุญาตกล้องในเบราว์เซอร์'; msg.style.color='#ef4444'; }
    });
  }, 250);
}

function stopScanner() {
  if(_html5Scanner) {
    _html5Scanner.stop().catch(()=>{}).finally(()=>{ _html5Scanner = null; });
  }
  closeModal();
}

function onScanResult(scannedCode) {
  const code = (scannedCode || '').trim();
  const item = _invItems.find(i => i.code === code);
  if(!item) {
    const msg = qs('#scan-msg');
    if(msg) { msg.textContent = `⚠️ ไม่พบวัสดุรหัส "${code}"`; msg.style.color='#f59e0b'; }
    return;
  }
  stopScanner();
  if(_scanCallback) _scanCallback(item);
  _scanCallback = null;
}

function showStockCheckModal(item) {
  const qty = _stockMap[item.id] || 0;
  const min = item.min_stock || 0;
  const isOut = qty <= 0;
  const isLow = qty > 0 && qty <= min;
  const statusColor = isOut ? '#ef4444' : isLow ? '#f59e0b' : '#10b981';
  const statusLabel = isOut ? '🔴 หมดสต็อก' : isLow ? '🟡 ใกล้หมด' : '🟢 ปกติ';
  const shouldOrder = qty <= min;
  const orderQty = shouldOrder ? Math.max(min * 2 - qty, min) : 0;

  showModal({

    body: `

        <p class="text-xs text-gray-500 mt-1">${escapeHtml(item.category||'')}${item.location?' · '+escapeHtml(item.location):''}</p>
      </div>

      <div class="grid grid-cols-3 gap-3 text-center">
        <div class="bg-white border border-gray-100 rounded-xl p-3">
          <p class="text-2xl font-bold" style="color:${statusColor}">${fmtNum(qty)}</p>
          <p class="text-xs text-gray-400 mt-0.5">${escapeHtml(item.unit||'หน่วย')} คงเหลือ</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-3">
          <p class="text-2xl font-bold text-gray-500">${fmtNum(min)}</p>
          <p class="text-xs text-gray-400 mt-0.5">ขั้นต่ำ</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-3">
          <p class="text-sm font-semibold mt-1">${statusLabel}</p>
          <p class="text-xs text-gray-400 mt-0.5">สถานะ</p>
        </div>
      </div>

      ${shouldOrder ? `
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm text-amber-700">
        ⚠️ <b>ควรสั่งซื้อเพิ่ม</b> — แนะนำสั่งซื้ออย่างน้อย <b>${fmtNum(orderQty)} ${escapeHtml(item.unit||'หน่วย')}</b>
        ${item.unit_price ? `<br><span class="text-xs">ประมาณการมูลค่า: ${fmtMoney(orderQty * item.unit_price)} บาท</span>` : ''}
      </div>` : `
      <div class="bg-green-50 border border-green-200 rounded-xl p-3 text-sm text-green-700">
        ✅ สต็อกเพียงพอ ยังไม่ต้องสั่งซื้อเพิ่ม
      </div>`}

      ${((_lotsMap[item.id]||[]).filter(l=>l.remaining_qty>0).length>0) ? `

        <p class="text-xs font-semibold text-gray-500 mb-2">📦 Lot ในคลัง (FIFO)</p>
        <div class="space-y-1">
          ${(_lotsMap[item.id]||[]).filter(l=>l.remaining_qty>0).map((l,i)=>`
          <div class="flex justify-between text-xs ${i===0?'text-blue-700 font-medium':'text-gray-600'}">
            <span class="font-mono">${escapeHtml(l.lot_no)}</span>
            <span>${fmtDate(l.received_date)}</span>
            <span>${fmtNum(l.remaining_qty)} ${escapeHtml(item.unit||'')}</span>
            <span class="text-green-700">${fmtNum(l.unit_cost,2)} บ./หน่วย</span>
          </div>`).join('')}
        </div>
        <p class="text-xs text-gray-400 mt-1.5">* สีน้ำเงิน = Lot ที่จะถูกเบิกก่อน (FIFO)</p>

    </div>`,
    footer: `
      <button onclick="closeModal();openStockInModal(${JSON.stringify(item).replace(/"/g,'&quot;')})" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">+ รับเข้า</button>
      <button onclick="closeModal();openWithdrawModal(${JSON.stringify(item).replace(/"/g,'&quot;')})" class="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm hover:bg-orange-600">เบิก</button>
      <button onclick="closeModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm">ปิด</button>`
  });
}

  const cats = [...new Set(_invItems.map(i=>i.category).filter(Boolean))].sort();
  const facOpts = FACTORIES().map(f=>`<option value="${escapeHtml(f)}">${escapeHtml(f)}</option>`).join('');
  el.innerHTML = `
  <div class="space-y-4 no-print">
    <div class="bg-white rounded-2xl shadow-sm p-4 flex flex-wrap items-center justify-between gap-3">
      <div>
        <h2 class="text-base font-semibold text-gray-700">QR Code & Barcode Label</h2>
        <p class="text-xs text-gray-400 mt-0.5">พิมพ์ label ติดบนชิ้นงานเพื่อสแกนเข้าระบบ</p>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="selectAllQR(true)" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-600 hover:bg-gray-50">เลือกทั้งหมด</button>
        <button onclick="selectAllQR(false)" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-600 hover:bg-gray-50">ยกเลิกทั้งหมด</button>
        <button onclick="printSelectedLabels()" class="flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white rounded-xl text-sm hover:bg-blue-700">
          <i data-lucide="printer" class="w-4 h-4"></i> พิมพ์ที่เลือก (PDF)
        </button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-4 qr-controls">
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <input id="qr-search" type="text" placeholder="ค้นหาชื่อ/รหัส..." oninput="renderQRGrid()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm col-span-2 sm:col-span-1"/>
        <select id="qr-cat" onchange="renderQRGrid()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option value="">ทุกประเภท</option>
          ${cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}
        </select>
        <select id="qr-factory" onchange="renderQRGrid()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option value="">ทุกโรงงาน</option>
          ${facOpts}
        </select>
        <select id="qr-size" onchange="renderQRGrid()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option value="sm">QR เล็ก (50px)</option>
          <option value="md" selected>QR กลาง (70px)</option>
          <option value="lg">QR ใหญ่ (90px)</option>
        </select>
        <select id="qr-filter-new" onchange="renderQRGrid()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option value="">ทุกรายการ</option>
          <option value="7">เพิ่มใน 7 วัน</option>
          <option value="30">เพิ่มใน 30 วัน</option>
        </select>
        <select id="qr-sort" onchange="renderQRGrid()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
          <option value="new">เรียงใหม่สุดก่อน</option>
          <option value="code">เรียงตามรหัส</option>
          <option value="name">เรียงตามชื่อ</option>
        </select>
      </div>
      <p id="qr-count" class="text-xs text-gray-400 mt-2"></p>
    </div>
  </div>
  <div id="qr-label-sheet" class="mt-4"></div>`;
  refreshIcons();
  renderQRGrid();
};

function renderQRGrid() {
  const search = (qs('#qr-search')?.value||'').toLowerCase();
  const cat = qs('#qr-cat')?.value||'';
  const factory = qs('#qr-factory')?.value||'';
  const size = qs('#qr-size')?.value||'md';
  const filterNew = parseInt(qs('#qr-filter-new')?.value||'0');
  const sort = qs('#qr-sort')?.value||'new';
  const qrSize = size==='sm'?50 : size==='lg'?90 : 70;
  const bcWidth = size==='sm'?1.0 : size==='lg'?1.8 : 1.4;
  const bcHeight = size==='sm'?28 : size==='lg'?50 : 38;
  const now = new Date();

  let items = _invItems.filter(i => {
    if(search && !i.code?.toLowerCase().includes(search) && !i.name?.toLowerCase().includes(search)) return false;
    if(cat && i.category !== cat) return false;
    if(factory && !i.location?.includes('('+factory+')') && !i.location?.includes(factory)) return false;
    if(filterNew) {
      const daysDiff = (now - new Date(i.created_at||0)) / 86400000;
      if(daysDiff > filterNew) return false;
    }
    return true;
  });

  if(sort==='new') items.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
  else if(sort==='code') items.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
  else if(sort==='name') items.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  const el = qs('#qr-label-sheet');
  if(!el) return;
  if(qs('#qr-count')) qs('#qr-count').textContent = `แสดง ${items.length} รายการ`;

  if(!items.length) {
    el.innerHTML = '<div class="bg-white rounded-2xl p-8 text-center text-gray-400 text-sm">ไม่พบรายการ</div>';
    return;
  }

  el.innerHTML = `<div class="bg-white rounded-2xl shadow-sm overflow-x-auto">
    <table class="w-full text-sm" id="qr-table">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-200">
          <th class="py-2.5 px-3 text-left text-xs text-gray-500 font-semibold w-10">#</th>
          <th class="py-2.5 px-3 text-left text-xs text-gray-500 font-semibold">รหัสวัสดุ</th>
          <th class="py-2.5 px-3 text-left text-xs text-gray-500 font-semibold">ชื่อวัสดุ</th>
          <th class="py-2.5 px-3 text-left text-xs text-gray-500 font-semibold">โรงงาน</th>
          <th class="py-2.5 px-3 text-center text-xs text-gray-500 font-semibold">QR Code</th>
          <th class="py-2.5 px-3 text-center text-xs text-gray-500 font-semibold">Barcode</th>
          <th class="py-2.5 px-3 text-center text-xs text-gray-500 font-semibold w-10">
            <input type="checkbox" class="w-4 h-4 accent-blue-600" title="เลือกทั้งหมด"
              onchange="selectAllQR(this.checked)">
          </th>
        </tr>
      </thead>
      <tbody>
        ${items.map((i, idx) => `
        <tr id="qlc-${i.id}" class="border-b border-gray-100 hover:bg-blue-50 cursor-pointer transition-colors"
            onclick="toggleQRSelect('${i.id}')">
          <td class="py-2 px-3 text-xs text-gray-400 tabular-nums">${idx+1}</td>
          <td class="py-2 px-3">
            <span class="font-mono text-xs text-blue-700 font-semibold">${escapeHtml(i.code)}</span>
            ${(new Date()-new Date(i.created_at||0))/86400000<7?'<span class="ml-1 text-xs bg-green-100 text-green-700 px-1 py-0.5 rounded-full">ใหม่</span>':''}
          </td>
          <td class="py-2 px-3 text-xs text-gray-700 max-w-[180px]">${escapeHtml(i.name)}</td>
          <td class="py-2 px-3 text-xs text-gray-500">${escapeHtml(i.location||'-')}</td>
          <td class="py-2 px-3 text-center"><div id="qr-${i.id}" class="inline-block"></div></td>
          <td class="py-2 px-3 text-center" style="min-width:120px"><svg id="bc-${i.id}"></svg></td>
          <td class="py-2 px-3 text-center" onclick="event.stopPropagation()">
            <input type="checkbox" class="qr-chk w-4 h-4 accent-blue-600" id="qchk-${i.id}"
              onchange="toggleQRSelect('${i.id}',this.checked)">
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  // generate QR + Barcode หลัง DOM render
  requestAnimationFrame(() => {
    items.forEach(i => {
      try {
        const qrEl = qs(`#qr-${i.id}`);
        if(qrEl && typeof QRCode !== 'undefined')
          new QRCode(qrEl, { text: i.code, width: qrSize, height: qrSize, correctLevel: QRCode.CorrectLevel.M });
        const bcEl = qs(`#bc-${i.id}`);
        if(bcEl && typeof JsBarcode !== 'undefined')
          JsBarcode(bcEl, i.code, { format:'CODE128', width:bcWidth, height:bcHeight, displayValue:true, fontSize:9, fontOptions:'bold', margin:3 });
      } catch(e) {}
    });
  });
}

function toggleQRSelect(id, force) {
  const row = qs(`#qlc-${id}`);
  const chk = qs(`#qchk-${id}`);
  if(!row) return;
  const selected = force !== undefined ? force : !chk?.checked;
  if(chk) chk.checked = selected;
  row.style.background = selected ? '#eff6ff' : '';
  row.style.outline = selected ? '2px solid #3b82f6' : '';
}

function selectAllQR(val) {
  _invItems.forEach(i => toggleQRSelect(i.id, val));
}

function printSelectedLabels() {
  const selected = _invItems.filter(i => qs(`#qchk-${i.id}`)?.checked);
  if(!selected.length) { showToast('กรุณาเลือก Label ที่ต้องการพิมพ์','warn'); return; }

  const rows = selected.map((i, idx) => {
    const qrEl = qs(`#qr-${i.id}`);
    const bcEl = qs(`#bc-${i.id}`);
    const qrImg = qrEl ? qrEl.innerHTML : '';
    const bcSvg = bcEl ? bcEl.outerHTML : '';
    const location = escapeHtml(i.location || '-');
    const category = escapeHtml(i.category || '-');
    return `<tr>
      <td class="num">${idx+1}</td>
      <td class="code">${escapeHtml(i.code)}</td>
      <td class="name">${escapeHtml(i.name)}</td>
      <td class="cat">${category}</td>
      <td class="loc">${location}</td>
      <td class="qr-cell"><div class="qr-wrap">${qrImg}</div></td>
      <td class="bc-cell">${bcSvg}</td>
    </tr>`;
  }).join('');

  const w = window.open('', '_blank', 'width=1000,height=800');
  if(!w) { showToast('กรุณาอนุญาต Popup เพื่อพิมพ์','warn'); return; }
  w.document.write(`<!DOCTYPE html><html><head>
  <meta charset="UTF-8"><title>QR / Label — บริษัท สานนท์ จำกัด</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Arial',sans-serif;background:#fff;padding:8mm;font-size:9pt;}
    h2{font-size:12pt;font-weight:700;margin-bottom:2mm;}
    .sub{font-size:8pt;color:#555;margin-bottom:4mm;}
    table{width:100%;border-collapse:collapse;}
    th{background:#1e3a5f;color:#fff;font-size:8pt;padding:3mm 2mm;text-align:center;border:1px solid #ccc;}
    td{border:1px solid #ccc;padding:2mm;vertical-align:middle;font-size:8pt;}
    td.num{text-align:center;width:8mm;color:#666;}
    td.code{font-family:monospace;font-weight:700;color:#1d4ed8;text-align:center;white-space:nowrap;}
    td.name{max-width:45mm;}
    td.cat{text-align:center;white-space:nowrap;color:#6d28d9;font-size:7.5pt;}
    td.loc{text-align:center;white-space:nowrap;color:#374151;}
    td.qr-cell{text-align:center;width:22mm;}
    td.bc-cell{text-align:center;width:40mm;}
    .qr-wrap img,.qr-wrap canvas{width:18mm!important;height:18mm!important;}
    svg{width:36mm;height:12mm;}
    tr{break-inside:avoid;page-break-inside:avoid;}
    @page{size:A4;margin:10mm;}
    @media print{body{padding:0;}}
  </style></head><body>
  <h2>QR Code & Barcode Label — บริษัท สานนท์ จำกัด</h2>
  <div class="sub">พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')} · จำนวน ${selected.length} รายการ</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>รหัสวัสดุ</th>
        <th>ชื่อวัสดุ</th>
        <th>ประเภท</th>
        <th>โรงงาน</th>
        <th>QR Code</th>
        <th>Barcode</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  w.document.close();
}
