<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0" />
<title>PM เครื่องจักร — สานนท์ จำกัด</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{font-family:'Kanit',sans-serif;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:14px;}
body{overflow-x:hidden;background:#f1f5f9;}

/* Sidebar */
.sidebar{width:240px;min-width:240px;background:#1a2e4a;}
.main-content{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
@media(min-width:769px){
  #main-sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;scrollbar-width:none;}
  #main-sidebar::-webkit-scrollbar{display:none;}
  .main-content{height:100vh;}
}
.tbl-wrap{overflow:auto;max-height:calc(100vh - 200px);}
.tbl-wrap thead th{position:sticky;top:0;z-index:20;background:#f8fafc;box-shadow:0 1px 0 #e2e8f0;}

/* Nav */
.nav-link{transition:background .12s,color .12s;border-radius:8px;}
.nav-link.active{background:#2d5a9b;color:#fff!important;}
.nav-link:not(.active):hover{background:rgba(255,255,255,.08);}

/* Status badges */
.badge-overdue {background:#fee2e2;color:#991b1b;}
.badge-alert   {background:#fef3c7;color:#92400e;}
.badge-ok      {background:#d1fae5;color:#065f46;}
.badge-pending {background:#e0e7ff;color:#3730a3;}
.badge-done    {background:#d1fae5;color:#065f46;}

/* PM row colors */
tr.pm-overdue td{background:#fff0f0!important;}
tr.pm-alert   td{background:#fffbeb!important;}
tr.pm-ok      td{background:#f0fdf4!important;}

/* Toast */
#toast-container{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
.toast-item{padding:.75rem 1.1rem;border-radius:10px;font-size:.9rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);opacity:1;transition:opacity .4s;pointer-events:all;min-width:240px;}
.toast-success{background:#d1fae5;color:#065f46;border-left:4px solid #10b981;}
.toast-error  {background:#fee2e2;color:#991b1b;border-left:4px solid #ef4444;}
.toast-info   {background:#dbeafe;color:#1e40af;border-left:4px solid #3b82f6;}
.toast-warn   {background:#fef3c7;color:#92400e;border-left:4px solid #f59e0b;}

/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;align-items:center;justify-content:center;padding:1rem;}
#modal-overlay:not(.hidden){display:flex;}
#modal-box{background:#fff;border-radius:14px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}

/* Animations */
.animate-spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* KPI */
.kpi-card{background:#fff;border-radius:14px;padding:1.2rem 1.4rem;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.kpi-val{font-size:1.8rem;font-weight:700;line-height:1;}
.kpi-label{font-size:.82rem;color:#64748b;margin-top:.2rem;}

/* Tables */
table{border-collapse:collapse;width:100%;}
th{white-space:nowrap;}
tbody tr:hover{background:#f8fafc;}
.table-sticky-last td:last-child,.table-sticky-last th:last-child{position:sticky;right:0;background:#fff;z-index:1;}
.table-sticky-last thead th:last-child{background:#f8fafc;}

/* Progress ring */
.ring-overdue{color:#ef4444;}
.ring-alert  {color:#f59e0b;}
.ring-ok     {color:#10b981;}

/* Session bar */
#session-bar{font-size:12px;}
#session-bar.warn{color:#f59e0b!important;font-weight:600;}

/* Sticky topbar */
#topbar{position:sticky;top:0;z-index:100;}

@media(max-width:768px){
  input,select,textarea{font-size:16px!important;}
  .sidebar{position:fixed;top:0;bottom:0;left:0;z-index:1000;transform:translateX(-100%);transition:transform .25s;overflow-y:auto;}
  .sidebar.open{transform:translateX(0);}
  .main-content{margin-left:0!important;width:100%!important;}
  .hide-mobile{display:none!important;}
  #modal-overlay{align-items:flex-end;padding:0;}
  #modal-box{border-radius:20px 20px 0 0;max-height:92vh;overflow-x:hidden;width:100vw;max-width:100vw!important;}
  button,.btn{min-height:42px;}
  canvas{max-height:200px!important;}
  #page-content{padding-bottom:80px!important;}
}
@media(min-width:769px){
  .show-mobile-only{display:none!important;}
  #mobile-nav{display:none!important;}
}

/* Bottom nav */
#mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:900;background:#1a2e4a;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:stretch;}
#mobile-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;color:rgba(255,255,255,.6);font-size:11px;text-decoration:none;transition:.15s;}
#mobile-nav a.active,#mobile-nav a:hover{color:#fff;}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .no-print{display:none!important;}
  .sidebar,#topbar,#mobile-nav{display:none!important;}
  .main-content{margin:0!important;padding:0!important;}
}
@page{size:A4 landscape;margin:10mm;}
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box" style="max-width:680px;">
    <div class="flex items-center justify-between p-4 border-b">
      <h3 id="modal-title" class="text-lg font-semibold text-gray-800"></h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 p-1 rounded">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div id="modal-body" class="p-4"></div>
    <div id="modal-footer" class="flex justify-end gap-2 p-4 border-t bg-gray-50 rounded-b-2xl"></div>
  </div>
</div>

<div id="app-root"></div>
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 z-50" onclick="closeSidebar()"></div>

<script>
'use strict';
// =====================================================================
// SECTION 0: CONFIG & SUPABASE CLIENT
// =====================================================================
const SUPABASE_URL      = 'https://pcmpwkcmvsxrvbximjgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_RckQgaumQeIgaCICUc_6ZQ_T42qI2Nq';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SESSION_KEY  = '_sn_pm_sess';
const SESSION_SECS = 7200;

// =====================================================================
// SECTION 1: GLOBAL STATE
// =====================================================================
let currentUser          = null;
let currentPage          = 'landing';
let sessionTimerInterval = null;
let sessionSecondsLeft   = 0;
let sessionWarnShown     = false;
let chartRegistry        = {};
let _isSidebarOpen       = false;

let _pmMachines   = [];  // pm_machines[]
let _pmItems      = [];  // pm_items[] (all)
let _pmLogs       = [];  // pm_logs[] (recent)
let _pmDowntime   = [];  // pm_downtime[] (recent)
let _pmCategories = ['screen','crusher','conveyor','pump','loader','truck','other']; // โหลดจาก pm_config
let _pmTypes      = ['เปลี่ยนน้ำมันเครื่อง','ตรวจสอบใบตะแกรง','ล้างกรอง Hydraulic','เปลี่ยนสายพาน','ตรวจสอบระบบไฟฟ้า','เปลี่ยนลูกปืน']; // โหลดจาก pm_config
let _pmFactories  = ['CDE','Propel','Sanon1','Sanon2','ทั่วไป']; // โหลดจาก pm_config
let _pmParts      = [];  // pm_parts[]
let _pmRepairs    = [];  // pm_repair_logs[]

// =====================================================================
// SECTION 2: MENU DEFINITIONS  (prefix: pm-)
// =====================================================================
const PM_MENUS = [
  { key:'pm-dashboard',    label:'ตารางรอบ PM',        icon:'layout-dashboard' },
  { key:'pm-log',          label:'บันทึก PM',           icon:'clipboard-check' },
  { key:'pm-meter',        label:'บันทึกเลขมิเตอร์',   icon:'gauge' },
  { key:'pm-meter-add',    label:'เพิ่มเครื่องจักร',    icon:'plus-circle', action:true },
  { key:'pm-downtime',     label:'Downtime Log',        icon:'alert-triangle' },
  { key:'pm-history',      label:'ประวัติต่อเครื่อง',   icon:'history' },
  { key:'pm-items',        label:'รายการ PM',            icon:'list-checks' },
  { key:'pm-repair',       label:'บันทึกซ่อม',          icon:'wrench' },
  { key:'pm-parts',        label:'คลังอะไหล่',          icon:'package' },
  { key:'pm-report',       label:'รายงาน PM',            icon:'file-bar-chart' },
  { key:'pm-oee',          label:'OEE / Availability',   icon:'activity' },
  { key:'pm-machines',     label:'เครื่องจักร',         icon:'settings-2' },
  { key:'pm-settings',     label:'ตั้งค่า',              icon:'settings' },
];

const ROLE_DEFAULT_MENUS = {
  admin      : PM_MENUS.map(m=>m.key),
  manager    : ['pm-dashboard','pm-log','pm-meter','pm-meter-add','pm-downtime','pm-history','pm-items','pm-repair','pm-parts','pm-report','pm-oee','pm-machines'],
  // role อื่น ต้องได้รับสิทธิ์ pm- จาก admin โดยตรง ถึงจะเข้าได้
  user       : [],
  management : [],
};

// =====================================================================
// SECTION 3: RBAC
// =====================================================================
function getAllowedPmMenus(user) {
  if (!user) return [];
  if (user.role === 'admin') return PM_MENUS.map(m => m.key);
  const extra = (user._extraManage || []).filter(k => k.startsWith('pm-'));
  if (extra.length > 0) return extra;
  return ROLE_DEFAULT_MENUS[user.role] || ['pm-dashboard'];
}
function canAccess(key)      { return getAllowedPmMenus(currentUser).includes(key); }
function isAdmin()           { return currentUser && currentUser.role === 'admin'; }
function isManager()         { return currentUser && (currentUser.role === 'admin' || currentUser.role === 'manager'); }
function canAccessPmSystem() { return currentUser && getAllowedPmMenus(currentUser).length > 0; }

// =====================================================================
// SECTION 4: UTILS
// =====================================================================
function fmtNum(n, dec=0) {
  if (n===null||n===undefined||n===''||isNaN(Number(n))) return '0';
  return Number(n).toLocaleString('th-TH',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtDate(d) {
  if (!d) return '-';
  try {
    const dt = new Date(d);
    const y = dt.getFullYear()+543;
    const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][dt.getMonth()];
    return `${dt.getDate()} ${m} ${y}`;
  } catch { return String(d); }
}
function fmtDateShort(d) {
  if (!d) return '-';
  try {
    const dt = new Date(d);
    return `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()+543}`;
  } catch { return String(d); }
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function pad2(n)    { return String(n).padStart(2,'0'); }
function escapeHtml(s) {
  if (s==null) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function qs(sel,p)  { return (p||document).querySelector(sel); }
function qsa(sel,p) { return Array.from((p||document).querySelectorAll(sel)); }
function destroyChart(key) {
  if (chartRegistry[key]) { try{chartRegistry[key].destroy();}catch(_){} delete chartRegistry[key]; }
}
function refreshIcons() { if (window.lucide) lucide.createIcons(); }

// คำนวณ PM status จาก remaining
function pmStatus(remaining, threshold) {
  if (remaining === null || remaining === undefined) return 'ok';
  if (remaining < 0)          return 'overdue';
  if (remaining <= threshold) return 'alert';
  return 'ok';
}
function pmStatusLabel(status) {
  return {overdue:'เกินกำหนด', alert:'ใกล้ถึง', ok:'ปกติ'}[status] || '';
}
function pmStatusBadge(status) {
  const cls = {overdue:'badge-overdue', alert:'badge-alert', ok:'badge-ok'}[status]||'';
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${pmStatusLabel(status)}</span>`;
}
function pmRowClass(status) {
  return {overdue:'pm-overdue', alert:'pm-alert', ok:'pm-ok'}[status]||'';
}

// คำนวณ remaining จาก item + machine.current_meter
function calcRemaining(item, machine) {
  const next = (item.last_pm_meter||0) + (item.interval_value||0);
  const cur  = machine ? (machine.current_meter||0) : 0;
  return next - cur;
}
function calcNextDue(item) {
  return (item.last_pm_meter||0) + (item.interval_value||0);
}

// =====================================================================
// SECTION 5: TOAST
// =====================================================================
function showToast(msg, type='info', dur=3000) {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  qs('#toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(), 400); }, dur);
}

// =====================================================================
// SECTION 6: MODAL
// =====================================================================
function openModal(title, bodyHtml, footerHtml='', width='680px') {
  qs('#modal-title').textContent = title;
  qs('#modal-body').innerHTML = bodyHtml;
  qs('#modal-footer').innerHTML = footerHtml;
  qs('#modal-box').style.maxWidth = width;
  qs('#modal-overlay').classList.remove('hidden');
  refreshIcons();
}
function closeModal() { qs('#modal-overlay').classList.add('hidden'); }

// =====================================================================
// SECTION 7: AUTH
// =====================================================================
async function doLogin(username, password) {
  username = (username || '').trim().toLowerCase();
  if (!username || !password) return false;

  const { data: rows, error } = await db.from('app_users')
    .select('*')
    .ilike('username', username)
    .eq('password', password);

  const data = rows?.[0] || null;
  if (error || !data) return false;
  if (data.status === 'pending' || data.status === 'inactive') return false;

  // ดึง extra_manage จาก user_permissions
  let extraManage = data.extra_manage || [];
  const { data: perm } = await db.from('user_permissions')
    .select('extra_manage').eq('user_id', data.id).maybeSingle();
  if (perm?.extra_manage?.length) extraManage = perm.extra_manage;

  // รวม pm- จาก role_permissions
  const { data: rp } = await db.from('role_permissions')
    .select('extra_manage').eq('role_name', data.role).maybeSingle();
  if (rp?.extra_manage?.length) {
    const rolePm = rp.extra_manage.filter(k => k.startsWith('pm-'));
    extraManage = [...new Set([...extraManage, ...rolePm])];
  }

  currentUser = { ...data, _extraManage: extraManage };
  const base = {
    id: data.id, username: data.username, display_name: data.display_name,
    full_name: data.full_name, role: data.role, status: data.status,
    factory: data.factory || '', department: data.department || '',
    _extraManage: extraManage,
  };
  try { sessionStorage.setItem(SESSION_KEY,  JSON.stringify(base)); } catch(_) {}
  try { sessionStorage.setItem('_sn_inv_sess', JSON.stringify(base)); } catch(_) {}
  try { sessionStorage.setItem('_sn_sess', JSON.stringify({ user: base, page: null, loginAt: Date.now() })); } catch(_) {}
  try { localStorage.setItem('_sn_shared_sess', JSON.stringify(base)); } catch(_) {}
  return true;
}

function doLogout() {
  currentUser = null;
  try { sessionStorage.removeItem(SESSION_KEY); } catch(_) {}
  try { sessionStorage.removeItem('_sn_inv_sess'); } catch(_) {}
  try { sessionStorage.removeItem('_sn_sess'); } catch(_) {}
  try { localStorage.removeItem('_sn_shared_sess'); } catch(_) {}
  clearInterval(sessionTimerInterval);
  navigateTo('landing');
}

// เขียน session ทุก key ก่อนเปลี่ยนระบบ (SSO)
function gotoSystem(url) {
  if (currentUser) {
    const base = {
      id: currentUser.id, username: currentUser.username,
      display_name: currentUser.display_name, full_name: currentUser.full_name,
      role: currentUser.role, status: currentUser.status,
      factory: currentUser.factory || '', department: currentUser.department || '',
      _extraManage: currentUser._extraManage || [],
    };
    try { sessionStorage.setItem('_sn_pm_sess',  JSON.stringify(base)); } catch(_) {}
    try { sessionStorage.setItem('_sn_inv_sess', JSON.stringify(base)); } catch(_) {}
    try { sessionStorage.setItem('_sn_sess', JSON.stringify({ user: base, page: null, loginAt: Date.now() })); } catch(_) {}
  }
  window.location.href = url;
}

// Restore session — ตรวจ key ของตัวเอง → fallback key ระบบอื่น → re-fetch permissions
async function restoreSession() {
  const tryParse = key => { try { const r = sessionStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(_) { return null; } };

  // 1. ลอง session ของระบบ PM เอง
  const own = tryParse(SESSION_KEY);
  if (own?.id && own?.username) { currentUser = own; return true; }

  // 2. Fallback — ลอง session จากระบบอื่น แล้ว re-fetch pm- permissions
  const fallbacks = ['_sn_inv_sess', '_sn_sess'];
  for (const key of fallbacks) {
    const parsed = tryParse(key);
    const u = parsed?.user || parsed; // _sn_sess ห่อด้วย { user: ... }
    if (!u?.id || !u?.username) continue;
    try {
      let extraManage = u._extraManage || [];
      const { data: perm } = await db.from('user_permissions')
        .select('extra_manage').eq('user_id', u.id).maybeSingle();
      if (perm?.extra_manage?.length) extraManage = perm.extra_manage;
      const { data: rp } = await db.from('role_permissions')
        .select('extra_manage').eq('role_name', u.role).maybeSingle();
      if (rp?.extra_manage?.length) {
        const rolePm = rp.extra_manage.filter(k => k.startsWith('pm-'));
        extraManage = [...new Set([...extraManage, ...rolePm])];
      }
      currentUser = { ...u, _extraManage: extraManage };
      try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(currentUser)); } catch(_) {}
      return true;
    } catch(_) {}
  }

  // 3. Fallback — shared session จาก localStorage (SSO ข้าม tab)
  try {
    const shared = JSON.parse(localStorage.getItem('_sn_shared_sess') || 'null');
    if (shared?.id && shared?.username) {
      let extraManage = shared._extraManage || [];
      const { data: perm } = await db.from('user_permissions')
        .select('extra_manage').eq('user_id', shared.id).maybeSingle();
      if (perm?.extra_manage?.length) extraManage = perm.extra_manage;
      const { data: rp } = await db.from('role_permissions')
        .select('extra_manage').eq('role_name', shared.role).maybeSingle();
      if (rp?.extra_manage?.length) {
        const rolePm = rp.extra_manage.filter(k => k.startsWith('pm-'));
        extraManage = [...new Set([...extraManage, ...rolePm])];
      }
      currentUser = { ...shared, _extraManage: extraManage };
      try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(currentUser)); } catch(_) {}
      return true;
    }
  } catch(_) {}

  return false;
}

// =====================================================================
// SECTION 7B: SESSION TIMEOUT
// =====================================================================
function startSessionTimer() {
  if (!currentUser || currentUser.role === 'admin') return;
  sessionSecondsLeft = SESSION_SECS;
  sessionWarnShown = false;
  clearInterval(sessionTimerInterval);
  sessionTimerInterval = setInterval(() => {
    sessionSecondsLeft--;
    const bar = qs('#session-bar');
    if (!bar) return;
    const m = Math.floor(sessionSecondsLeft/60), s = sessionSecondsLeft%60;
    bar.textContent = `หมดเวลา: ${m}:${pad2(s)}`;
    if (sessionSecondsLeft <= 300) bar.classList.add('warn');
    if (sessionSecondsLeft <= 0)   { clearInterval(sessionTimerInterval); showToast('หมดเวลา Session','warn'); doLogout(); }
  }, 1000);
}

// =====================================================================
// SECTION 8: APP SHELL
// =====================================================================
function renderShell() {
  const menus = PM_MENUS.filter(m => canAccess(m.key));
  const mobileMenus = menus.slice(0, 4);

  const sideLinks = menus.map(m => {
    if (m.action) {
      // เมนูที่เป็น action (ไม่ navigate — เปิด modal)
      return `
      <a href="#" class="nav-link flex items-center gap-3 px-3 py-2 text-sm text-green-300 hover:text-green-100 ml-4"
         onclick="event.preventDefault();navigateTo('pm-meter').then(()=>setTimeout(openAddMeterMachineModal,150))">
        <i data-lucide="${m.icon}" class="w-3.5 h-3.5 flex-shrink-0"></i>
        <span>${m.label}</span>
      </a>`;
    }
    return `
    <a href="#" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm text-slate-300 hover:text-white"
       data-page="${m.key}" onclick="navTo(event,'${m.key}')">
      <i data-lucide="${m.icon}" class="w-4 h-4 flex-shrink-0"></i>
      <span>${m.label}</span>
    </a>`;
  }).join('');

  const mobileLinks = mobileMenus.map(m => `
    <a href="#" data-page="${m.key}" onclick="navTo(event,'${m.key}')">
      <i data-lucide="${m.icon}" class="w-6 h-6"></i>
      <span>${m.label}</span>
    </a>`).join('');

  qs('#app-root').innerHTML = `
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar desktop -->
    <div id="main-sidebar" class="sidebar hidden md:flex flex-col no-print">
      <div class="flex items-center gap-3 px-4 py-4 border-b border-white/10">
        <div class="w-9 h-9 rounded-xl bg-amber-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">PM</div>
        <div>
          <div class="text-white text-sm font-semibold leading-tight">สานนท์ PM</div>
          <div class="text-slate-400 text-xs">Maintenance System</div>
        </div>

function toggleSidebar() {
  const sb = qs('#main-sidebar');
  if (!sb) return;
  sb.classList.toggle('open');
  sb.classList.toggle('hidden');
  qs('#sidebar-overlay').classList.toggle('hidden');
  _isSidebarOpen = !_isSidebarOpen;
}
function closeSidebar() {
  const sb = qs('#main-sidebar');
  if (sb) { sb.classList.add('hidden'); sb.classList.remove('open'); }
  qs('#sidebar-overlay').classList.add('hidden');
  _isSidebarOpen = false;
}
function updateActiveNav(page) {
  qsa('.nav-link[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  qsa('#mobile-nav a[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page===page));
}
function navTo(e, page) {
  e.preventDefault();
  closeSidebar();
  navigateTo(page);
}

const PAGE_KEY = '_sn_pm_page';

async function navigateTo(page) {
  if (!currentUser && page !== 'landing') { renderLanding(); return; }
  currentPage = page;
  // บันทึกหน้าล่าสุด — กู้คืนเมื่อ refresh
  if (page !== 'landing') {
    try { sessionStorage.setItem(PAGE_KEY, page); } catch(_) {}
  }
  updateActiveNav(page);

  const titleMap = {
    'landing':'เข้าสู่ระบบ','pm-dashboard':'ตารางรอบ PM','pm-log':'บันทึก PM',
    'pm-meter':'บันทึกเลขมิเตอร์',
    'pm-downtime':'Downtime Log','pm-history':'ประวัติต่อเครื่อง',
    'pm-items':'รายการ PM','pm-repair':'บันทึกซ่อม','pm-parts':'คลังอะไหล่',
    'pm-report':'รายงาน PM','pm-oee':'OEE / Availability',
    'pm-machines':'เครื่องจักร','pm-settings':'ตั้งค่า',
  };
  const titleEl = qs('#page-title');
  if (titleEl) titleEl.textContent = titleMap[page]||page;

  const content = qs('#page-content');
  if (content) content.innerHTML = `<div class="flex items-center gap-2 text-gray-400 py-10 justify-center"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>กำลังโหลด...</span></div>`;
  refreshIcons();

  switch(page) {
    case 'landing':        return renderLanding();
    case 'pm-dashboard':   return renderDashboard();
    case 'pm-log':         return renderLogPage();
    case 'pm-downtime':    return renderDowntimePage();
    case 'pm-history':     return renderHistoryPage();
    case 'pm-items':       return renderPmItemsPage();
    case 'pm-meter':       return renderMeterPage();
    case 'pm-repair':      return renderRepairPage();
    case 'pm-parts':       return renderPartsPage();
    case 'pm-report':      return renderReportPage();
    case 'pm-oee':         return renderOeePage();
    case 'pm-machines':    return renderMachinesPage();
    case 'pm-settings':    return renderSettingsPage();
    default:               renderDashboard();
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const u = qs('#inp-user').value.trim();
  const p = qs('#inp-pass').value;
  const errEl = qs('#login-err');
  errEl.classList.add('hidden');

  const btn = e.submitter;
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...'; }

  const ok = await doLogin(u, p);

  if (btn) { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }

  if (!ok) {
    errEl.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง หรือบัญชีถูกระงับ';
    errEl.classList.remove('hidden');
    return;
  }

  // ตรวจสิทธิ์เข้าระบบ PM
  if (!canAccessPmSystem()) {
    currentUser = null;
    sessionStorage.removeItem(SESSION_KEY);
    renderAccessDenied();
    return;
  }

  await loadPmData();
  renderShell();
  navigateTo('pm-dashboard');
}

// SECTION 11: DASHBOARD — ตารางรอบ PM

async function renderDashboard() {
  const content = qs('#page-content');

  // โหลดข้อมูลและ sync ชั่วโมงจาก System 1
  await loadPmData();
  await syncCurrentMeters();

  // group items by machine
  const machineMap = {};
  _pmMachines.filter(m=>m.is_active).sort((a,b)=>(a.sort_order-b.sort_order)||(a.factory||'').localeCompare(b.factory||''))
    .forEach(m => { machineMap[m.id] = { machine: m, items: [] }; });
  _pmItems.filter(i=>i.is_active).sort((a,b)=>a.sort_order-b.sort_order)
    .forEach(item => {
      if (machineMap[item.pm_machine_id]) machineMap[item.pm_machine_id].items.push(item);
    });

  // stats
  let totalOverdue=0, totalAlert=0, totalOk=0;
  Object.values(machineMap).forEach(({machine, items}) => {
    items.forEach(item => {
      const rem = calcRemaining(item, machine);
      const st  = pmStatus(rem, machine.alert_threshold||100);
      if (st==='overdue') totalOverdue++;
      else if (st==='alert') totalAlert++;
      else totalOk++;
    });
  });

  const groups = Object.values(machineMap);

  // สร้าง rows ของตาราง
  let tableRows = '';
  if (groups.length === 0) {
    tableRows = `<tr><td colspan="9" class="text-center py-12 text-gray-400">ยังไม่มีข้อมูลเครื่องจักร <a href="#" onclick="navigateTo('pm-machines')" class="text-amber-500 underline">เพิ่มเครื่องจักร</a></td></tr>`;
  } else {
    groups.forEach(({machine, items}) => {
      if (!items.length) {
        tableRows += `<tr><td class="px-3 py-2 font-medium text-slate-700 border-b align-top">${escapeHtml(machine.name)}<div class="text-xs text-slate-400">${machine.factory||''}</div></td><td colspan="8" class="px-3 py-2 text-gray-400 text-sm border-b">ยังไม่มีรายการ PM</td></tr>`;
        return;
      }
      items.forEach((item, idx) => {
        const rem     = calcRemaining(item, machine);
        const next    = calcNextDue(item);
        const st      = pmStatus(rem, machine.alert_threshold||100);
        const rowCls  = pmRowClass(st);
        const remStr  = rem >= 0 ? `+${fmtNum(rem)}` : fmtNum(rem);
        const remColor= st==='overdue' ? 'text-red-600 font-bold' : st==='alert' ? 'text-amber-600 font-semibold' : 'text-green-700';
        const unit    = machine.meter_type==='km' ? 'กม.' : 'ชม.';

        tableRows += `<tr class="${rowCls} border-b">
          ${idx===0 ? `<td class="px-3 py-2 font-semibold text-slate-700 align-top border-r" rowspan="${items.length}">
            ${escapeHtml(machine.name)}
            <div class="text-xs text-slate-400 font-normal">${machine.factory||''}</div>
            <div class="text-xs text-blue-600 font-semibold mt-1 flex items-center gap-1">
              ${fmtNum(machine.current_meter)} ${unit}
              ${machine.sync_source && machine.sync_source !== 'manual'
                ? `<span title="ดึงอัตโนมัติจาก System 1 (${machine.sync_source})" class="text-green-500"><i data-lucide="refresh-cw" class="w-3 h-3 inline"></i></span>`
                : ''}
            </div>
            ${isManager()?`<button onclick="openUpdateMeterModal('${machine.id}')" class="mt-1 text-xs text-amber-600 hover:underline">แก้ไข Meter</button>`:''}
          </td>` : ''}
          <td class="px-3 py-2 text-sm">${escapeHtml(item.pm_type)}</td>
          <td class="px-3 py-2 text-sm text-center">${fmtNum(item.interval_value)} ${unit}</td>
          <td class="px-3 py-2 text-sm text-center font-semibold">${fmtNum(next)}</td>
          <td class="px-3 py-2 text-sm text-center font-bold ${remColor}">${remStr}</td>
          <td class="px-3 py-2 text-sm text-center">${fmtNum(item.last_pm_meter)}</td>
          <td class="px-3 py-2 text-sm text-center">${fmtDateShort(item.last_pm_date)}</td>
          <td class="px-3 py-2 text-sm text-center">${pmStatusBadge(st)}</td>
          <td class="px-3 py-2 text-sm text-center">${item.notes?`<span class="text-xs text-gray-500">${escapeHtml(item.notes)}</span>`:''}</td>
        </tr>`;
      });
    });
  }

  // ===== จัดกลุ่มตามโรงงาน =====
  const factoryMap = {};
  groups.forEach(({ machine, items }) => {
    const fac = machine.factory || 'ทั่วไป';
    if (!factoryMap[fac]) factoryMap[fac] = [];
    factoryMap[fac].push({ machine, items });
  });

  const STATUS_PRIORITY = { overdue: 0, alert: 1, ok: 2 };
  const factories = Object.keys(factoryMap);

  // ===== Alert Grid: เฉพาะโรงงานที่มีรายการค้าง =====
  const alertFactories = factories.filter(fac => {
    return factoryMap[fac].some(({ machine, items }) =>
      items.some(item => {
        const st = pmStatus(calcRemaining(item, machine), machine.alert_threshold || 100);
        return st === 'overdue' || st === 'alert';
      })
    );
  });

  const alertColsHtml = alertFactories.map(fac => {
    const machineGroups = factoryMap[fac];
    const facAlerts = [];
    machineGroups.forEach(({ machine, items }) => {
      items.forEach(item => {
        const rem = calcRemaining(item, machine);
        const st  = pmStatus(rem, machine.alert_threshold || 100);
        if (st === 'overdue' || st === 'alert') facAlerts.push({ machine, item, rem, st });
      });
    });
    facAlerts.sort((a,b) => {
      if (a.st !== b.st) return a.st === 'overdue' ? -1 : 1;
      return a.rem - b.rem;
    });

    // สถานะโรงงาน
    let facOv=0, facAl=0;
    machineGroups.forEach(({ machine, items }) => items.forEach(item => {
      const st = pmStatus(calcRemaining(item, machine), machine.alert_threshold||100);
      if (st==='overdue') facOv++; else if (st==='alert') facAl++;
    }));
    const facSt = facOv>0?'overdue':facAl>0?'alert':'ok';
    const colBorderCls = facSt==='overdue'?'border-red-300 bg-red-50/30':facSt==='alert'?'border-amber-300 bg-amber-50/30':'border-green-300 bg-green-50/20';
    const colHeadCls   = facSt==='overdue'?'bg-red-100 text-red-800':facSt==='alert'?'bg-amber-100 text-amber-800':'bg-green-100 text-green-800';
    const facIcon = facSt==='overdue'?'🔴':facSt==='alert'?'🟡':'🟢';

    const itemsHtml = facAlerts.length === 0
      ? `<div class="px-3 py-4 text-center text-xs text-green-600 flex flex-col items-center gap-1">
           <span class="text-2xl">✅</span>ไม่มีรายการค้างดำเนินการ
         </div>`
      : facAlerts.map(({ machine, item, rem, st }) => {
          const unit = machine.meter_type==='km'?'กม.':'ชม.';
          const next = calcNextDue(item);
          const isOv = st==='overdue';
          return `<div class="px-3 py-2 border-b last:border-0 ${isOv?'bg-red-50/60':'bg-amber-50/40'}">
            <div class="flex items-start gap-1.5">
              <span class="mt-0.5 flex-shrink-0">${isOv?'🔴':'🟡'}</span>
              <div class="min-w-0 flex-1">
                <div class="text-xs font-semibold text-gray-700 truncate">${escapeHtml(machine.name)}</div>
                <div class="text-xs text-gray-500 truncate">${escapeHtml(item.pm_type)}</div>
                <div class="flex justify-between mt-1">
                  <span class="text-xs text-gray-400">ถัดไป ${fmtNum(next)}</span>
                  <span class="text-xs font-bold ${isOv?'text-red-600':'text-amber-600'}">
                    ${isOv?'เกิน '+fmtNum(Math.abs(rem)):'เหลือ '+fmtNum(rem)} ${unit}
                  </span>
                </div>
              </div>
            </div>
          </div>`;
        }).join('');

    return `
    <div class="flex flex-col rounded-xl border ${colBorderCls} overflow-hidden">
      <div class="px-3 py-2 ${colHeadCls} flex items-center justify-between flex-shrink-0">
        <span class="font-semibold text-sm">${facIcon} ${escapeHtml(fac)}</span>
        <span class="text-xs opacity-75">${facAlerts.length} รายการ</span>
      </div>
      <div class="flex-1 overflow-y-auto" style="max-height:280px;">${itemsHtml}</div>
    </div>`;
  }).join('');

  // ===== Factory Detail (ปุ่มเลือก + ตาราง) =====
  const facBtns = [`<button onclick="dashSetFac('')" id="fac-btn-all"
    class="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors bg-slate-700 text-white border-slate-700">
    ทั้งหมด
  </button>`].concat(factories.map(fac => {
    let fov=0,fal=0;
    factoryMap[fac].forEach(({machine,items})=>items.forEach(item=>{
      const st=pmStatus(calcRemaining(item,machine),machine.alert_threshold||100);
      if(st==='overdue')fov++;else if(st==='alert')fal++;
    }));
    const dot=fov>0?'🔴':fal>0?'🟡':'🟢';
    return `<button onclick="dashSetFac('${escapeHtml(fac)}')" id="fac-btn-${escapeHtml(fac)}"
      class="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors border-slate-300 text-slate-600 hover:bg-slate-100">
      ${dot} ${escapeHtml(fac)}
    </button>`;
  })).join('');

  const buildFactoryTable = (fac) => {
    const entries = fac ? (factoryMap[fac] ? [[fac, factoryMap[fac]]] : []) : Object.entries(factoryMap);
    return entries.map(([f, machineGroups]) => {
      const machineRows = machineGroups.map(({ machine, items }) => {
        const unit = machine.meter_type==='km'?'กม.':'ชม.';
        if (!items.length) return `<tr class="border-b"><td class="px-3 py-2 text-sm font-medium border-r">${escapeHtml(machine.name)}</td><td colspan="5" class="px-3 py-2 text-xs text-gray-400">ยังไม่มีรายการ PM</td></tr>`;
        const sorted = [...items].sort((a,b)=>{
          const sA=STATUS_PRIORITY[pmStatus(calcRemaining(a,machine),machine.alert_threshold||100)]??2;
          const sB=STATUS_PRIORITY[pmStatus(calcRemaining(b,machine),machine.alert_threshold||100)]??2;
          return sA!==sB?sA-sB:a.sort_order-b.sort_order;
        });
        return sorted.map((item,idx)=>{
          const rem=calcRemaining(item,machine), next=calcNextDue(item);
          const st=pmStatus(rem,machine.alert_threshold||100);
          const remColor=st==='overdue'?'text-red-600 font-bold':st==='alert'?'text-amber-600 font-semibold':'text-green-700';
          return `<tr class="${pmRowClass(st)} border-b">
            ${idx===0?`<td class="px-3 py-2 text-sm font-semibold text-slate-700 align-top border-r" rowspan="${sorted.length}">
              ${escapeHtml(machine.name)}
              <div class="text-xs text-blue-600 mt-0.5">${fmtNum(machine.current_meter)} ${unit}
                ${machine.sync_source&&machine.sync_source!=='manual'?`<i data-lucide="refresh-cw" class="w-2.5 h-2.5 inline text-green-500"></i>`:''}
              </div>
            </td>`:''}
            <td class="px-3 py-2 text-xs">${escapeHtml(item.pm_type)}</td>
            <td class="px-3 py-2 text-xs text-center">${fmtNum(item.interval_value)} ${unit}</td>
            <td class="px-3 py-2 text-xs text-center font-semibold text-blue-700">${fmtNum(next)} ${unit}</td>
            <td class="px-3 py-2 text-xs text-center font-bold ${remColor}">${rem>=0?'+':''}${fmtNum(rem)} ${unit}</td>
            <td class="px-3 py-2 text-center">${pmStatusBadge(st)}</td>
          </tr>`;
        }).join('');
      }).join('');

      let fov2=0,fal2=0,fok2=0;
      machineGroups.forEach(({machine,items})=>items.forEach(item=>{
        const st=pmStatus(calcRemaining(item,machine),machine.alert_threshold||100);
        if(st==='overdue')fov2++;else if(st==='alert')fal2++;else fok2++;
      }));
      const fst=fov2>0?'overdue':fal2>0?'alert':'ok';
      const fcol=fst==='overdue'?'border-red-400':fst==='alert'?'border-amber-400':'border-green-400';
      return `
      <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-3 border-l-4 ${fcol}">
        <div class="flex items-center justify-between px-4 py-2.5 border-b bg-gray-50">
          <div class="flex items-center gap-2">

  renderDashboard();
}

async function saveLog() {
  const machineId = qs('#log-machine')?.value;
  const itemId    = qs('#log-item')?.value;
  const date      = qs('#log-date')?.value;
  const meter     = parseFloat(qs('#log-meter')?.value||'');
  const downtime  = parseFloat(qs('#log-downtime')?.value||'0')||0;
  const by        = qs('#log-by')?.value?.trim()||'';
  const notes     = qs('#log-notes')?.value?.trim()||'';

  if (!machineId) { showToast('กรุณาเลือกเครื่องจักร','error'); return; }
  if (!itemId)    { showToast('กรุณาเลือกประเภท PM','error'); return; }
  if (!date)      { showToast('กรุณาระบุวันที่','error'); return; }
  if (isNaN(meter)||meter<0) { showToast('กรุณาระบุค่า Meter','error'); return; }

  const machine = _pmMachines.find(m=>m.id===machineId);
  const item    = itemId ? _pmItems.find(i=>i.id===itemId) : null;

  // รวมอะไหล่
  const partRows = qsa('#parts-list [id^="part-row-"]');
  const parts = [];
  let totalCost = 0;
  for (const row of partRows) {
    const name      = row.querySelector('[data-field="name"]')?.value?.trim();
    const qty       = parseFloat(row.querySelector('[data-field="qty"]')?.value||'0');
    const unit      = row.querySelector('[data-field="unit"]')?.value?.trim()||'';
    const unit_cost = parseFloat(row.querySelector('[data-field="unit_cost"]')?.value||'0');
    if (name) {
      parts.push({name, qty, unit, unit_cost});
      totalCost += qty * unit_cost;
    }
  }

  const logData = {
    pm_item_id   : itemId||null,
    pm_machine_id: machineId,
    machine_name : machine?.name||'',
    factory      : machine?.factory||'',
    pm_type      : item?.pm_type||'',
    done_date    : date,
    done_meter   : meter,
    done_by      : by,
    parts_used   : parts,
    total_cost   : totalCost,
    downtime_hours: downtime||null,
    notes        : notes,
    created_by   : currentUser?.username||'',
  };

  const { error: logErr } = await db.from('pm_logs').insert(logData);
  if (logErr) { showToast('บันทึกไม่สำเร็จ: '+logErr.message,'error'); return; }

  // อัปเดต pm_items.last_pm_date, last_pm_meter
  if (itemId) {
    await db.from('pm_items').update({ last_pm_date: date, last_pm_meter: meter }).eq('id', itemId);
    const it = _pmItems.find(i=>i.id===itemId);
    if (it) { it.last_pm_date = date; it.last_pm_meter = meter; }
  }

  // อัปเดต current_meter ถ้า meter ใหม่ > เดิม
  if (machine && meter > (machine.current_meter||0)) {
    await db.from('pm_machines').update({ current_meter: meter }).eq('id', machineId);
    machine.current_meter = meter;
  }

  // บันทึก downtime ถ้าระบุ
  if (downtime > 0) {
    const startDt = new Date(date);
    const endDt   = new Date(startDt.getTime() + downtime * 3600000);
    await db.from('pm_downtime').insert({
      pm_machine_id: machineId,
      machine_name : machine?.name||'',
      factory      : machine?.factory||'',
      start_time   : startDt.toISOString(),
      end_time     : endDt.toISOString(),
      duration_hours: downtime,
      type         : 'planned_pm',

async function updateLog(id) {
  const date     = qs('#el-date')?.value;
  const meter    = parseFloat(qs('#el-meter')?.value||'');
  const downtime = parseFloat(qs('#el-downtime')?.value||'0')||null;
  const by       = qs('#el-by')?.value?.trim()||'';
  const notes    = qs('#el-notes')?.value?.trim()||'';

  if (!date) { showToast('กรุณาระบุวันที่','error'); return; }
  if (isNaN(meter)) { showToast('กรุณาระบุค่า Meter','error'); return; }

  const { error } = await db.from('pm_logs').update({
    done_date: date, done_meter: meter,
    downtime_hours: downtime, done_by: by, notes
  }).eq('id', id);

  if (error) { showToast('แก้ไขไม่สำเร็จ: '+error.message,'error'); return; }

  // อัปเดต pm_items ถ้าเป็น log ล่าสุดของ item นั้น
  const log = _pmLogs.find(l => l.id === id);
  if (log?.pm_item_id) {
    const sameItemLogs = _pmLogs.filter(l => l.pm_item_id === log.pm_item_id)
      .sort((a,b) => new Date(b.done_date) - new Date(a.done_date));
    if (sameItemLogs[0]?.id === id) {
      await db.from('pm_items').update({ last_pm_date: date, last_pm_meter: meter }).eq('id', log.pm_item_id);
    }
  }

  closeModal();
  showToast('แก้ไขสำเร็จ','success');
  renderLogPage();
}

async function deleteLog(id) {
  if (!confirm('ลบบันทึก PM นี้?')) return;
  const { error } = await db.from('pm_logs').delete().eq('id', id);
  if (error) { showToast('ลบไม่สำเร็จ: '+error.message,'error'); return; }
  showToast('ลบสำเร็จ','success');
  renderLogPage();
}

async function saveDowntime() {
  const machineId  = qs('#dt-machine')?.value;
  const startTime  = qs('#dt-start')?.value;
  const endTime    = qs('#dt-end')?.value||null;
  const durInput   = parseFloat(qs('#dt-dur')?.value||'');
  const type       = qs('#dt-type')?.value||'breakdown';
  const cause      = qs('#dt-cause')?.value?.trim()||'';
  const action     = qs('#dt-action')?.value?.trim()||'';

  if (!machineId)  { showToast('กรุณาเลือกเครื่องจักร','error'); return; }
  if (!startTime)  { showToast('กรุณาระบุเวลาเริ่ม','error'); return; }

  let durationHours = durInput || null;
  if (!durationHours && endTime) {
    const ms = new Date(endTime) - new Date(startTime);
    durationHours = Math.max(0, ms/3600000);
  }

  const machine = _pmMachines.find(m=>m.id===machineId);
  const { error } = await db.from('pm_downtime').insert({
    pm_machine_id : machineId,
    machine_name  : machine?.name||'',
    factory       : machine?.factory||'',
    start_time    : new Date(startTime).toISOString(),
    end_time      : endTime ? new Date(endTime).toISOString() : null,
    duration_hours: durationHours,
    type, cause, action_taken: action,
    created_by: currentUser?.username||'',
  });
  if (error) { showToast('บันทึกไม่สำเร็จ: '+error.message,'error'); return; }
  closeModal();
  showToast('บันทึก Downtime สำเร็จ','success');
  renderDowntimePage();
}

  if (error) { showToast('ลบไม่สำเร็จ','error'); return; }
  showToast('ลบแล้ว','success');

}

  motor:'มอเตอร์/เกียร์', pump:'ปั้ม/ไฮดรอลิค',
  belt:'สายพาน/ลูกปืน', screen:'ใบตะแกรง/Wear Part',
  electrical:'ระบบไฟฟ้า', other:'อื่นๆ'
};

async function renderPartsPage() {
  const content = qs('#page-content');
  content.innerHTML = `<div class="flex items-center justify-center py-20 text-gray-400 text-sm"><i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i>กำลังโหลด…</div>`;
  refreshIcons();
  const { data } = await db.from('pm_parts').select('*').order('category').order('name');
  _pmParts = data || [];

  const lowStock = _pmParts.filter(p => p.is_active && p.stock_qty <= p.min_stock && p.min_stock > 0);
  const alertBanner = lowStock.length ? `
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4 flex items-center gap-2 text-red-700 text-sm">
      <i data-lucide="alert-triangle" class="w-4 h-4 flex-shrink-0"></i>
      <span>อะไหล่ใกล้หมด/หมด <strong>${lowStock.length} รายการ</strong>: ${lowStock.map(p=>escapeHtml(p.name)).join(', ')}</span>
    </div>` : '';

  // KPI
  const totalParts = _pmParts.filter(p=>p.is_active).length;
  const totalValue = _pmParts.reduce((s,p)=>(p.is_active?(s + (p.stock_qty||0)*(p.unit_price||0)):s), 0);

  // กลุ่มตาม category
  const grouped = {};
  _pmParts.filter(p=>p.is_active).forEach(p => {
    const c = p.category || 'other';
    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(p);
  });

  const tables = Object.entries(grouped).map(([cat, parts]) => {
    const catLabel = PART_CATS[cat] || cat;
    const rows = parts.map(p => {
      const low = p.min_stock > 0 && p.stock_qty <= p.min_stock;
      const zero = p.stock_qty <= 0;
      const badge = zero ? `<span class="px-2 py-0.5 rounded-full text-xs badge-overdue">หมด</span>`
        : low ? `<span class="px-2 py-0.5 rounded-full text-xs badge-alert">ใกล้หมด</span>`
        : `<span class="px-2 py-0.5 rounded-full text-xs badge-ok">ปกติ</span>`;
      return `<tr class="border-b hover:bg-gray-50">
        <td class="px-3 py-2 text-sm font-medium">${escapeHtml(p.name)}</td>
        <td class="px-3 py-2 text-xs text-slate-500">${p.code||'-'}</td>
        <td class="px-3 py-2 text-sm text-center font-semibold ${zero?'text-red-600':low?'text-amber-600':'text-gray-800'}">${fmtNum(p.stock_qty,2)} ${p.unit||'ชิ้น'}</td>
        <td class="px-3 py-2 text-sm text-center text-gray-500">${fmtNum(p.min_stock,2)}</td>
        <td class="px-3 py-2 text-sm text-center">${fmtNum(p.unit_price,2)} ฿</td>
        <td class="px-3 py-2 text-sm text-center">${fmtNum((p.stock_qty||0)*(p.unit_price||0),2)} ฿</td>
        <td class="px-3 py-2 text-xs text-gray-400">${p.location||'-'}</td>
        <td class="px-3 py-2 text-center">${badge}</td>
        <td class="px-3 py-2 text-center">
          <div class="flex gap-1 justify-center">
            <button onclick="openPartStockInModal('${p.id}')" class="p-1 hover:bg-green-50 rounded text-green-600" title="รับเข้า"><i data-lucide="plus-circle" class="w-3.5 h-3.5"></i></button>
            <button onclick="openEditPartModal('${p.id}')" class="p-1 hover:bg-amber-50 rounded text-amber-600"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
            ${isAdmin()?`<button onclick="deletePart('${p.id}')" class="p-1 hover:bg-red-50 rounded text-red-400"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>`:''}
          </div>
        </td>
      </tr>`;
    }).join('');
    return `
    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-4">
      <div class="px-4 py-2.5 border-b bg-slate-50 font-semibold text-slate-700 text-sm">${catLabel}</div>
      <div class="tbl-wrap" style="max-height:350px;">
        <table class="text-sm w-full">
          <thead><tr class="text-xs text-gray-500 bg-gray-50 border-b">
            <th class="px-3 py-2 text-left">ชื่ออะไหล่</th><th class="px-3 py-2 text-left">รหัส</th>
            <th class="px-3 py-2 text-center">สต็อก</th><th class="px-3 py-2 text-center">ขั้นต่ำ</th>
            <th class="px-3 py-2 text-center">ราคา/หน่วย</th><th class="px-3 py-2 text-center">มูลค่าสต็อก</th>
            <th class="px-3 py-2 text-left">ที่เก็บ</th><th class="px-3 py-2 text-center">สถานะ</th>
            <th class="px-3 py-2 text-center">จัดการ</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('') || `<div class="bg-white rounded-xl shadow-sm p-8 text-center text-gray-400">ยังไม่มีอะไหล่ — กด "+ เพิ่มอะไหล่"</div>`;

  content.innerHTML = `
  ${alertBanner}
  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
    <div class="bg-white rounded-xl shadow-sm p-4 text-center">
      <div class="text-2xl font-bold text-blue-600">${totalParts}</div>
      <div class="text-xs text-gray-500 mt-1">รายการอะไหล่</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 text-center">
      <div class="text-2xl font-bold text-red-500">${lowStock.length}</div>
      <div class="text-xs text-gray-500 mt-1">ใกล้หมด/หมด</div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 text-center col-span-2 md:col-span-1">
      <div class="text-xl font-bold text-green-600">${fmtNum(totalValue,2)} ฿</div>
      <div class="text-xs text-gray-500 mt-1">มูลค่าสต็อกรวม</div>
    </div>
  </div>
  <div class="flex justify-end mb-3">
    ${isManager()?`<button onclick="openAddPartModal()" class="flex items-center gap-1.5 text-sm px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
      <i data-lucide="plus" class="w-4 h-4"></i>เพิ่มอะไหล่
    </button>`:''}
  </div>
  ${tables}`;
  refreshIcons();
}

function openAddPartModal() {
  openModal('เพิ่มอะไหล่', partFormHtml(null),
    `<button onclick="closeModal()" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">ยกเลิก</button>
     <button onclick="savePart(null)" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">บันทึก</button>`,
    '560px');
}

function openEditPartModal(id) {
  const p = _pmParts.find(x => x.id === id);
  if (!p) return;
  openModal('แก้ไขอะไหล่', partFormHtml(p),
    `<button onclick="closeModal()" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">ยกเลิก</button>
     <button onclick="savePart('${id}')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">บันทึก</button>`,
    '560px');
}

async function savePart(id) {
  const name = qs('#part-name')?.value?.trim();
  if (!name) { showToast('กรุณากรอกชื่ออะไหล่','error'); return; }
  const data = {
    name, code: qs('#part-code')?.value?.trim()||null,
    category: qs('#part-cat')?.value||'other',
    unit: qs('#part-unit')?.value?.trim()||'ชิ้น',
    unit_price: parseFloat(qs('#part-price')?.value||0)||0,
    min_stock:  parseFloat(qs('#part-min')?.value||0)||0,
    location:   qs('#part-loc')?.value?.trim()||null,
    notes:      qs('#part-notes')?.value?.trim()||null,
    is_active:  true,
  };
  if (!id) data.stock_qty = parseFloat(qs('#part-stock')?.value||0)||0;
  let err;
  if (id) {
    ({ error: err } = await db.from('pm_parts').update(data).eq('id', id));
  } else {
    ({ error: err } = await db.from('pm_parts').insert(data));
    // บันทึก stock_log ถ้าเริ่มต้นมีสต็อก
    if (!err && data.stock_qty > 0) {
      const { data: inserted } = await db.from('pm_parts').select('id').eq('name', name).order('created_at',{ascending:false}).limit(1).maybeSingle();
      if (inserted) await db.from('pm_parts_stock_log').insert({
        part_id: inserted.id, type:'in', qty: data.stock_qty,
        unit_price: data.unit_price, reference:'ยอดเริ่มต้น', done_by: currentUser?.username
      });
    }
  }
  if (err) { showToast('บันทึกไม่สำเร็จ: '+err.message,'error'); return; }
  closeModal();
  showToast(id?'แก้ไขอะไหล่สำเร็จ':'เพิ่มอะไหล่สำเร็จ','success');
  renderPartsPage();
}

async function deletePart(id) {
  if (!confirm('ลบอะไหล่นี้?')) return;
  await db.from('pm_parts').update({ is_active: false }).eq('id', id);
  showToast('ลบอะไหล่สำเร็จ','success');
  renderPartsPage();
}

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">จำนวนรับเข้า *</label>
          <input id="sin-qty" type="number" step="0.01" min="0.01" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="0" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ราคา/หน่วย (฿)</label>

        </div>
      </div>

        <input id="sin-ref" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="เช่น PO-2026-0123" />
      </div>
    </div>`,
    `<button onclick="closeModal()" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">ยกเลิก</button>
     <button onclick="saveStockIn('${id}','${p.stock_qty}')" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">รับเข้า</button>`,
    '440px');
}

async function saveStockIn(partId, currentQty) {
  const qty = parseFloat(qs('#sin-qty')?.value||0);
  if (!qty || qty <= 0) { showToast('กรุณากรอกจำนวน','error'); return; }
  const price = parseFloat(qs('#sin-price')?.value||0)||0;
  const ref   = qs('#sin-ref')?.value?.trim()||null;
  const newQty = (parseFloat(currentQty)||0) + qty;
  const [r1, r2] = await Promise.all([
    db.from('pm_parts').update({ stock_qty: newQty, unit_price: price||undefined }).eq('id', partId),
    db.from('pm_parts_stock_log').insert({ part_id: partId, type:'in', qty, unit_price: price, reference: ref, done_by: currentUser?.username })
  ]);
  if (r1.error) { showToast('บันทึกไม่สำเร็จ: '+r1.error.message,'error'); return; }
  closeModal();
  showToast(`รับเข้า ${fmtNum(qty,2)} หน่วยสำเร็จ`, 'success');
  renderPartsPage();
}

    db.from('pm_repair_logs').select('*, pm_machines(name,factory)').order('repair_date',{ascending:false}).limit(200),
    db.from('pm_parts').select('*').eq('is_active',true).order('name'),

  const totalCost = _pmRepairs.reduce((s,r) => s + (r.total_cost||0), 0);

    </div>

      <div class="text-xs text-gray-500 mt-1">ค่าซ่อมรวม</div>

function onRepairPartChange(sel) {
  const opt = sel.options[sel.selectedIndex];
  const price = parseFloat(opt.dataset.price||0);
  const priceInput = sel.closest('tr')?.querySelector('.rp-price');
  if (priceInput) priceInput.value = price;
  calcRepairTotal();
}

function calcRepairTotal() {
  let partsTotal = 0;
  qs('#repair-parts-body')?.querySelectorAll('tr').forEach(tr => {
    const qty   = parseFloat(tr.querySelectorAll('input')[0]?.value||0)||0;
    const price = parseFloat(tr.querySelectorAll('input')[1]?.value||0)||0;
    partsTotal += qty * price;
  });
  const labor = parseFloat(qs('#repair-labor')?.value||0)||0;
  if (qs('#repair-parts-cost')) qs('#repair-parts-cost').textContent = fmtNum(partsTotal,2) + ' ฿';
  if (qs('#repair-total-cost')) qs('#repair-total-cost').textContent = fmtNum(partsTotal + labor,2) + ' ฿';
}

async function saveRepair(id) {
  const machine_id = qs('#repair-machine')?.value;
  const repair_date = qs('#repair-date')?.value;
  if (!machine_id) { showToast('กรุณาเลือกเครื่องจักร','error'); return; }
  if (!repair_date) { showToast('กรุณากรอกวันที่','error'); return; }

  // รวบรวมอะไหล่
  const partRows = [];
  let partsCost = 0;
  let hasStockError = false;
  qs('#repair-parts-body')?.querySelectorAll('tr').forEach(tr => {
    const sel   = tr.querySelector('select');
    const inputs = tr.querySelectorAll('input');
    const partId = sel?.value;
    const qty    = parseFloat(inputs[0]?.value||0)||0;
    const price  = parseFloat(inputs[1]?.value||0)||0;
    if (partId && qty > 0) {
      const part = _pmParts.find(p => p.id === partId);
      if (part && part.stock_qty < qty) {
        showToast(`สต็อก "${part.name}" ไม่เพียงพอ (มี ${fmtNum(part.stock_qty,2)}, ต้องการ ${fmtNum(qty,2)})`, 'error');
        hasStockError = true;
      }
      partRows.push({ part_id: partId, part_name: _pmParts.find(p=>p.id===partId)?.name||'', qty_used: qty, unit_price: price });
      partsCost += qty * price;
    }
  });
  if (hasStockError) return;

  const laborCost = parseFloat(qs('#repair-labor')?.value||0)||0;
  const data = {
    machine_id, repair_date,
    type:         qs('#repair-type')?.value||'breakdown',
    symptoms:     qs('#repair-symptoms')?.value?.trim()||null,
    root_cause:   qs('#repair-cause')?.value?.trim()||null,
    action_taken: qs('#repair-action')?.value?.trim()||null,
    technician:   qs('#repair-tech')?.value?.trim()||null,
    duration_hours: parseFloat(qs('#repair-duration')?.value||0)||null,
    labor_cost:   laborCost,
    parts_cost:   partsCost,
    total_cost:   laborCost + partsCost,
    notes:        qs('#repair-notes')?.value?.trim()||null,
    created_by:   currentUser?.username,
  };

  let repairId = id;
  if (!id) {
    const { data: inserted, error } = await db.from('pm_repair_logs').insert(data).select('id').single();
    if (error) { showToast('บันทึกไม่สำเร็จ: '+error.message,'error'); return; }
    repairId = inserted.id;
  } else {
    const { error } = await db.from('pm_repair_logs').update(data).eq('id', id);
    if (error) { showToast('บันทึกไม่สำเร็จ: '+error.message,'error'); return; }
    await db.from('pm_repair_parts').delete().eq('repair_id', id);
  }

  // บันทึกอะไหล่ + หักสต็อก
  if (partRows.length) {
    const rp = partRows.map(r => ({ ...r, repair_id: repairId }));
    await db.from('pm_repair_parts').insert(rp);
    // หักสต็อก
    await Promise.all(partRows.map(async r => {
      const part = _pmParts.find(p => p.id === r.part_id);
      if (!part) return;
      const newQty = (part.stock_qty||0) - r.qty_used;
      await db.from('pm_parts').update({ stock_qty: newQty }).eq('id', r.part_id);
      await db.from('pm_parts_stock_log').insert({
        part_id: r.part_id, type:'out', qty: r.qty_used,
        unit_price: r.unit_price, reference: `ซ่อม ${repair_date}`, done_by: currentUser?.username
      });
    }));
  }

  closeModal();
  showToast('บันทึกการซ่อมสำเร็จ','success');
  renderRepairPage();
}

async function renderPmItemsPage() {
  const content = qs('#page-content');
  content.innerHTML = `<div class="flex items-center justify-center py-20 text-gray-400 text-sm">
    <i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i>กำลังโหลด…</div>`;
  refreshIcons();
  await loadPmData();

  const activeMachines = _pmMachines.filter(m => m.is_active)
    .sort((a,b) => (a.sort_order - b.sort_order) || (a.factory||'').localeCompare(b.factory||''));

  const cards = activeMachines.map(machine => {
    const unit  = machine.meter_type === 'km' ? 'กม.' : 'ชม.';
    const STATUS_PRIORITY = { overdue: 0, alert: 1, ok: 2 };
    const items = _pmItems.filter(i => i.pm_machine_id === machine.id && i.is_active)
      .sort((a, b) => {
        const stA = pmStatus(calcRemaining(a, machine), machine.alert_threshold || 100);
        const stB = pmStatus(calcRemaining(b, machine), machine.alert_threshold || 100);
        const pA  = STATUS_PRIORITY[stA] ?? 2;
        const pB  = STATUS_PRIORITY[stB] ?? 2;
        return pA !== pB ? pA - pB : (a.sort_order - b.sort_order);
      });

    const itemRows = items.length === 0
      ? `<tr><td colspan="5" class="text-center py-4 text-gray-400 text-sm">ยังไม่มีรายการ PM — กด "+ เพิ่ม" เพื่อเริ่ม</td></tr>`
      : items.map(item => {
          const next = calcNextDue(item);
          const rem  = calcRemaining(item, machine);
          const st   = pmStatus(rem, machine.alert_threshold || 100);
          const remColor = st === 'overdue' ? 'text-red-600' : st === 'alert' ? 'text-amber-600' : 'text-green-700';
          return `<tr class="border-b hover:bg-gray-50">
            <td class="px-3 py-2 text-sm">${escapeHtml(item.pm_type)}</td>
            <td class="px-3 py-2 text-sm text-center">${fmtNum(item.interval_value)} ${unit}</td>
            <td class="px-3 py-2 text-sm text-center">${fmtNum(item.last_pm_meter)} ${unit}</td>
            <td class="px-3 py-2 text-sm text-center font-semibold">${fmtNum(next)} ${unit}</td>
            <td class="px-3 py-2 text-sm text-center font-bold ${remColor}">${rem >= 0 ? '+' : ''}${fmtNum(rem)}</td>
            <td class="px-3 py-2 text-center">${pmStatusBadge(st)}</td>
            <td class="px-3 py-2 text-center">
              <div class="flex gap-1 justify-center">
                <button onclick="openEditItemModalFromPage('${item.id}')" class="p-1 hover:bg-amber-50 rounded text-amber-600"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                ${isManager()?`<button onclick="deletePmItem('${item.id}',true)" class="p-1 hover:bg-red-50 rounded text-red-400"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>`:''}
              </div>
            </td>
          </tr>`;
        }).join('');

    return `
    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-4">
      <div class="flex items-center justify-between px-4 py-3 border-b bg-gray-50">
        <div>
          <span class="font-semibold text-gray-800 text-sm">${escapeHtml(machine.name)}</span>
          <span class="ml-2 text-xs text-gray-400">${machine.factory||''} | Meter: ${fmtNum(machine.current_meter)} ${unit}</span>
        </div>
        ${isManager()?`<button onclick="openAddItemModalFromPage('${machine.id}')"
          class="flex items-center gap-1 text-xs px-3 py-1.5 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
          <i data-lucide="plus" class="w-3 h-3"></i>เพิ่ม
        </button>`:''}
      </div>
      <div class="tbl-wrap" style="max-height:340px; overflow-y:scroll;">
        <table class="text-sm w-full">
          <thead><tr class="text-xs text-gray-500 bg-gray-50 border-b">
            <th class="px-3 py-2 text-left sticky top-0 bg-gray-50 z-10">ประเภท PM</th>
            <th class="px-3 py-2 text-center sticky top-0 bg-gray-50 z-10">ระยะ</th>
            <th class="px-3 py-2 text-center sticky top-0 bg-gray-50 z-10">ล่าสุด</th>
            <th class="px-3 py-2 text-center sticky top-0 bg-gray-50 z-10">ถัดไป</th>
            <th class="px-3 py-2 text-center sticky top-0 bg-gray-50 z-10">คงเหลือ</th>
            <th class="px-3 py-2 text-center sticky top-0 bg-gray-50 z-10">สถานะ</th>
            <th class="px-3 py-2 text-center sticky top-0 bg-gray-50 z-10">จัดการ</th>
          </tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('') || `<div class="bg-white rounded-xl shadow-sm p-8 text-center text-gray-400">
    ยังไม่มีเครื่องจักร <a href="#" onclick="navigateTo('pm-machines')" class="text-amber-500 underline">เพิ่มเครื่องจักร</a>
  </div>`;

  content.innerHTML = cards;
  refreshIcons();

function toggleMachineAccordion(id) {
  const el = qs('#'+id);
  if (!el) return;
  const machId = id.replace('acc-','');
  const chevron = qs('#chevron-'+machId);
  if (el.style.maxHeight && el.style.maxHeight !== '0px') {
    el.style.maxHeight = '0px';
    el.style.opacity = '0';
    if (chevron) chevron.style.transform = 'rotate(-90deg)';
  } else {
    el.style.maxHeight = el.scrollHeight + 200 + 'px';
    el.style.opacity = '1';
    if (chevron) chevron.style.transform = 'rotate(0deg)';
  }
}

async function saveMachine(id) {
  const name     = qs('#mach-name')?.value?.trim();
  if (!name) { showToast('กรุณากรอกชื่อเครื่องจักร','error'); return; }
  const syncSource = qs('#mach-sync-source')?.value || 'manual';
  const syncLoaderName = syncSource === 'electric_loader'
    ? (qs('#mach-loader-name')?.value?.trim() || null)
    : null;
  const data = {
    name,
    code             : qs('#mach-code')?.value?.trim()||null,
    factory          : qs('#mach-factory')?.value||null,
    category         : qs('#mach-cat')?.value||null,
    brand            : qs('#mach-brand')?.value?.trim()||null,
    model            : qs('#mach-model')?.value?.trim()||null,
    meter_type       : qs('#mach-meter-type')?.value||'hours',
    current_meter    : parseFloat(qs('#mach-meter')?.value||'0')||0,
    alert_threshold  : parseFloat(qs('#mach-alert')?.value||'100')||100,
    install_date     : qs('#mach-install')?.value||null,
    notes            : qs('#mach-notes')?.value?.trim()||null,
    is_active        : qs('#mach-active')?.checked!==false,
    sync_source      : syncSource,
    sync_loader_name : syncLoaderName,
    meter_1_label    : qs('#mach-m1-label')?.value?.trim() || 'ชม.เครื่องจักร',
    has_meter_2      : qs('#mach-has-m2')?.checked || false,
    meter_2_label    : qs('#mach-m2-label')?.value?.trim() || 'ชม.ไฮโดรลิค',
    current_meter_2  : qs('#mach-has-m2')?.checked ? (parseFloat(qs('#mach-meter2')?.value||'0')||0) : null,
  };
  let err;
  if (id) {
    ({ error: err } = await db.from('pm_machines').update(data).eq('id',id));
  } else {
    ({ error: err } = await db.from('pm_machines').insert(data));
  }
  if (err) { showToast('บันทึกไม่สำเร็จ: '+err.message,'error'); return; }
  closeModal();
  showToast(id?'อัปเดตสำเร็จ':'เพิ่มสำเร็จ','success');
  await loadPmData();
  renderMachinesPage();
}

async function deleteMachine(id) {

  if (!confirm(`ลบเครื่องจักร "${m?.name}"?\n(รายการ PM ทั้งหมดของเครื่องนี้จะถูกลบด้วย)`)) return;

function togglePmTypeInput(sel) {
  const custom = qs('#item-type-custom');
  if (!custom) return;
  if (sel.value === '__custom__') {
    custom.classList.remove('hidden');
    custom.focus();
  } else {
    custom.classList.add('hidden');
    custom.value = '';
  }
}

async function savePmItem(id, machineId, reopenModal=true) {
  const sel = qs('#item-type-sel');
  const pm_type = sel?.value === '__custom__'
    ? (qs('#item-type-custom')?.value?.trim() || '')
    : (sel?.value?.trim() || '');
  const interval_val  = parseFloat(qs('#item-interval')?.value||'');
  if (!pm_type)               { showToast('กรุณากรอกประเภท PM','error'); return; }
  if (isNaN(interval_val)||interval_val<=0) { showToast('กรุณากรอกระยะ PM','error'); return; }

  const data = {
    pm_machine_id : machineId,
    pm_type,
    interval_value : interval_val,
    last_pm_meter  : parseFloat(qs('#item-last-meter')?.value||'0')||0,
    last_pm_date   : qs('#item-last-date')?.value||null,
    sort_order     : parseInt(qs('#item-order')?.value||'0')||0,
    notes          : qs('#item-notes')?.value?.trim()||null,
    is_active      : qs('#item-active')?.checked!==false,
  };

  let err;
  if (id) {
    ({ error: err } = await db.from('pm_items').update(data).eq('id',id));
    if (err) { showToast('บันทึกไม่สำเร็จ: '+err.message,'error'); return; }
    // อัปเดต _pmItems ทันที
    const idx = _pmItems.findIndex(i=>i.id===id);
    if (idx>=0) _pmItems[idx] = { ..._pmItems[idx], ...data };
  } else {
    let newItem;
    ({ data: newItem, error: err } = await db.from('pm_items').insert(data).select().single());
    if (err) { showToast('บันทึกไม่สำเร็จ: '+err.message,'error'); return; }
    if (newItem) _pmItems.push(newItem);  // เพิ่มเข้า state ทันที ไม่ต้องรอ reload
  }
  showToast(id?'อัปเดตสำเร็จ':'เพิ่มสำเร็จ','success');
  if (reopenModal) openPmItemsModal(machineId);  // เรียกจาก pm-machines modal (เดิม)
}

async function deletePmItem(id, fromItemsPage=false) {

async function loadReportData() {
  const year  = parseInt(qs('#rpt-year')?.value  || new Date().getFullYear());
  const month = parseInt(qs('#rpt-month')?.value || 0);
  const fac   = qs('#rpt-fac')?.value || '';

  // คำนวณช่วงวันที่
  let dateFrom, dateTo;
  if (month === 0) {
    dateFrom = `${year}-01-01`;
    dateTo   = `${year}-12-31`;
  } else {
    const lastDay = new Date(year, month, 0).getDate();
    dateFrom = `${year}-${String(month).padStart(2,'0')}-01`;
    dateTo   = `${year}-${String(month).padStart(2,'0')}-${lastDay}`;
  }

  // โหลด pm_logs ตามช่วงวัน
  let logsQ = db.from('pm_logs').select('*,pm_machines(id,name,factory,meter_type)')
    .gte('done_date', dateFrom).lte('done_date', dateTo);
  const { data: logs } = await logsQ;

  // โหลด pm_repair_logs ตามช่วงวัน
  let repQ = db.from('pm_repair_logs').select('*,pm_machines(id,name,factory)')
    .gte('repair_date', dateFrom).lte('repair_date', dateTo);
  const { data: repairs } = await repQ;

  // กรองโรงงาน
  const filteredLogs    = (logs    || []).filter(r => !fac || r.pm_machines?.factory === fac);
  const filteredRepairs = (repairs || []).filter(r => !fac || r.pm_machines?.factory === fac);

  // คำนวณ PM ค้าง (pm_items ที่เกินกำหนดในช่วงนี้)
  const machines = fac ? _pmMachines.filter(m=>m.factory===fac) : _pmMachines;
  let overdueCount = 0;
  machines.forEach(m => {
    const items = _pmItems.filter(i=>i.pm_machine_id===m.id && i.is_active);
    items.forEach(item => {
      const rem = calcRemaining(item, m);
      if (rem < 0) overdueCount++;
    });
  });

  // KPI
  const totalPm      = filteredLogs.length;
  const totalRepair  = filteredRepairs.length;
  const totalCost    = filteredRepairs.reduce((s,r)=>s+(r.total_cost||0), 0);

function exportReportExcel() {
  const table = qs('#rpt-machine-table');

  const year  = qs('#rpt-year')?.value  || '';
  const month = qs('#rpt-month')?.value || '0';
  const MN = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const period = month==='0' ? `ปี ${parseInt(year)+543}` : `${MN[parseInt(month)]} ${parseInt(year)+543}`;
  if (typeof XLSX === 'undefined') { showToast('ไม่พบ XLSX library','error'); return; }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.table_to_sheet(table);
  XLSX.utils.book_append_sheet(wb, ws, 'รายงาน PM');
  XLSX.writeFile(wb, `PM_Report_${period}.xlsx`);
}

async function loadOeeData() {
  const year  = parseInt(qs('#oee-year')?.value  || new Date().getFullYear());
  const month = parseInt(qs('#oee-month')?.value || 0);
  const fac   = qs('#oee-fac')?.value || '';

  let dateFrom, dateTo, totalCalendarHours;
  if (month === 0) {
    dateFrom = `${year}-01-01`;
    dateTo   = `${year}-12-31`;
    const daysInYear = (year%4===0&&(year%100!==0||year%400===0)) ? 366 : 365;
    totalCalendarHours = daysInYear * 24;
  } else {
    const lastDay = new Date(year, month, 0).getDate();
    dateFrom = `${year}-${String(month).padStart(2,'0')}-01`;
    dateTo   = `${year}-${String(month).padStart(2,'0')}-${lastDay}`;
    totalCalendarHours = lastDay * 24;
  }

  const { data: downtimes } = await db.from('pm_downtime')
    .select('*,pm_machines(id,name,factory)')
    .gte('start_time', dateFrom + 'T00:00:00')
    .lte('start_time', dateTo   + 'T23:59:59');

  const filtered = (downtimes||[]).filter(r => !fac || r.pm_machines?.factory === fac);

  // รวม downtime ต่อเครื่อง
  const machMap = {};
  filtered.forEach(r => {
    const mid  = r.pm_machine_id;
    const name = r.pm_machines?.name || '-';
    const fct  = r.pm_machines?.factory || '-';
    if (!machMap[mid]) machMap[mid] = { name, factory:fct, totalDownHours:0, breakdownHours:0, plannedHours:0, events:0 };
    const hrs = r.duration_hours || 0;
    machMap[mid].totalDownHours += hrs;
    machMap[mid].events++;
    if (r.type === 'breakdown')   machMap[mid].breakdownHours += hrs;
    if (r.type === 'planned_pm')  machMap[mid].plannedHours   += hrs;
  });

  const machines = Object.values(machMap);
  const totalDown = machines.reduce((s,m)=>s+m.totalDownHours,0);
  const avgAvail  = machines.length
    ? machines.reduce((s,m)=>s+Math.max(0,100-(m.totalDownHours/totalCalendarHours*100)),0)/machines.length
    : 100;

  // KPI
  const kpiEl = qs('#oee-kpi');
  if (kpiEl) kpiEl.innerHTML = [
    { label:'Availability เฉลี่ย', value: avgAvail.toFixed(1)+'%', color:'blue'   },
    { label:'Downtime รวม',         value: fmtNum(totalDown)+' ชม.', color:'red'    },
    { label:'เหตุการณ์ทั้งหมด',    value: filtered.length+' ครั้ง', color:'amber'  },
    { label:'เครื่องที่มีข้อมูล',   value: machines.length+' เครื่อง', color:'gray' },
  ].map(k=>`
    <div class="bg-white rounded-2xl shadow-sm p-4">
      <p class="text-xs text-gray-500 mb-1">${k.label}</p>
      <p class="text-2xl font-bold text-${k.color}-600">${k.value}</p>
    </div>`).join('');

  // ตารางรายเครื่อง
  const wrap = qs('#oee-table-wrap');
  if (!wrap) return;
  if (!machines.length) {
    wrap.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">ไม่มีข้อมูล Downtime ในช่วงที่เลือก</div>';
    return;
  }

  machines.sort((a,b)=>b.totalDownHours-a.totalDownHours);

  wrap.innerHTML = `
    <div class="px-5 py-3 border-b flex items-center justify-between">
      <h3 class="text-sm font-semibold text-gray-700">Availability รายเครื่อง</h3>
      <span class="text-xs text-gray-400">ชั่วโมงปฏิทิน ${fmtNum(totalCalendarHours)} ชม./เครื่อง</span>
    </div>
    <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-xs text-gray-500">
        <tr>
          <th class="text-left px-4 py-2.5">เครื่องจักร</th>
          <th class="text-left px-4 py-2.5">โรงงาน</th>
          <th class="text-right px-4 py-2.5">Downtime (ชม.)</th>
          <th class="text-right px-4 py-2.5">Breakdown</th>
          <th class="text-right px-4 py-2.5">Planned PM</th>
          <th class="text-right px-4 py-2.5">เหตุการณ์</th>
          <th class="text-right px-4 py-2.5">Availability</th>
        </tr>
      </thead>
      <tbody>
        ${machines.map(m => {
          const avail = Math.max(0, 100 - (m.totalDownHours / totalCalendarHours * 100));
          const color = avail >= 90 ? 'green' : avail >= 75 ? 'amber' : 'red';
          const barW  = Math.min(100, avail).toFixed(1);
          return `<tr class="border-t hover:bg-gray-50">
            <td class="px-4 py-3 font-medium text-gray-800">${escapeHtml(m.name)}</td>
            <td class="px-4 py-3 text-gray-500">${escapeHtml(m.factory)}</td>
            <td class="px-4 py-3 text-right text-red-600 font-medium">${fmtNum(m.totalDownHours)}</td>
            <td class="px-4 py-3 text-right text-orange-500">${fmtNum(m.breakdownHours)}</td>
            <td class="px-4 py-3 text-right text-blue-500">${fmtNum(m.plannedHours)}</td>
            <td class="px-4 py-3 text-right">${m.events}</td>
            <td class="px-4 py-3 text-right">
              <div class="flex items-center gap-2 justify-end">
                <div class="w-20 bg-gray-200 rounded-full h-1.5 overflow-hidden">
                  <div class="h-1.5 rounded-full bg-${color}-500" style="width:${barW}%"></div>
                </div>
                <span class="text-${color}-600 font-semibold text-xs w-12 text-right">${avail.toFixed(1)}%</span>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;

  refreshIcons();
}

// =====================================================================
// SECTION 16B: SYNC CURRENT METER จาก SYSTEM 1
// =====================================================================
async function syncCurrentMeters() {
  const toSync = _pmMachines.filter(m => m.is_active && m.sync_source && m.sync_source !== 'manual');
  if (!toSync.length) return;

  const PROD_TABLES = ['production_cde','production_propel','production_sanon1','production_sanon2'];

  // query แต่ละแหล่งพร้อมกัน
  const tasks = toSync.map(async machine => {
    try {
      let newMeter = null;

      if (PROD_TABLES.includes(machine.sync_source)) {
        // ดึง stop_hour ล่าสุด (= Hour Meter ณ สิ้นวัน)
        const { data } = await db.from(machine.sync_source)
          .select('stop_hour, production_date')
          .not('stop_hour', 'is', null)
          .order('production_date', { ascending: false })
          .limit(1)
          .maybeSingle();
        if (data?.stop_hour != null) newMeter = Number(data.stop_hour);

      } else if (machine.sync_source === 'electric_loader') {
        // ดึง machine_hour_stop ล่าสุด กรองตาม loader_name
        let q = db.from('electric_loader')
          .select('machine_hour_stop, work_date')
          .not('machine_hour_stop', 'is', null)
          .order('work_date', { ascending: false })
          .limit(1);
        if (machine.sync_loader_name) q = q.eq('loader_name', machine.sync_loader_name);
        const { data } = await q.maybeSingle();
        if (data?.machine_hour_stop != null) newMeter = Number(data.machine_hour_stop);
      }

      // อัปเดตเฉพาะถ้าค่าใหม่สูงกว่าค่าปัจจุบัน
      if (newMeter != null && newMeter > (machine.current_meter || 0)) {
        await db.from('pm_machines').update({ current_meter: newMeter }).eq('id', machine.id);
        machine.current_meter = newMeter;  // อัปเดต in-memory ด้วย
      }
    } catch(e) { console.warn('[PM Sync]', machine?.name, e?.message || e); }
  });

  await Promise.all(tasks);
}

async function syncAndRefreshMachines() {
  showToast('กำลังซิงค์ชั่วโมงจากระบบ 1…','info');
  await syncCurrentMeters();
  renderMachinesPage();
}

// =====================================================================
async function loadPmData() {
  const [{ data: machines }, { data: items }, { data: cfg }, { data: cfgTypes }, { data: cfgFac }] = await Promise.all([
    db.from('pm_machines').select('*').order('sort_order').order('factory'),
    db.from('pm_items').select('*').order('pm_machine_id').order('sort_order'),
    db.from('pm_config').select('*').eq('key','categories').maybeSingle(),
    db.from('pm_config').select('*').eq('key','pm_types').maybeSingle(),
    db.from('pm_config').select('*').eq('key','factories').maybeSingle(),
  ]);
  _pmMachines = machines || [];
  _pmItems    = items    || [];
  if (cfg?.value)      _pmCategories = cfg.value.split(',').map(s=>s.trim()).filter(Boolean);
  if (cfgTypes?.value) _pmTypes      = cfgTypes.value.split(',').map(s=>s.trim()).filter(Boolean);
  if (cfgFac?.value)   _pmFactories  = cfgFac.value.split(',').map(s=>s.trim()).filter(Boolean);
}

let _meterSelectedMachine = '';   // id เครื่องที่เลือก
let _meterFilterMonth     = '';   // 'YYYY-MM' หรือ '' = ทั้งหมด

// กรองเฉพาะเครื่องที่ต้องกรอก meter เอง:
// 1. sync_source='manual' (ไม่มี auto-sync meter 1)
// 2. has_meter_2=true (มิเตอร์ 2 ต้องกรอกเสมอ)
function getMeterMachines() {
  return _pmMachines.filter(m =>
    m.is_active && (
      (!m.sync_source || m.sync_source === 'manual') ||
      m.has_meter_2 === true
    )
  );
}

  if (!_meterSelectedMachine || !machines.find(m => m.id === _meterSelectedMachine)) {

function calcMonthHours(logs, field, filterMonth = '') {
  const now = new Date();
  const ym  = filterMonth || `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  // ถ้ากรองเดือนอยู่แล้ว logs ทั้งหมดอยู่ในเดือนนั้น ไม่ต้อง filter ซ้ำ
  const rows = filterMonth ? logs : logs.filter(r => r.log_date && r.log_date.startsWith(ym));
  return rows.reduce((s, r) => s + (Number(r[field]) || 0), 0);
}
