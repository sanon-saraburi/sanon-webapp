function calcMeterHours(type) {
  const start = parseFloat(qs(`#ml-${type}-start`)?.value) || 0;
  const stop  = parseFloat(qs(`#ml-${type}-stop`)?.value)  || 0;
  const hrs   = Math.max(0, stop - start);
  const el    = qs(`#ml-${type}-hrs`);
  if (el) el.textContent = hrs.toFixed(1);
}

async function saveMeterLog() {
  const selMachine = _pmMachines.find(m => m.id === _meterSelectedMachine);
  if (!selMachine) return;

  const log_date     = qs('#ml-date')?.value;
  if (!log_date) { showToast('กรุณาเลือกวันที่','error'); return; }

  const engine_start    = parseFloat(qs('#ml-eng-start')?.value) || null;
  const engine_stop     = parseFloat(qs('#ml-eng-stop')?.value)  || null;
  const engine_hours    = (engine_stop != null && engine_start != null) ? Math.max(0, engine_stop - engine_start) : null;
  const hydraulic_start = parseFloat(qs('#ml-hyd-start')?.value) || null;
  const hydraulic_stop  = parseFloat(qs('#ml-hyd-stop')?.value)  || null;
  const hydraulic_hours = (hydraulic_stop != null && hydraulic_start != null) ? Math.max(0, hydraulic_stop - hydraulic_start) : null;
  const breakdown_count = parseInt(qs('#ml-bd-count')?.value) || 0;
  const breakdown_min   = parseInt(qs('#ml-bd-min')?.value)   || 0;
  const notes           = qs('#ml-notes')?.value?.trim() || null;

  const payload = {
    machine_id: _meterSelectedMachine, log_date,
    engine_start, engine_stop, engine_hours,
    hydraulic_start, hydraulic_stop, hydraulic_hours,
    breakdown_count, breakdown_min, notes,
    created_by: currentUser?.username || null
  };

  const { error } = await db.from('pm_meter_logs').insert(payload);
  if (error) { showToast('บันทึกไม่สำเร็จ: '+error.message,'error'); return; }

  // อัปเดต current_meter ใน pm_machines อัตโนมัติ
  const updates = {};
  if (engine_stop != null && engine_stop > (selMachine.current_meter || 0)) {
    updates.current_meter = engine_stop;
    selMachine.current_meter = engine_stop;
  }
  if (hydraulic_stop != null && hydraulic_stop > (selMachine.current_meter_2 || 0)) {
    updates.current_meter_2 = hydraulic_stop;
    selMachine.current_meter_2 = hydraulic_stop;
  }
  if (Object.keys(updates).length > 0) {
    await db.from('pm_machines').update(updates).eq('id', _meterSelectedMachine);
  }

  closeModal();
  showToast('บันทึกเลขมิเตอร์สำเร็จ','success');
  renderMeterTable();
}

async function deleteMeterLog(id) {
  if (!confirm('ลบรายการนี้?')) return;
  const { error } = await db.from('pm_meter_logs').delete().eq('id', id);
  if (error) { showToast('ลบไม่สำเร็จ: '+error.message,'error'); return; }
  showToast('ลบสำเร็จ','success');
  renderMeterTable();
}

function parseDateTH(str) {
  if (!str) return null;
  str = String(str).trim();

  let d, m, y;

  // แยกด้วย - หรือ /
  const parts = str.includes('/') ? str.split('/') : str.split('-');
  if (parts.length !== 3) return null;

  const [p1, p2, p3] = parts.map(Number);

  // ถ้า part แรก > 31 → year อยู่หน้า (YYYY-MM-DD หรือ YY-MM-DD)
  if (p1 > 31) { y = p1; m = p2; d = p3; }
  else          { d = p1; m = p2; y = p3; }  // DD/MM/YYYY หรือ DD/MM/YY

  // แปลงปี
  if (y < 100)       y = y + 1957;  // พ.ศ. 2 หลัก: 69 → 69+1957 = 2026
  else if (y > 2500) y = y - 543;   // พ.ศ. 4 หลัก: 2569 → 2026
  // ถ้า y <= 2500 และ >= 100 → ค.ศ. ปกติ ใช้ตรง

  if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseCsvFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { showToast('ไฟล์ไม่มีข้อมูล','error'); return; }

    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    const rows = [];
    const selMachine = _pmMachines.find(m => m.id === _meterSelectedMachine);
    const hasHyd = selMachine?.has_meter_2;

    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      const get  = key => {
        const idx = headers.indexOf(key);
        return idx >= 0 ? cols[idx]?.trim() : '';
      };

      const date = parseDateTH(get('date'));
      if (!date) continue;

      const engStart = parseFloat(get('eng_start'))  || null;
      const engStop  = parseFloat(get('eng_stop'))   || null;
      const hydStart = hasHyd ? (parseFloat(get('hyd_start')) || null) : null;
      const hydStop  = hasHyd ? (parseFloat(get('hyd_stop'))  || null) : null;
      const bdCount  = parseInt(get('bd_count'))  || 0;
      const bdMin    = parseInt(get('bd_min'))    || 0;

      const engHrs = (engStop != null && engStart != null) ? Math.max(0, engStop - engStart) : null;
      const hydHrs = (hydStop != null && hydStart != null) ? Math.max(0, hydStop - hydStart) : null;

      rows.push({ date, engStart, engStop, engHrs, hydStart, hydStop, hydHrs, bdCount, bdMin });
    }

    _csvRows = rows;
    const body = qs('#csv-preview-body');
    if (body) {
      body.innerHTML = rows.map(r => `
        <tr class="border-b hover:bg-gray-50">
          <td class="px-2 py-1 font-medium">${r.date}</td>
          <td class="px-2 py-1 text-right">${r.engStart ?? '-'}</td>
          <td class="px-2 py-1 text-right">${r.engStop ?? '-'}</td>
          <td class="px-2 py-1 text-right font-semibold text-blue-600">${r.engHrs != null ? r.engHrs.toFixed(1) : '-'}</td>
          ${hasHyd ? `
          <td class="px-2 py-1 text-right">${r.hydStart ?? '-'}</td>
          <td class="px-2 py-1 text-right">${r.hydStop ?? '-'}</td>
          <td class="px-2 py-1 text-right font-semibold text-teal-600">${r.hydHrs != null ? r.hydHrs.toFixed(1) : '-'}</td>
          ` : ''}
          <td class="px-2 py-1 text-center">${r.bdCount > 0 ? `<span class="badge-overdue px-1.5 rounded text-xs">${r.bdCount}</span>` : '-'}</td>
          <td class="px-2 py-1 text-green-600">✓</td>
        </tr>`).join('');
    }
    const countEl = qs('#csv-count');
    if (countEl) countEl.textContent = rows.length;
    qs('#csv-preview')?.classList.remove('hidden');
    const btn = qs('#csv-import-btn');
    if (btn) btn.disabled = rows.length === 0;
  };
  reader.readAsText(file, 'UTF-8');
}

async function importCsvData() {
  if (!_csvRows.length) return;
  const machineId = _meterSelectedMachine;
  const btn = qs('#csv-import-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังนำเข้า…'; }

  // สร้าง payload ทุกแถว
  const payload = _csvRows.map(r => ({
    machine_id     : machineId,
    log_date       : r.date,
    engine_start   : r.engStart,
    engine_stop    : r.engStop,
    engine_hours   : r.engHrs,
    hydraulic_start: r.hydStart,
    hydraulic_stop : r.hydStop,
    hydraulic_hours: r.hydHrs,
    breakdown_count: r.bdCount,
    breakdown_min  : r.bdMin,
    created_by     : currentUser?.username || null,
  }));

  // upsert ทีละ 50 แถว (ป้องกัน payload ใหญ่เกิน)
  let imported = 0;
  for (let i = 0; i < payload.length; i += 50) {
    const chunk = payload.slice(i, i + 50);
    const { error } = await db.from('pm_meter_logs')
      .upsert(chunk, { onConflict: 'machine_id,log_date', ignoreDuplicates: false });
    if (error) { showToast('นำเข้าผิดพลาด: '+error.message,'error'); if (btn) btn.disabled = false; return; }
    imported += chunk.length;
  }

  // อัปเดต current_meter ด้วยค่า stop สูงสุด
  const maxEng = Math.max(..._csvRows.map(r => r.engStop || 0).filter(v => v > 0));
  const maxHyd = Math.max(..._csvRows.map(r => r.hydStop || 0).filter(v => v > 0));
  const selMachine = _pmMachines.find(m => m.id === machineId);
  const updates = {};
  if (maxEng > (selMachine?.current_meter || 0)) { updates.current_meter = maxEng; }
  if (maxHyd > (selMachine?.current_meter_2 || 0)) { updates.current_meter_2 = maxHyd; }
  if (Object.keys(updates).length > 0) {
    await db.from('pm_machines').update(updates).eq('id', machineId);
    if (selMachine) Object.assign(selMachine, updates);
  }

  closeModal();
  _csvRows = [];
  showToast(`นำเข้าสำเร็จ ${imported} รายการ`,'success');
  renderMeterTable();
}

function downloadCsvTemplate(e) {
  e.preventDefault();
  const selMachine = _pmMachines.find(m => m.id === _meterSelectedMachine);
  const hasHyd = selMachine?.has_meter_2;
  const header = hasHyd
    ? 'date,eng_start,eng_stop,hyd_start,hyd_stop,bd_count,bd_min'
    : 'date,eng_start,eng_stop,bd_count,bd_min';
  const sample = hasHyd
    ? '2026-07-01,5760.0,5769.3,4382.3,4386.9,0,0'
    : '2026-07-01,5760.0,5769.3,0,0';
  const blob = new Blob([header+'\n'+sample], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = 'meter_template.csv'; a.click();
  URL.revokeObjectURL(url);
}

        <label class="flex items-center gap-2 text-sm font-semibold text-teal-800 cursor-pointer">
          <input id="am-use-m2" type="checkbox" onchange="toggleAmMeter2()" class="rounded">
          บันทึกมิเตอร์ชั่วโมงที่ 2 (เช่น ไฮโดรลิค)
        </label>
        <div id="am-m2-fields" class="hidden grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-600">ชื่อมิเตอร์ 2</label>
            <input id="am-m2-label" type="text" value="ชม.ไฮโดรลิค"
              class="w-full border rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-teal-400">
          </div>
          <div>
            <label class="text-xs text-gray-600">เลขมิเตอร์ปัจจุบัน</label>
            <input id="am-m2-current" type="number" step="0.1" placeholder="0.0"
              class="w-full border rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-teal-400">
          </div>
        </div>
      </div>

      <div>
        <label class="text-xs text-gray-600">แจ้งเตือนก่อนถึงรอบ PM (ชม.)</label>
        <input id="am-alert" type="number" value="100"
          class="w-full border rounded-lg px-3 py-2 text-sm mt-1 focus:outline-none focus:ring-2 focus:ring-gray-300">
      </div>
    </div>`,
    `<button onclick="closeModal()" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">ยกเลิก</button>
     <button onclick="saveAddMeterMachine()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">เพิ่มเครื่องจักร</button>`,
    '520px'
  );
}

function toggleAmMeter1() {
  const checked = qs('#am-use-m1')?.checked;
  const fields  = qs('#am-m1-fields');
  if (fields) fields.classList.toggle('hidden', !checked);
}
function toggleAmMeter2() {
  const checked = qs('#am-use-m2')?.checked;
  const fields  = qs('#am-m2-fields');
  if (fields) fields.classList.toggle('hidden', !checked);
}
function toggleAmLoaderName() {
  const src   = qs('#am-sync-source')?.value;
  const field = qs('#am-loader-name-field');
  if (field) field.classList.toggle('hidden', src !== 'electric_loader');
}

async function saveAddMeterMachine() {
  const name = qs('#am-name')?.value?.trim();
  if (!name) { showToast('กรุณากรอกชื่อเครื่องจักร','error'); return; }

  const useM1      = qs('#am-use-m1')?.checked || false;
  const useM2      = qs('#am-use-m2')?.checked || false;
  const syncSource = useM1 ? (qs('#am-sync-source')?.value || 'manual') : 'manual';
  const syncLoader = syncSource === 'electric_loader'
    ? (qs('#am-loader-name')?.value?.trim() || null) : null;

  const payload = {
    name,
    code             : qs('#am-code')?.value?.trim() || null,
    factory          : qs('#am-factory')?.value || null,
    meter_type       : 'hours',
    current_meter    : useM1 ? (parseFloat(qs('#am-m1-current')?.value) || 0) : 0,
    meter_1_label    : useM1 ? (qs('#am-m1-label')?.value?.trim() || 'ชม.เครื่องจักร') : 'ชม.เครื่องจักร',
    sync_source      : syncSource,
    sync_loader_name : syncLoader,
    has_meter_2      : useM2,
    meter_2_label    : useM2 ? (qs('#am-m2-label')?.value?.trim() || 'ชม.ไฮโดรลิค') : 'ชม.ไฮโดรลิค',
    current_meter_2  : useM2 ? (parseFloat(qs('#am-m2-current')?.value) || 0) : null,
    alert_threshold  : parseFloat(qs('#am-alert')?.value) || 100,
    is_active        : true,
  };

  const { data, error } = await db.from('pm_machines').insert(payload).select().single();
  if (error) { showToast('เพิ่มไม่สำเร็จ: '+error.message,'error'); return; }

  await loadPmData();
  _meterSelectedMachine = data.id;
  closeModal();
  showToast(`เพิ่ม "${name}" สำเร็จ`,'success');
  renderMeterTable();
}

// =====================================================================
// SECTION 19: BOOTSTRAP
// =====================================================================
async function bootstrap() {
  if (await restoreSession()) {
    if (!canAccessPmSystem()) {
      currentUser = null;
      try { sessionStorage.removeItem(SESSION_KEY); } catch(_) {}
      renderAccessDenied(true);
      return;
    }
    await loadPmData();
    renderShell();
    // กู้คืนหน้าล่าสุด — ถ้าไม่มีให้ไป dashboard
    let lastPage = 'pm-dashboard';
    try { lastPage = sessionStorage.getItem(PAGE_KEY) || 'pm-dashboard'; } catch(_) {}
    await navigateTo(lastPage);
  } else {
    renderLanding();
  }
}

bootstrap();
</script>
</body>
</html>
