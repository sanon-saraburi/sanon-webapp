async function fetchLatestMeterStop(locationName, waterSourceId) {
  if (!locationName && !waterSourceId) return null;
  // normalize: ลบช่องว่างหลัง ( และก่อน ) + collapse spaces + trim + lowercase
  const norm = s => String(s || '')
    .replace(/\(\s+/g, '(').replace(/\s+\)/g, ')')
    .replace(/\s+/g, ' ').trim().toLowerCase();
  // สร้าง base query ใหม่ทุกครั้ง (ป้องกัน filter ติดข้ามกัน)
  const makeQ = () => db.from('groundwater_usage')
    .select('meter_stop, usage_date, location, water_source_id')
    .not('meter_stop', 'is', null)
    .order('usage_date', { ascending: false })
    .order('id', { ascending: false });
  try {
    // query 1: water_source_id ตรงๆ (record จากฟอร์ม)
    if (waterSourceId) {
      const { data } = await makeQ().eq('water_source_id', waterSourceId).limit(1);
      if (data && data.length && data[0].meter_stop != null) return data[0];
    }
    // query 2: JS-side match — fetch recent records แล้ว normalize เปรียบเทียบ
    const target = norm(locationName);
    const { data } = await makeQ().limit(500);
    if (data) {
      const match = data.find(r => norm(r.location) === target);
      if (match && match.meter_stop != null) return match;
    }
    return null;
  } catch(e) { console.error(e); return null; }
}

  if (locSel) {
    locSel.addEventListener('change', async (e) => {
      const locationName = e.target.value;

// คาดหวังหัวคอลัมน์ในไฟล์ Excel: วันที่(usage_date), สถานที่(location), มิเตอร์เริ่ม(meter_start), มิเตอร์สิ้นสุด(meter_stop), หมายเหตุ(note)
// usage_cum คำนวณอัตโนมัติจาก meter_stop - meter_start
async function importGroundwaterExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = await readFileToJson(file);
    if (!json.length) { showToast('ไฟล์ไม่มีข้อมูล', 'warning'); return; }
    // โหลด water_sources เพื่อ lookup water_source_id และ canonical name
    await loadWaterSourcesCacheForUsage();
    const wsMap = {};
    (_mWaterSources || []).forEach(ws => { wsMap[ws.name.trim().toLowerCase()] = ws; });
    const rows = json.map(row => {
      const meterStart = Number(row['meter_start'] !== '' ? row['meter_start'] : null) || Number(row['มิเตอร์เริ่ม']) || 0;
      const meterStop = Number(row['meter_stop'] !== '' ? row['meter_stop'] : null) || Number(row['มิเตอร์สิ้นสุด']) || 0;
      const rawLoc = String(row['location'] || row['สถานที่'] || '').trim();
      // ค้นหา water_source ที่ตรงกัน (case-insensitive)
      const matched = wsMap[rawLoc.toLowerCase()];
      return {
        usage_date: normalizeDateStr(row['usage_date'] || row['วันที่'] || ''),
        location: matched ? matched.name : (rawLoc || null),
        water_source_id: matched ? matched.id : null,
        factory_id: matched ? matched.factory_id : null,
        meter_start: meterStart,
        meter_stop: meterStop,
        usage_cum: meterStop - meterStart,
        note: String(row['note'] !== '' ? row['note'] : (row['หมายเหตุ'] || '')).trim() || null,
        status: productionRowStatusForRole(),
        created_by: currentUser ? currentUser.id : null,
      };
    });
    const { error } = await db.from('groundwater_usage').insert(rows);
    if (error) throw error;
    showToast(`นำเข้าข้อมูลสำเร็จ ${rows.length} รายการ`, 'success');
    e.target.value = '';
    _mWaterAvailableMonths = null; // refresh month list
    loadManageGroundwater();
  } catch (err) {
    console.error(err);
    showToast('นำเข้าข้อมูลล้มเหลว: ' + (err.message || ''), 'error');
  }
}

  document.getElementById('approvals-to').addEventListener('change', (e) => { _approvalFilter.to = e.target.value; renderApprovalSections(plantKeys); });
  document.getElementById('approvals-approver-filter').addEventListener('change', () => renderApprovalHistoryList());

  loadApprovalsData(plantKeys);
  loadApprovalHistory();
}

async function loadApprovalUsersLookup() {
  if (Object.keys(_approvalUsersLookup).length) return;
  try {
    const { data } = await db.from('app_users').select('id, full_name, username').eq('status','active');
    (data || []).forEach(u => { _approvalUsersLookup[u.id] = u.full_name || u.username || '-'; });
  } catch (_) {}
}

async function loadApprovalsData(plantKeys) {
  const sectionsEl = document.getElementById('approvals-sections');
  if (sectionsEl) sectionsEl.innerHTML = plantKeys.map(() => skeletonBlock('h-56')).join('');
  await loadApprovalUsersLookup();
  try {
    // หา factory ids ที่ user มีสิทธิ์ (สำหรับกรอง loader/water ที่ไม่มี department ตรงๆ ในตาราง)
    const depts = approvalDepartmentsForUser(currentUser);
    let allowedFactoryIds = null;
    if (depts) {
      const { data: factoriesData } = await db.from('factories').select('id, name');
      allowedFactoryIds = (factoriesData || [])
        .filter(f => depts.some(d => normalizeFactoryName(f.name) === d))
        .map(f => f.id);
    }

    const results = await Promise.all(plantKeys.map(k => {
      if (isProductionApprovalKey(k)) {
        return db.from(APPROVAL_TABLE_MAP[k]).select('*').eq('status', 'pending').order('production_date', { ascending: false });
      }
      if (k === 'loader') {
        let q = db.from('electric_loader').select('*').eq('status', 'pending').order('work_date', { ascending: false });
        if (depts) q = q.in('factory_name', depts);
        return q;
      }
      if (k === 'water') {
        let q = db.from('groundwater_usage').select('*, water_sources(name)').eq('status', 'pending').order('usage_date', { ascending: false });
        if (allowedFactoryIds) q = q.in('factory_id', allowedFactoryIds.length ? allowedFactoryIds : ['00000000-0000-0000-0000-000000000000']);
        return q;
      }
      return Promise.resolve({ data: [], error: null });
    }));
    plantKeys.forEach((k, i) => {
      if (results[i].error) throw results[i].error;
      _approvalsData[k] = results[i].data || [];
    });
    renderApprovalSections(plantKeys);
  } catch (err) {
    console.error(err);
    if (sectionsEl) sectionsEl.innerHTML = errorBlock();
    refreshIcons();
  }
}

async function _saveApprovalEdit(plantKey, row, cfg, andApprove) {
  const numOrNull2 = v => { const n = parseFloat(v); return isNaN(n) ? null : n; };
  const strOrNull = v => (v && v.trim()) ? v.trim() : null;

  let payload = {};
  const isProduction = isProductionApprovalKey(plantKey);
  const isLoader = plantKey === 'loader';
  const isWater = plantKey === 'water';

  if (isProduction) {
    payload.start_hour = numOrNull2(document.getElementById('aedit-sh')?.value);
    payload.stop_hour = numOrNull2(document.getElementById('aedit-eh')?.value);
    payload.feed_ton = numOrNull2(document.getElementById('aedit-feed')?.value);
    payload.raw_material = strOrNull(document.getElementById('aedit-rawmat')?.value);
    payload.breakdown_detail = strOrNull(document.getElementById('aedit-breakdown')?.value);
    payload.note = strOrNull(document.getElementById('aedit-note')?.value);
    document.querySelectorAll('.aedit-pc').forEach(inp => {
      const k = inp.getAttribute('data-colkey');
      if (k) payload[k] = numOrNull2(inp.value);
    });
  } else if (isLoader) {
    payload.start_hour = numOrNull2(document.getElementById('aedit-sh')?.value);
    payload.stop_hour = numOrNull2(document.getElementById('aedit-eh')?.value);
    payload.charge_kw = numOrNull2(document.getElementById('aedit-kw')?.value);
    payload.electric_rate = numOrNull2(document.getElementById('aedit-rate')?.value);
    if (payload.charge_kw != null && payload.electric_rate != null)
      payload.electric_cost_baht = Math.round(payload.charge_kw * payload.electric_rate * 100) / 100;
    payload.breakdown_detail = strOrNull(document.getElementById('aedit-breakdown')?.value);
    payload.note = strOrNull(document.getElementById('aedit-note')?.value);
  } else if (isWater) {
    payload.meter_start = numOrNull2(document.getElementById('aedit-ms')?.value);
    payload.meter_stop = numOrNull2(document.getElementById('aedit-me')?.value);
    payload.usage_cum = numOrNull2(document.getElementById('aedit-usage')?.value);
    payload.note = strOrNull(document.getElementById('aedit-note')?.value);
  }

  if (andApprove) payload.status = 'approved';

  const table = APPROVAL_TABLE_MAP[plantKey] || `production_${plantKey}`;
  try {
    const { error } = await db.from(table).update(payload).eq('id', row.id);
    if (error) throw error;
    if (andApprove) {
      await db.from('approval_log').insert([{ source_table: table, source_id: row.id, action: 'approved', approver_id: currentUser.id, note: 'แก้ไขและอนุมัติ' }]);
      showToast('บันทึกและอนุมัติสำเร็จ', 'success');
      _approvalsData[plantKey] = (_approvalsData[plantKey] || []).filter(r => r.id !== row.id);
      fetchPendingApprovalCount();
      loadApprovalHistory();
    } else {
      // อัปเดต cache ด้วยค่าใหม่
      const idx = (_approvalsData[plantKey] || []).findIndex(r => r.id === row.id);
      if (idx >= 0) Object.assign(_approvalsData[plantKey][idx], payload);
      showToast('บันทึกข้อมูลสำเร็จ', 'success');
    }
    renderApprovalSections(getApprovalPlantKeysForUser());
  } catch (err) {
    console.error(err);
    showToast('บันทึกไม่สำเร็จ: ' + (err.message || ''), 'error');
  }
}

          <input id="rf-label" type="text" value="${editing ? escapeHtml(editing.label) : ''}"
            placeholder="เช่น พนักงานธุรการ"
            class="w-full border border-secondary-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl py-2.5 transition">
          ${editing ? 'บันทึกการแก้ไข' : 'เพิ่ม Role'}
        </button>
      </form>`,
  });
  document.getElementById('role-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name  = document.getElementById('rf-name').value.trim().toLowerCase().replace(/\s+/g,'_');
    const label = document.getElementById('rf-label').value.trim();
    if (!name || !label) { showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
    if (!/^[a-z][a-z0-9_]*$/.test(name)) { showToast('ชื่อ Role ใช้ได้เฉพาะ a-z, 0-9, _ และต้องเริ่มด้วยตัวอักษร', 'error'); return; }
    try {
      if (editing) {
        const { error } = await db.from('roles').update({ label }).eq('id', editing.id);
        if (error) throw error;
        showToast('แก้ไข Role สำเร็จ', 'success');
      } else {
        const { error } = await db.from('roles').insert([{ name, label, sort_order: 99 }]);
        if (error) throw error;
        showToast('เพิ่ม Role สำเร็จ', 'success');
      }
      closeModal();
      loadRolesList();
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + (err.message || ''), 'error');
    }
  });
}

async function confirmDeleteRole(id, name) {
  if (!confirm(`ลบ Role "${name}" ?\nผู้ใช้ที่มี Role นี้จะถูก block login`)) return;
  try {
    const { error } = await db.from('roles').delete().eq('id', id);
    if (error) throw error;
    showToast('ลบ Role สำเร็จ', 'success');
    loadRolesList();
  } catch (err) {
    showToast('ลบไม่สำเร็จ: ' + (err.message || ''), 'error');
  }
}

async function openRolePermissionsMatrix(roleName, roleLabel) {
  showModal({
    title: `สิทธิ์ของ Role: ${roleLabel}`,
    wide: true, hideConfirm: true, hideCancel: true,
    bodyHtml: `<div id="role-perm-block">${skeletonBlock('h-48')}</div>`,
  });
  try {
    const { data: perm } = await db.from('role_permissions').select('extra_dashboards, extra_manage').eq('role_name', roleName).maybeSingle();
    const extraDash   = (perm && perm.extra_dashboards) || [];
    const extraManage = (perm && perm.extra_manage)     || [];
    renderPermissionMatrix(
      document.getElementById('role-perm-block'),
      null, extraDash, extraManage, roleName,
      async (dashArr, manageArr) => {
        const { error } = await db.from('role_permissions').upsert(
          { role_name: roleName, extra_dashboards: dashArr, extra_manage: manageArr, updated_at: new Date().toISOString() },
          { onConflict: 'role_name' }
        );
        if (error) throw error;
      }
    );
  } catch (err) {
    document.getElementById('role-perm-block').innerHTML = `<p class="text-sm text-red-500">โหลดไม่สำเร็จ: ${err.message}</p>`;
  }
}

async function loadPermissionUserList() {
  const sel = document.getElementById('perm-user-select');
  if (!sel) return;
  try {
    const { data, error } = await db.from('app_users').select('id, full_name, username, role, department').eq('status','active').order('full_name');
    if (error) throw error;
    // แสดง operator ก่อน แล้วตามด้วย role อื่น
    const operators = (data || []).filter(u => u.role === 'operator');
    const others = (data || []).filter(u => u.role !== 'operator');
    const makeOpt = u => `<option value="${u.id}">${escapeHtml(u.full_name || u.username)} (${escapeHtml(u.role)}${u.department ? ' / '+escapeHtml(u.department) : ''})</option>`;
    sel.innerHTML = '<option value="">— เลือก user —</option>' +
      (operators.length ? '<optgroup label="── Operator ──">' + operators.map(makeOpt).join('') + '</optgroup>' : '') +
      (others.length ? '<optgroup label="── Role อื่น ──">' + others.map(makeOpt).join('') + '</optgroup>' : '');
  } catch (err) {
    console.error('loadPermissionUserList', err);
  }
}

async function loadPermissionMatrix(userId) {
  const block = document.getElementById('perm-matrix-block');
  if (!block) return;
  block.innerHTML = `<div class="text-xs text-secondary-400 py-4">กำลังโหลด...</div>`;
  try {
    // โหลด user role เพื่อแสดง UI ที่ถูกต้อง
    const { data: userData } = await db.from('app_users').select('role').eq('id', userId).maybeSingle();
    const userRole = userData ? userData.role : '';
    const { data: perm } = await db.from('user_permissions').select('extra_dashboards, extra_manage').eq('user_id', userId).maybeSingle();
    const extraDash = (perm && perm.extra_dashboards) || [];
    const extraManage = (perm && perm.extra_manage) || [];
    renderPermissionMatrix(block, userId, extraDash, extraManage, userRole);
  } catch (err) {
    block.innerHTML = `<div class="text-xs text-red-500">โหลดไม่สำเร็จ: ${escapeHtml(err.message || '')}</div>`;
  }
}

       </div>`
    : isAdminControlled
    ? `<div class="mb-3 px-3 py-2 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700 flex items-center gap-2">

        ไม่มีสิทธิ์เริ่มต้น — Admin กำหนดทั้งหมด (ยืดหยุ่นข้ามโรงงานได้)

    : `<div class="mb-3 px-3 py-2 bg-blue-50 border border-blue-200 rounded-xl text-xs text-blue-600 flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4 flex-shrink-0"></i>
        สิทธิ์เพิ่มเติมจากสิทธิ์ตาม Role ปกติ (Managing MD: ดูทุก Dashboard อยู่แล้ว)
       </div>`;

  const templateOpts = PERM_TEMPLATES.map(t =>
    `<option value="${t.id}">${escapeHtml(t.label)}</option>`).join('');

  const dashRows = DASHBOARD_MENUS.map(m => `
    <label class="flex items-center gap-2 py-1.5 cursor-pointer hover:bg-secondary-50 rounded-lg px-2">
      <input type="checkbox" class="perm-dash-cb rounded" value="${m.key}" ${extraDash.includes(m.key) ? 'checked' : ''}>
      <i data-lucide="${m.icon}" class="w-4 h-4 text-secondary-400 flex-shrink-0"></i>
      <span class="text-sm text-secondary-700">${escapeHtml(m.label)}</span>
    </label>`).join('');

  const manageRows = MANAGE_MENUS.filter(m => !m.approvalOnly).map(m => `
    <label class="flex items-center gap-2 py-1.5 cursor-pointer hover:bg-secondary-50 rounded-lg px-2">
      <input type="checkbox" class="perm-manage-cb rounded" value="${m.key}" ${extraManage.includes(m.key) ? 'checked' : ''}>
      <i data-lucide="${m.icon}" class="w-4 h-4 text-secondary-400 flex-shrink-0"></i>
      <span class="text-sm text-secondary-700">${escapeHtml(m.label)}</span>
    </label>`).join('');

  const approveRows = MANAGE_MENUS.filter(m => m.approvalOnly).map(m => `
    <label class="flex items-center gap-2 py-1.5 cursor-pointer hover:bg-secondary-50 rounded-lg px-2">
      <input type="checkbox" class="perm-manage-cb rounded" value="${m.key}" ${extraManage.includes(m.key) ? 'checked' : ''}>
      <i data-lucide="${m.icon}" class="w-4 h-4 text-emerald-400 flex-shrink-0"></i>
      <span class="text-sm text-secondary-700">${escapeHtml(m.label)}</span>
    </label>`).join('');

  const invRows = INV_MENUS_FOR_PERM.map(m => `
    <label class="flex items-center gap-2 py-1.5 cursor-pointer hover:bg-cyan-50 rounded-lg px-2">
      <input type="checkbox" class="perm-manage-cb rounded" value="${m.key}" ${extraManage.includes(m.key) ? 'checked' : ''}>
      <i data-lucide="${m.icon}" class="w-4 h-4 text-cyan-400 flex-shrink-0"></i>
      <span class="text-sm text-secondary-700">${escapeHtml(m.label)}</span>
    </label>`).join('');

  block.innerHTML = `
    ${noteHtml}
    <div class="mb-3 flex items-center gap-2 flex-wrap">
      <span class="text-xs font-medium text-secondary-500">Template:</span>
      <select id="perm-template-sel" class="border border-secondary-200 rounded-xl px-3 py-1.5 text-xs">
        <option value="">— เลือก Template —</option>
        ${templateOpts}
      </select>
      <button id="perm-apply-tmpl-btn" class="px-3 py-1.5 rounded-xl bg-secondary-100 hover:bg-secondary-200 text-secondary-700 text-xs font-medium transition">ใช้ Template</button>
      <span class="text-xs text-secondary-400">(เลือกแล้วกด "ใช้ Template" แล้วปรับเพิ่ม/ลดได้)</span>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <p class="text-xs font-semibold text-secondary-500 uppercase tracking-wide mb-2">Dashboard</p>
        <div class="space-y-0.5">${dashRows}</div>
      </div>
      <div>
        <p class="text-xs font-semibold text-secondary-500 uppercase tracking-wide mb-2">จัดการข้อมูล</p>
        <div class="space-y-0.5">${manageRows}</div>
      </div>
    </div>
    <div class="mb-4 border border-emerald-100 rounded-xl p-3 bg-emerald-50/40">
      <p class="text-xs font-semibold text-emerald-600 uppercase tracking-wide mb-1 flex items-center gap-1.5">
        <i data-lucide="check-circle" class="w-3.5 h-3.5"></i>สิทธิ์อนุมัติ (ต้องมี "รออนุมัติ" ด้วย)

  refreshIcons();

  const doSave = async (clearAll) => {
    const statusEl = block.querySelector('#perm-save-status');
    const dashArr   = clearAll ? [] : Array.from(block.querySelectorAll('.perm-dash-cb:checked')).map(cb => cb.value);
    const manageArr = clearAll ? [] : Array.from(block.querySelectorAll('.perm-manage-cb:checked')).map(cb => cb.value);
    if (clearAll) block.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = false; });
    if (statusEl) statusEl.textContent = 'กำลังบันทึก...';
    try {
      if (saveCallback) {
        await saveCallback(dashArr, manageArr);
      } else {
        await saveUserPermissions(userId, clearAll, dashArr, manageArr);
      }
      if (statusEl) statusEl.textContent = '✓ บันทึกแล้ว';
      showToast('บันทึกสิทธิ์สำเร็จ', 'success');
      setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);
    } catch (err) {
      console.error('savePermissions', err);
      if (statusEl) statusEl.textContent = 'เกิดข้อผิดพลาด';
      showToast('บันทึกสิทธิ์ไม่สำเร็จ: ' + (err.message || ''), 'error');
    }
  };
  block.querySelector('#perm-save-btn').addEventListener('click', () => doSave(false));
  block.querySelector('#perm-clear-btn').addEventListener('click', () => doSave(true));
  block.querySelector('#perm-apply-tmpl-btn').addEventListener('click', () => {
    const sel = block.querySelector('#perm-template-sel');
    const tmpl = PERM_TEMPLATES.find(t => t.id === sel.value);
    if (!tmpl) { showToast('กรุณาเลือก Template ก่อน', 'warning'); return; }
    block.querySelectorAll('.perm-dash-cb').forEach(cb => { cb.checked = tmpl.dash.includes(cb.value); });
    block.querySelectorAll('.perm-manage-cb').forEach(cb => { cb.checked = tmpl.manage.includes(cb.value); });
    showToast(`ใช้ Template "${tmpl.label}" แล้ว — กด "บันทึกสิทธิ์" เพื่อยืนยัน`, 'info');
  });

async function saveUserPermissions(userId, clearAll, extraDash, extraManage) {
  const { error } = await db.from('user_permissions').upsert(
    { user_id: userId, extra_dashboards: extraDash || [], extra_manage: extraManage || [], updated_at: new Date().toISOString() },
    { onConflict: 'user_id' }
  );
  if (error) throw error;
}

async function testSupabaseConnection() {
  const el = document.getElementById('settings-connection-status');
  if (!el) return;
  el.innerHTML = skeletonBlock('h-12');
  const start = performance.now();
  try {
    const { error } = await db.from('factories').select('id', { count: 'exact', head: true });
    if (error) throw error;
    const latency = Math.round(performance.now() - start);
    el.innerHTML = `
      <span class="flex items-center gap-2 px-3 py-2 rounded-xl bg-emerald-50 text-emerald-600 text-sm font-medium">
        <i data-lucide="check-circle-2" class="w-4 h-4"></i>เชื่อมต่อสำเร็จ
      </span>
      <span class="text-xs text-secondary-400">latency ${latency} ms</span>`;
  } catch (err) {
    console.error(err);
    el.innerHTML = `
      <span class="flex items-center gap-2 px-3 py-2 rounded-xl bg-red-50 text-red-600 text-sm font-medium">
        <i data-lucide="x-circle" class="w-4 h-4"></i>เชื่อมต่อล้มเหลว
      </span>
      <span class="text-xs text-secondary-400">${escapeHtml(err.message || '')}</span>`;
  }
  refreshIcons();
}

function renderReportFilters() {

  const _sectionLabel = { cde:'CDE', propel:'Propel', sanon1:'Sanon1', sanon2:'Sanon2', drone:'โดรน', sales:'ยอดขาย', loader:'รถตักไฟฟ้า', water:'น้ำบาดาล' };
  const _sectionColor = { cde:'text-teal-600', propel:'text-blue-600', sanon1:'text-purple-600', sanon2:'text-red-600', drone:'text-orange-500', sales:'text-emerald-600', loader:'text-yellow-600', water:'text-cyan-600' };
  const isProd = _reportState.type === 'production';
  const activeOther = ['drone','sales','loader','loader_daily','water'].includes(_reportState.type)
    ? (_reportState.type === 'loader_daily' ? 'loader' : _reportState.type) : null;

  const mkCb = (val, dataType) => {
    const isChecked = dataType === 'prod'
      ? (isProd && _reportState.prodPlants.includes(val))

    return `<label class="flex items-center gap-1 px-2 py-1 border ${isChecked ? 'border-primary-400 bg-primary-50 font-medium' : 'border-secondary-200'} rounded-lg cursor-pointer hover:bg-secondary-50 transition">
      <input type="checkbox" class="report-sect-cb" data-kind="${dataType}" value="${val}" ${isChecked?'checked':''}> <span class="${_sectionColor[val]}">${_sectionLabel[val]}</span>
    </label>`;
  };

  let html = `
    <input id="report-from" type="date" value="${_reportState.from}" class="border border-secondary-200 rounded-xl px-3 py-2 text-sm" title="วันที่เริ่มต้น">
    <input id="report-to" type="date" value="${_reportState.to}" class="border border-secondary-200 rounded-xl px-3 py-2 text-sm" title="วันที่สิ้นสุด">
    <div class="flex flex-wrap items-center gap-1 text-xs">
      ${['cde','propel','sanon1','sanon2'].map(p => mkCb(p,'prod')).join('')}
      <span class="text-secondary-300 px-0.5">|</span>
      ${['drone','sales','loader','water'].map(s => mkCb(s,'other')).join('')}
    </div>`;

  // factory filter สำหรับ drone/sales/loader
  if (activeOther && activeOther !== 'water') {
    html += `<select id="report-factory" class="border border-secondary-200 rounded-xl px-3 py-2 text-sm">${factOptions}</select>`;
  }

  el.innerHTML = html;
  refreshIcons();

  const fromInput = document.getElementById('report-from');
  const toInput   = document.getElementById('report-to');
  if (fromInput) fromInput.addEventListener('change', (e) => { _reportState.from = e.target.value; loadReportData(); });
  if (toInput)   toInput.addEventListener('change',   (e) => { _reportState.to   = e.target.value; loadReportData(); });
  const factSel = document.getElementById('report-factory');
  if (factSel) factSel.addEventListener('change', (e) => { _reportState.factoryId = e.target.value; loadReportData(); });

  qsa('.report-sect-cb', el).forEach(cb => cb.addEventListener('change', () => {
    const kind = cb.dataset.kind;
    const val  = cb.value;
    if (kind === 'prod') {

      _reportState.type = 'production';
      _reportState.columns = REPORT_TYPE_CONFIG['production'].baseColumns.slice();

      // other section: single-select
      if (cb.checked) {
        _reportState.type = val;
        _reportState.columns = REPORT_TYPE_CONFIG[val].baseColumns.slice();
      } else {
        _reportState.type = 'production';
        _reportState.columns = REPORT_TYPE_CONFIG['production'].baseColumns.slice();

async function loadReportData() {
  const tableBlock = document.getElementById('report-table-block');
  if (tableBlock) tableBlock.innerHTML = skeletonBlock('h-72');
  try {
    let rows = [];
    if (_reportState.type === 'production') {
      const plants = _reportState.prodPlants.length ? _reportState.prodPlants : ['cde','propel','sanon1','sanon2'];
      const results = await Promise.all(plants.map(p => {
        let q = db.from(`production_${p}`).select('*');
        if (_reportState.from) q = q.gte('production_date', _reportState.from);
        if (_reportState.to) q = q.lte('production_date', _reportState.to);
        return q;
      }));
      plants.forEach((p, i) => {
        if (results[i].error) throw results[i].error;
        (results[i].data || []).forEach(r => rows.push(Object.assign({ _plant: APPROVAL_PLANT_LABELS[p] }, r)));
      });
    } else if (_reportState.type === 'drone') {
      let q = db.from('drone_stock').select('*, factories(name)');
      if (_reportState.factoryId !== 'all') q = q.eq('factory_id', _reportState.factoryId);
      const { data, error } = await q;
      if (error) throw error;
      rows = (data || []).map(r => Object.assign({ _factory: r.factories ? r.factories.name : '' }, r));
    } else if (_reportState.type === 'sales') {
      let q = db.from('sales').select('*, factories(name)');
      if (_reportState.from) q = q.gte('sale_date', _reportState.from);
      if (_reportState.to) q = q.lte('sale_date', _reportState.to);
      if (_reportState.factoryId !== 'all') q = q.eq('factory_id', _reportState.factoryId);
      const { data, error } = await q;
      if (error) throw error;
      rows = (data || []).map(r => Object.assign({ _factory: r.factories ? r.factories.name : '' }, r));
    } else if (_reportState.type === 'loader' || _reportState.type === 'loader_daily') {
      let q = db.from('electric_loader').select('*, factories(name)');
      if (_reportState.from) q = q.gte('work_date', _reportState.from);
      if (_reportState.to) q = q.lte('work_date', _reportState.to);
      if (_reportState.factoryId !== 'all') q = q.eq('factory_id', _reportState.factoryId);
      const { data, error } = await q;
      if (error) throw error;
      rows = (data || []).map(r => Object.assign({ _factory: r.factories ? r.factories.name : '' }, r));
    } else if (_reportState.type === 'water') {
      let q = db.from('groundwater_usage').select('*');
      if (_reportState.from) q = q.gte('usage_date', _reportState.from);
      if (_reportState.to) q = q.lte('usage_date', _reportState.to);
      const { data, error } = await q;
      if (error) throw error;
      rows = data || [];
    }
    _reportState.rows = rows;
    renderReportTable();
  } catch (err) {
    console.error(err);
    if (tableBlock) tableBlock.innerHTML = errorBlock();
    refreshIcons();
  }
}

function applyReportSort(rows) {
  const { col, dir } = _reportState.sortState;
  if (!col) return rows;
  const sorted = rows.slice().sort((a, b) => {
    let va = a[col], vb = b[col];
    if (va === null || va === undefined) va = '';
    if (vb === null || vb === undefined) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return va - vb;
    const na = Number(va), nb = Number(vb);
    if (!isNaN(na) && !isNaN(nb) && va !== '' && vb !== '') return na - nb;
    return String(va).localeCompare(String(vb), 'th');
  });
  if (dir === 'desc') sorted.reverse();
  return sorted;
}

function _getMH_r(r) {
  if (r.machine_hour_start != null && r.machine_hour_stop != null)
    return Math.max(0, r.machine_hour_stop - r.machine_hour_start);
  if (r.machine_hour_total != null) return Number(r.machine_hour_total) || 0;
  return Number(r.total_work_hour) || 0;
}

function renderLoaderDailyReport() {
  const tableBlock = document.getElementById('report-table-block');
  if (!tableBlock) return;
  const allRows = _reportState.rows;
  if (!allRows.length) {
    tableBlock.innerHTML = `<div class="bg-white rounded-2xl shadow-sm p-5"><p class="text-center text-secondary-400 py-8">ไม่พบข้อมูล</p></div>`;
    return;
  }

  // หา loaders ทั้งหมด (เรียง)
  const loaderNames = [...new Set(allRows.map(r => r.loader_name).filter(Boolean))].sort();

  // กลุ่มข้อมูล: loaderName → { date → {mh, kw, cost} }
  const grouped = {};
  loaderNames.forEach(ln => { grouped[ln] = {}; });
  allRows.forEach(r => {
    const ln = r.loader_name;
    if (!ln) return;
    const dt = r.work_date;
    if (!grouped[ln]) grouped[ln] = {};
    if (!grouped[ln][dt]) grouped[ln][dt] = { mh: 0, kw: 0, cost: 0 };
    grouped[ln][dt].mh   += _getMH_r(r);
    grouped[ln][dt].kw   += Number(r.charge_kw) || 0;
    grouped[ln][dt].cost += Number(r.electric_cost_baht) || 0;
  });

  const fmtN = (v, d=2) => v === 0 ? '-' : v.toLocaleString('th-TH', { minimumFractionDigits: d, maximumFractionDigits: d });
  const fmtDate = (s) => {
    if (!s) return '-';
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
  };

  let html = `<div class="space-y-6">`;

  loaderNames.forEach(ln => {
    const byDate = grouped[ln];
    const dates = Object.keys(byDate).sort();
    let totMH = 0, totKW = 0, totCost = 0;
    let bodyRows = '';
    dates.forEach(dt => {
      const { mh, kw, cost } = byDate[dt];
      totMH  += mh;
      totKW  += kw;
      totCost+= cost;
      const kwhr = mh > 0 ? kw / mh : 0;
      bodyRows += `<tr class="border-b border-secondary-50 hover:bg-secondary-50">
        <td class="py-1.5 pr-3">${fmtDate(dt)}</td>
        <td class="py-1.5 pr-3 text-right">${fmtN(mh,2)}</td>
        <td class="py-1.5 pr-3 text-right">${fmtN(kwhr,2)}</td>
        <td class="py-1.5 pr-3 text-right">${fmtN(kw,2)}</td>
        <td class="py-1.5 pr-3 text-right">${fmtN(cost,2)}</td>
      </tr>`;
    });
    const totKWhr = totMH > 0 ? totKW / totMH : 0;
    bodyRows += `<tr class="font-semibold bg-primary-50 border-t-2 border-primary-200">
      <td class="py-2 pr-3">Grand Total</td>
      <td class="py-2 pr-3 text-right">${fmtN(totMH,2)}</td>
      <td class="py-2 pr-3 text-right">${fmtN(totKWhr,2)}</td>
      <td class="py-2 pr-3 text-right">${fmtN(totKW,2)}</td>
      <td class="py-2 pr-3 text-right">${fmtN(totCost,2)}</td>
    </tr>`;

    html += `
      <div class="bg-white rounded-2xl shadow-sm p-5 overflow-x-auto">
        <h4 class="text-base font-semibold text-primary-700 mb-3 flex items-center gap-2">
          <i data-lucide="truck" class="w-4 h-4"></i>${escapeHtml(ln)}
          <span class="text-xs text-secondary-400 font-normal ml-1">${dates.length} วัน</span>
        </h4>
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-secondary-400 border-b border-secondary-100 text-xs">
              <th class="py-2 pr-3">วันที่</th>
              <th class="py-2 pr-3 text-right">รวมชั่วโมง</th>
              <th class="py-2 pr-3 text-right">KW/Hr</th>
              <th class="py-2 pr-3 text-right">KW/D</th>
              <th class="py-2 pr-3 text-right">ค่าไฟ(บาท)/วัน</th>
            </tr>
          </thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>`;
  });

  html += `</div>`;
  tableBlock.innerHTML = html;
  refreshIcons();
}

function exportLoaderDailyExcel() {
  const allRows = _reportState.rows;
  if (!allRows.length) { showToast('ไม่มีข้อมูลให้ export', 'warning'); return; }
  const loaderNames = [...new Set(allRows.map(r => r.loader_name).filter(Boolean))].sort();
  const grouped = {};
  loaderNames.forEach(ln => { grouped[ln] = {}; });
  allRows.forEach(r => {
    const ln = r.loader_name;
    if (!ln) return;
    const dt = r.work_date;
    if (!grouped[ln]) grouped[ln] = {};
    if (!grouped[ln][dt]) grouped[ln][dt] = { mh: 0, kw: 0, cost: 0 };
    grouped[ln][dt].mh   += _getMH_r(r);
    grouped[ln][dt].kw   += Number(r.charge_kw) || 0;
    grouped[ln][dt].cost += Number(r.electric_cost_baht) || 0;
  });
  const wb = XLSX.utils.book_new();
  loaderNames.forEach(ln => {
    const byDate = grouped[ln];
    const dates = Object.keys(byDate).sort();
    const sheetData = [['วันที่','รวมชั่วโมง','KW/Hr','KW/D','ค่าไฟ(บาท)/วัน']];
    let totMH = 0, totKW = 0, totCost = 0;
    dates.forEach(dt => {
      const { mh, kw, cost } = byDate[dt];
      totMH += mh; totKW += kw; totCost += cost;
      const kwhr = mh > 0 ? kw / mh : 0;
      sheetData.push([dt, mh, kwhr, kw, cost]);
    });
    const totKWhr = totMH > 0 ? totKW / totMH : 0;
    sheetData.push(['Grand Total', totMH, totKWhr, totKW, totCost]);

    XLSX.utils.book_append_sheet(wb, ws, ln.slice(0, 31));

  XLSX.writeFile(wb, `loader_daily_${new Date().toISOString().slice(0,10)}.xlsx`);

function renderReportTable() {
  const tableBlock = document.getElementById('report-table-block');
  if (!tableBlock) return;
  if (_reportState.type === 'loader_daily') { renderLoaderDailyReport(); return; }
  const rows = applyReportSort(_reportState.rows);
  const cols = _reportState.columns;

  tableBlock.innerHTML = `
    <div class="bg-white rounded-2xl shadow-sm p-5 overflow-x-auto">
      <table class="w-full text-sm" id="report-data-table">
        <thead><tr class="text-left text-secondary-400 border-b border-secondary-100">
          ${cols.map((c, i) => `
            <th draggable="true" data-col-idx="${i}" data-col-key="${c.key}" class="report-th py-2 pr-3 cursor-pointer select-none" title="ลากเพื่อจัดเรียง / คลิกเพื่อ sort">
              <span class="inline-flex items-center gap-1"><i data-lucide="grip-vertical" class="w-3 h-3 text-secondary-300"></i>${escapeHtml(c.label)}
              ${_reportState.sortState.col === c.key ? `<i data-lucide="${_reportState.sortState.dir === 'asc' ? 'arrow-up' : 'arrow-down'}" class="w-3 h-3"></i>` : ''}</span>

            </tr>`).join('') : `<tr><td colspan="${cols.length}" class="py-8 text-center text-secondary-400">ไม่พบข้อมูล</td></tr>`}
        </tbody>
      </table>
      <p class="text-xs text-secondary-400 mt-3">ทั้งหมด ${rows.length} รายการ</p>
    </div>`;
  refreshIcons();
  attachReportTableEvents();
}

function formatReportCell(v) {
  if (v === null || v === undefined) return '-';
  return String(v);
}

function attachReportTableEvents() {
  const ths = qsa('.report-th');
  let dragSrcIdx = null;
  ths.forEach(th => {
    th.addEventListener('click', (e) => {
      // ป้องกัน click trigger ตอนกำลัง drag
      const key = th.getAttribute('data-col-key');
      if (_reportState.sortState.col === key) {
        _reportState.sortState.dir = _reportState.sortState.dir === 'asc' ? 'desc' : 'asc';
      } else {
        _reportState.sortState = { col: key, dir: 'asc' };
      }
      renderReportTable();
    });
    th.addEventListener('dragstart', (e) => {
      dragSrcIdx = Number(th.getAttribute('data-col-idx'));
      e.dataTransfer.effectAllowed = 'move';
    });
    th.addEventListener('dragover', (e) => { e.preventDefault(); });
    th.addEventListener('drop', (e) => {
      e.preventDefault();
      const targetIdx = Number(th.getAttribute('data-col-idx'));
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      const cols = _reportState.columns;
      const [moved] = cols.splice(dragSrcIdx, 1);
      cols.splice(targetIdx, 0, moved);
      renderReportTable();
    });
  });
}

function csvEscapeField(val) {
  const s = val === null || val === undefined ? '' : String(val);
  if (/[",\n]/.test(s)) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportReportCsv() {
  if (_reportState.type === 'loader_daily') { exportLoaderDailyExcel(); return; }
  const cols = _reportState.columns;
  const rows = applyReportSort(_reportState.rows);
  if (!rows.length) { showToast('ไม่มีข้อมูลให้ export', 'warning'); return; }
  const headerLine = cols.map(c => csvEscapeField(c.label)).join(',');
  const lines = rows.map(r => cols.map(c => csvEscapeField(r[c.key])).join(','));
  const csvContent = '﻿' + [headerLine].concat(lines).join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `report_${_reportState.type}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportReportExcel() {
  if (_reportState.type === 'loader_daily') { exportLoaderDailyExcel(); return; }
  const cols = _reportState.columns;
  const rows = applyReportSort(_reportState.rows);
  if (!rows.length) { showToast('ไม่มีข้อมูลให้ export', 'warning'); return; }
  const exportRows = rows.map(r => {
    const obj = {};
    cols.forEach(c => { obj[c.label] = r[c.key]; });
    return obj;
  });
  const ws = XLSX.utils.json_to_sheet(exportRows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report');
  XLSX.writeFile(wb, `report_${_reportState.type}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

            // re-fetch permissions จาก DB ทุกครั้งที่ restore session เพื่อให้สิทธิ์อัปเดตทันที

                db.from('user_permissions').select('extra_dashboards, extra_manage').eq('user_id', user.id).maybeSingle(),
                db.from('role_permissions').select('extra_dashboards, extra_manage').eq('role_name', user.role).maybeSingle(),

              const userManage = (permRes.data    && permRes.data.extra_manage)         || [];
              const roleDash   = (rolePermRes.data && rolePermRes.data.extra_dashboards) || [];
              const roleManage = (rolePermRes.data && rolePermRes.data.extra_manage)     || [];
              currentUser._extraDashboards = [...new Set([...roleDash, ...userDash])];
              currentUser._extraManage     = [...new Set([...roleManage, ...userManage])];
            } catch (_) {}
            await fetchPendingApprovalCount();
            startSessionTimer(user.role === 'admin' ? undefined : remaining);
            startApprovalCountPolling();
            navigateTo(page || defaultPageForUser(user));
            return;

async function fetchExecReportData(fromDate, toDate) {
  const plants = Object.keys(PRODUCTION_PLANT_CONFIG);
  const results = {};
  const [fy, fm] = fromDate.split('-').map(Number);
  const [ty] = toDate.split('-').map(Number);
  const fromYM = fy * 100 + fm;
  const [, tm] = toDate.split('-').map(Number);
  const toYM   = ty * 100 + tm;

  // คำนวณช่วงก่อนหน้าสำหรับ Trend (ช่วงเวลาเท่ากัน ก่อนหน้า)
  const diffDays = Math.round((new Date(toDate) - new Date(fromDate)) / 86400000) + 1;
  const prevToDate  = new Date(new Date(fromDate) - 86400000).toISOString().slice(0,10);
  const prevFromDate = new Date(new Date(fromDate) - diffDays * 86400000).toISOString().slice(0,10);

  // Production plants
  await Promise.all(plants.map(async (pk) => {
    const cfg = PRODUCTION_PLANT_CONFIG[pk];
    const cols = ['production_date','feed_ton','runtime_hour','runtime_minute','avg_ton_per_hour','start_hour','start_minute','stop_hour','stop_minute','breakdown_detail', ...cfg.productColumns.map(c => c.key)].join(',');
    const { data, error } = await db.from(cfg.table)
      .select(cols)
      .gte('production_date', fromDate)
      .lte('production_date', toDate)
      .eq('status', 'approved')
      .order('production_date');
    if (error) throw error;
    const rows = data || [];
    const totalFeed    = rows.reduce((s,r) => s + (Number(r.feed_ton)||0), 0);
    const totalRuntime = rows.reduce((s,r) => s + (Number(r.runtime_hour)||0) + (Number(r.runtime_minute)||0)/60, 0);
    const productTotals = {};
    cfg.productColumns.forEach(c => { productTotals[c.key] = rows.reduce((s,r) => s + (Number(r[c.key])||0), 0); });
    const totalProduct  = Object.values(productTotals).reduce((a,b) => a+b, 0);
    const targetRate    = EXEC_REPORT_TARGETS[pk] || 0;
    // คำนวณแบบเดียวกับ Dashboard: avg ของ avg_ton_per_hour / rows.length
    const actualRate    = rows.length > 0 ? rows.reduce((s,r) => s + (Number(r.avg_ton_per_hour)||0), 0) / rows.length : 0;
    const achievement   = targetRate > 0 ? (actualRate / targetRate) * 100 : 0;
    // วันทำงาน: นับเฉพาะวันที่ runtime > 0 (เหมือน countWorkingDays ใน dashboard)
    const operatingDays = new Set(rows.filter(r => (Number(r.runtime_hour)||0)*60 + (Number(r.runtime_minute)||0) > 0).map(r => r.production_date)).size;

    // Breakdown summary
    const breakdownRows  = rows.filter(r => r.breakdown_detail && r.breakdown_detail.trim());
    const breakdownCount = breakdownRows.length;
    const breakdownList  = breakdownRows.map(r => ({ date: r.production_date, detail: r.breakdown_detail }));

    // Prev period สำหรับ Trend
    let prevFeed = 0, prevRuntime = 0, prevAchievement = 0;
    try {
      const { data: pd } = await db.from(cfg.table)
        .select('feed_ton,runtime_hour')
        .gte('production_date', prevFromDate)
        .lte('production_date', prevToDate)
        .eq('status', 'approved');
      const pr = pd || [];
      prevFeed    = pr.reduce((s,r) => s + (Number(r.feed_ton)||0), 0);
      prevRuntime = pr.reduce((s,r) => s + (Number(r.runtime_hour)||0), 0);
      const prevRate = prevRuntime > 0 ? prevFeed / prevRuntime : 0;
      prevAchievement = targetRate > 0 ? (prevRate / targetRate) * 100 : 0;
    } catch(_) {}

    results[pk] = { rows, totalFeed, totalRuntime, productTotals, totalProduct, actualRate, achievement, operatingDays, breakdownCount, breakdownList, prevFeed, prevRuntime, prevAchievement };
  }));

  // Drone stock
  try {
    const { data: dr } = await db.from('drone_stock').select('*, factories(name)')
      .gte('stock_year', fy).lte('stock_year', ty);
    const droneRows = (dr || []).filter(r => {
      const ym = r.stock_year * 100 + r.stock_month;
      return ym >= fromYM && ym <= toYM;
    });
    const byType = {}; const byFactory = {};
    droneRows.forEach(r => {
      const st = r.stone_type || 'ไม่ระบุ';
      byType[st] = (byType[st]||0) + (Number(r.ton_amount)||0);
      const fn = (r.factories && r.factories.name) || 'ไม่ระบุ';
      if (!byFactory[fn]) byFactory[fn] = {};
      byFactory[fn][st] = (byFactory[fn][st]||0) + (Number(r.ton_amount)||0);
    });
    results._drone = { byType, byFactory, total: Object.values(byType).reduce((a,b)=>a+b,0) };
  } catch(_) { results._drone = { byType:{}, byFactory:{}, total:0 }; }

  // Sales
  try {
    const { data: sr } = await db.from('sales').select('*, factories(name)')
      .gte('sale_date', fromDate).lte('sale_date', toDate);
    const salesRows = sr || [];
    const byFactory = {}; const bySt = {};
    let tot = 0, val = 0;
    salesRows.forEach(r => {
      const fn = (r.factories && r.factories.name) || r.factory_code || 'ไม่ระบุ';
      const st = r.stone_type || 'ไม่ระบุ';
      byFactory[fn] = (byFactory[fn]||0) + (Number(r.quantity_ton)||0);
      bySt[st] = (bySt[st]||0) + (Number(r.quantity_ton)||0);
      tot += Number(r.quantity_ton)||0;
      val += Number(r.total_value)||0;
    });
    results._sales = { byFactory, bySt, totalTon: tot, totalValue: val };
  } catch(_) { results._sales = { byFactory:{}, bySt:{}, totalTon:0, totalValue:0 }; }

  // Electric loader
  try {
    const { data: lr } = await db.from('electric_loader').select('*')
      .eq('status','approved').gte('work_date', fromDate).lte('work_date', toDate);
    const loaderRows = lr || [];
    const getMH = r => {
      if (r.machine_hour_start!=null && r.machine_hour_stop!=null)
        return Math.max(0, r.machine_hour_stop - r.machine_hour_start);
      if (r.machine_hour_total!=null) return Number(r.machine_hour_total)||0;
      return Number(r.total_work_hour)||0;
    };
    const byName = {}; let tWork=0, tCharge=0, tCost=0;
    loaderRows.forEach(r => {
      const mh=getMH(r), ln=r.loader_name||'ไม่ระบุ';
      tWork+=mh; tCharge+=Number(r.charge_minutes)||0; tCost+=Number(r.electric_cost_baht)||0;
      if (!byName[ln]) byName[ln]={work:0,charge:0,cost:0};
      byName[ln].work+=mh; byName[ln].charge+=Number(r.charge_minutes)||0; byName[ln].cost+=Number(r.electric_cost_baht)||0;
    });
    results._loader = { byName, totalWork:tWork, totalCharge:tCharge, totalCost:tCost, costPerHour: tWork>0?tCost/tWork:0 };
  } catch(_) { results._loader = { byName:{}, totalWork:0, totalCharge:0, totalCost:0, costPerHour:0 }; }

  // Groundwater
  try {
    const { data: wr } = await db.from('groundwater_usage').select('*')
      .gte('usage_date', fromDate).lte('usage_date', toDate);
    const waterRows = wr || [];
    const nl = s => String(s||'ไม่ระบุ').replace(/\(\s+/g,'(').replace(/\s+\)/g,')').replace(/\s+/g,' ').trim();
    const byWell = {}; let wtot=0;
    waterRows.forEach(r => {
      const loc=nl(r.location);
      byWell[loc]=(byWell[loc]||0)+(Number(r.usage_cum)||0);
      wtot+=Number(r.usage_cum)||0;
    });
    results._water = { byWell, total:wtot, wellCount:Object.keys(byWell).length };
  } catch(_) { results._water = { byWell:{}, total:0, wellCount:0 }; }

  return results;
}

function fmtExN(n, d=0) { return Number(n||0).toLocaleString('th-TH', {minimumFractionDigits:d, maximumFractionDigits:d}); }
function thDateEx(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543}`;
}

async function generateExecutiveReport(fromDate, toDate, company) {
  const data = await fetchExecReportData(fromDate, toDate);
  const plants = ['cde','propel','sanon1','sanon2'];
  const periodLabel = `${thDateEx(fromDate)} — ${thDateEx(toDate)}`;
  const now = thDateEx(new Date().toISOString().slice(0,10));
  const PC = { cde:'#0D9488', propel:'#0891B2', sanon1:'#7C3AED', sanon2:'#DC2626' };

  // ── Helper: Traffic Light ──
  const tl = (achv) => achv >= 100 ? '🟢' : achv >= 80 ? '🟡' : '🔴';
  const tlColor = (achv) => achv >= 100 ? '#059669' : achv >= 80 ? '#D97706' : '#DC2626';
  const tlBg    = (achv) => achv >= 100 ? '#f0fdf4' : achv >= 80 ? '#fffbeb' : '#fef2f2';
  const trend = (cur, prev) => {
    if (!prev || prev === 0) return '';
    const diff = ((cur - prev) / prev * 100).toFixed(1);
    if (Math.abs(diff) < 1) return `<span style="color:#64748b;font-size:10px"> →0%</span>`;
    return diff > 0
      ? `<span style="color:#059669;font-size:10px"> ▲${diff}%</span>`
      : `<span style="color:#DC2626;font-size:10px"> ▼${Math.abs(diff)}%</span>`;
  };

  // ── ภาพรวม ──
  const totalAll = plants.reduce((s,pk) => s + data[pk].totalFeed, 0);
  const totalRt  = plants.reduce((s,pk) => s + data[pk].totalRuntime, 0);
  const totalBd  = plants.reduce((s,pk) => s + data[pk].breakdownCount, 0);
  const grandTotal = totalAll;

  // ── Executive Summary (auto-generate) ──
  const passPlants  = plants.filter(pk => data[pk].achievement >= 100).map(pk => EXEC_REPORT_LABELS[pk]);
  const warnPlants  = plants.filter(pk => data[pk].achievement >= 80 && data[pk].achievement < 100).map(pk => EXEC_REPORT_LABELS[pk]);
  const failPlants  = plants.filter(pk => data[pk].achievement < 80).map(pk => EXEC_REPORT_LABELS[pk]);
  const summaryLines = [];
  if (passPlants.length) summaryLines.push(`🟢 ผ่านเป้า: ${passPlants.join(', ')}`);
  if (warnPlants.length) summaryLines.push(`🟡 ใกล้เป้า: ${warnPlants.join(', ')}`);
  if (failPlants.length)  summaryLines.push(`🔴 ต่ำกว่าเป้า: ${failPlants.join(', ')} — ต้องติดตาม`);
  if (totalBd > 0) summaryLines.push(`⚠️ พบ Breakdown รวม ${totalBd} วัน ใน ${plants.filter(pk=>data[pk].breakdownCount>0).map(pk=>EXEC_REPORT_LABELS[pk]).join(', ')}`);
  summaryLines.push(`💰 ยอดขาย ${fmtExN(data._sales.totalValue,0)} บาท (${fmtExN(data._sales.totalTon,1)} ตัน)`);

  // ── ตาราง Overview (พร้อม Traffic Light + Trend) ──
  const overviewRows = plants.map(pk => {
    const d = data[pk]; const achv = Math.round(d.achievement);
    const hasRuntime = d.totalRuntime > 0;
    const tlEmoji   = tl(achv);
    const tlClr     = tlColor(achv);
    const tlBgClr   = tlBg(achv);
    const plantName = EXEC_REPORT_LABELS[pk];
    const plantClr  = PC[pk];
    const feedVal   = fmtExN(d.totalFeed);
    const feedTrendHtml = trend(d.totalFeed, d.prevFeed);
    const rtVal     = hasRuntime ? fmtExN(d.totalRuntime, 1) : '-';
    const rateVal   = hasRuntime ? fmtExN(d.actualRate, 1) : '-';
    const achvTxt   = hasRuntime ? (achv + '%') : '-';
    const achvStyle = hasRuntime ? ('font-weight:700;color:' + tlClr + ';background:' + tlBgClr) : 'color:#94a3b8';
    const bdTxt     = d.breakdownCount > 0 ? d.breakdownCount + ' วัน' : '-';
    const bdClr     = d.breakdownCount > 0 ? '#DC2626' : '#059669';
    return '<tr>'
      + '<td><span style="margin-right:4px">' + tlEmoji + '</span><span style="color:' + plantClr + ';font-weight:600">' + plantName + '</span></td>'
      + '<td class="r">' + feedVal + feedTrendHtml + '</td>'
      + '<td class="r">' + rtVal + '</td>'
      + '<td class="r">' + rateVal + '</td>'
      + '<td class="c" style="' + achvStyle + '">' + achvTxt + '</td>'
      + '<td class="c" style="color:' + bdClr + '">' + bdTxt + '</td>'
      + '</tr>';
  }).join('');

  // ── รายโรงงาน (พร้อม Trend) ──
  const plantSections = plants.map(pk => {
    const d = data[pk]; const cfg = PRODUCTION_PLANT_CONFIG[pk]; const col = PC[pk];
    const achv = Math.round(d.achievement);
    const prodRows = cfg.productColumns.map(c => {
      const v = d.productTotals[c.key]||0;
      const pct = d.totalProduct>0?(v/d.totalProduct*100).toFixed(1):'0.0';
      return `<tr><td>${c.label}</td><td class="r">${fmtExN(v,1)}</td><td class="c">${pct}%</td></tr>`;
    }).join('');
    return `<div class="plant-section" style="border-left:5px solid ${col};background:${tlBg(achv)}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:20px">${tl(achv)}</span>
        <h3 style="color:${col};margin:0">${EXEC_REPORT_LABELS[pk]}</h3>
        <span style="font-size:11px;color:${tlColor(achv)};font-weight:700">${achv}% vs เป้า ${EXEC_REPORT_TARGETS[pk]} ต./ชม.</span>
      </div>
      <div class="kpi-row">
        <div class="kc"><div class="kv">${fmtExN(d.totalFeed)}${trend(d.totalFeed,d.prevFeed)}</div><div class="kl">ยอดป้อนรวม (ตัน)</div></div>
        <div class="kc"><div class="kv">${d.totalRuntime > 0 ? fmtExN(d.totalRuntime,1) : '<span style="color:#94a3b8">-</span>'}</div><div class="kl">ชม.เดินเครื่อง</div></div>
        <div class="kc"><div class="kv">${d.totalRuntime > 0 ? fmtExN(d.actualRate,1) + trend(d.actualRate, d.prevRuntime>0?d.prevFeed/d.prevRuntime:0) : '<span style="color:#94a3b8">-</span>'}</div><div class="kl">อัตราเฉลี่ย (ต./ชม.)</div></div>
        <div class="kc"><div class="kv">${d.operatingDays}</div><div class="kl">วันผลิต</div></div>
        <div class="kc"><div class="kv" style="color:${d.breakdownCount>0?'#DC2626':'#059669'}">${d.breakdownCount > 0 ? d.breakdownCount+' วัน' : 'ไม่มี'}</div><div class="kl">Breakdown</div></div>
      </div>
      <table><thead><tr style="background:${col}"><th>ผลิตภัณฑ์</th><th style="text-align:right">ตัน</th><th style="text-align:center">%</th></tr></thead>
      <tbody>${prodRows}<tr class="tf"><td>รวม</td><td class="r">${fmtExN(d.totalProduct,1)}</td><td class="c">100%</td></tr></tbody></table>
    </div>`;
  }).join('');

  // ── Breakdown Section ──
  const allBreakdowns = plants.flatMap(pk =>
    data[pk].breakdownList.map(b => ({ plant: EXEC_REPORT_LABELS[pk], color: PC[pk], ...b }))
  ).sort((a,b) => a.date.localeCompare(b.date));
  const breakdownSection = allBreakdowns.length
    ? allBreakdowns.map(b => `<tr><td>${thDateEx(b.date)}</td><td style="color:${b.color};font-weight:600">${b.plant}</td><td>${escapeHtml(b.detail)}</td></tr>`).join('')
    : `<tr><td colspan="3" class="c" style="color:#059669">ไม่พบ Breakdown ในช่วงนี้</td></tr>`;

  // ── ตารางอื่นๆ ──
  const mkRows = (entries, total, cols=3) => entries.length
    ? entries.map(([k,v]) => `<tr><td>${k}</td><td class="r">${fmtExN(v,1)}</td>${cols===3?`<td class="c">${total>0?(v/total*100).toFixed(1):'0.0'}%</td>`:''}</tr>`).join('')
    : `<tr><td colspan="${cols}" class="c" style="color:#94a3b8">ไม่มีข้อมูล</td></tr>`;

  const droneEntries = Object.entries(data._drone.byType).sort((a,b)=>b[1]-a[1]);
  const stEntries    = Object.entries(data._sales.bySt).sort((a,b)=>b[1]-a[1]);
  const ldEntries    = Object.entries(data._loader.byName).sort((a,b)=>b[1].work-a[1].work);
  const wtEntries    = Object.entries(data._water.byWell).sort((a,b)=>b[1]-a[1]);
  const loaderRows   = ldEntries.length
    ? ldEntries.map(([ln,v])=>`<tr><td>${ln}</td><td class="r">${fmtExN(v.work,1)}</td><td class="r">${fmtExN(v.charge,0)}</td><td class="r">${fmtExN(v.cost,0)}</td></tr>`).join('')
    : `<tr><td colspan="4" class="c" style="color:#94a3b8">ไม่มีข้อมูล</td></tr>`;

  const html = `<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
