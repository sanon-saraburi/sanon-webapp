function mergeCustomPermissions(base, user) {
  const extra = { dashboards: user._extraDashboards || [], manage: user._extraManage || [] };
  if (!extra.dashboards.length && !extra.manage.length) return base;
  return {
    dashboards: [...new Set([...base.dashboards, ...extra.dashboards])],
    manage:     [...new Set([...base.manage,     ...extra.manage])],
  };
}

function getAllowedMenus(user) {
  if (!user) return { dashboards: [], manage: [] };
  const base = _getAllowedMenusBase(user);
  return mergeCustomPermissions(base, user);
}

function _getAllowedMenusBase(user) {
  const { role } = user;
  // admin: hardcode เต็มทุกอย่าง — เพื่อให้เข้าระบบได้เสมอแม้ DB มีปัญหา
  if (role === 'admin') {
    return {
      dashboards: DASHBOARD_MENUS.map(m => m.key),
      manage: MANAGE_MENUS.map(m => m.key),
    };
  }
  // ทุก role อื่น: สิทธิ์มาจาก role_permissions table ใน DB เท่านั้น
  // admin กำหนดได้ผ่าน Admin UI → จัดการ Roles & Permissions
  // เพิ่ม role ใหม่ในอนาคต → เพิ่ม record ใน role_permissions ผ่าน Admin UI ได้เลย ไม่ต้องแก้โค้ด
  return { dashboards: [], manage: [] };
}

function fmtNum(n, decimals = 2) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: decimals });
}
function fmtDate(d) {
  if (!d) return '-';
  try {
    return new Date(d).toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' });
  } catch(e) { return d; }
}
function pad2(n) { return String(n).padStart(2,'0'); }
function monthNameTH(m) {
  const names = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return names[m-1] || '-';
}
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function qs(sel, parent) { return (parent||document).querySelector(sel); }
function qsa(sel, parent) { return Array.from((parent||document).querySelectorAll(sel)); }

// แปลงชื่อโรงงานให้เป็นรูปแบบมาตรฐานไม่มีเว้นวรรค ('Sanon 1' -> 'Sanon1') ตรงกับ
// ค่าที่ schema.sql check constraint ของ factory_name อนุญาต ('CDE','Propel','Sanon1','Sanon2')
function normalizeFactoryName(name) {
  if (!name) return null;
  const n = String(name).trim();
  const map = { 'Sanon 1': 'Sanon1', 'Sanon 2': 'Sanon2', 'sanon 1': 'Sanon1', 'sanon 2': 'Sanon2' };
  if (map[n]) return map[n];
  // กรณีพิมพ์มาแบบไม่มีเว้นวรรคอยู่แล้ว หรือเป็น CDE/Propel
  const lower = n.toLowerCase().replace(/\s+/g, '');
  if (lower === 'sanon1') return 'Sanon1';
  if (lower === 'sanon2') return 'Sanon2';
  if (lower === 'cde') return 'CDE';
  if (lower === 'propel') return 'Propel';
  return n;
}
// หา factory record จาก factory_name (ที่ผู้ใช้กรอกมาในไฟล์ Excel เช่น CDE/Propel/Sanon1/Sanon2)
// โดยเทียบกับ factories.name ในระบบที่อาจเก็บเป็น 'Sanon 1'/'Sanon 2' (มีเว้นวรรค)
function findFactoryByName(factoriesList, inputName) {
  const norm = normalizeFactoryName(inputName);
  if (!norm) return null;
  return (factoriesList || []).find(f => normalizeFactoryName(f.name) === norm) || null;
}

function showToast(message, type = 'info', duration = 3500) {
  const container = document.getElementById('toast-container');
  const id = 'toast-' + Date.now() + Math.random().toString(36).slice(2,7);
  const colors = {
    success: { bg:'bg-emerald-50', border:'border-emerald-200', text:'text-emerald-700', icon:'check-circle-2' },
    error:   { bg:'bg-red-50',     border:'border-red-200',     text:'text-red-700',     icon:'x-circle' },
    info:    { bg:'bg-indigo-50',  border:'border-indigo-200',  text:'text-indigo-700',  icon:'info' },
    warning: { bg:'bg-amber-50',   border:'border-amber-200',   text:'text-amber-700',   icon:'alert-triangle' },
  };
  const c = colors[type] || colors.info;
  const el = document.createElement('div');
  el.id = id;
  el.className = `toast-enter ${c.bg} ${c.border} ${c.text} border rounded-2xl shadow-lg px-4 py-3 flex items-center gap-2 min-w-[260px] max-w-sm`;
  el.innerHTML = `<i data-lucide="${c.icon}" class="w-5 h-5 flex-shrink-0"></i><span class="text-sm flex-1">${escapeHtml(message)}</span>
    <button class="opacity-50 hover:opacity-100 flex-shrink-0" onclick="document.getElementById('${id}').remove()"><i data-lucide="x" class="w-4 h-4"></i></button>`;
  container.appendChild(el);
  refreshIcons();
  setTimeout(() => { const node = document.getElementById(id); if (node) node.remove(); }, duration);
}

function showModal({ title, bodyHtml, confirmText = 'ยืนยัน', cancelText = 'ยกเลิก', onConfirm = null, hideCancel = false, hideConfirm = false, wide = false }) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="fixed inset-0 z-[9000] flex items-center justify-center p-4 modal-backdrop fade-in" id="modal-backdrop">
      <div class="bg-white rounded-2xl shadow-2xl w-full ${wide ? 'max-w-2xl' : 'max-w-md'} overflow-hidden fade-in">
        <div class="px-5 py-4 border-b border-secondary-100 flex items-center justify-between">
          <h3 class="font-semibold text-secondary-800">${escapeHtml(title)}</h3>
          <button id="modal-close-x" class="text-secondary-400 hover:text-secondary-700"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="px-5 py-4 text-sm text-secondary-600">${bodyHtml}</div>
        <div class="px-5 py-3 bg-secondary-50 flex justify-end gap-2">
          ${hideCancel ? '' : `<button id="modal-cancel-btn" class="px-4 py-2 rounded-xl text-sm font-medium text-secondary-600 hover:bg-secondary-100 transition">${escapeHtml(cancelText)}</button>`}
          ${hideConfirm ? '' : `<button id="modal-confirm-btn" class="px-4 py-2 rounded-xl text-sm font-medium bg-primary-600 text-white hover:bg-primary-700 transition">${escapeHtml(confirmText)}</button>`}
        </div>
      </div>
    </div>`;
  refreshIcons();
  const close = () => { root.innerHTML = ''; };
  qs('#modal-close-x', root).addEventListener('click', close);
  const cancelBtn = qs('#modal-cancel-btn', root);
  if (cancelBtn) cancelBtn.addEventListener('click', close);
  const confirmBtn = qs('#modal-confirm-btn', root);
  if (confirmBtn) confirmBtn.addEventListener('click', () => { if (onConfirm) onConfirm(); close(); });
  qs('#modal-backdrop', root).addEventListener('click', (e) => { if (e.target.id === 'modal-backdrop') close(); });
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// SECTION 7: AUTH (custom, query ตรง app_users — ไม่ใช้ Supabase Auth)
// =====================================================================
async function doLogin(username, password) {
  const loginBtn = document.getElementById('login-submit-btn');
  const errBox = document.getElementById('login-error');
  if (errBox) errBox.classList.add('hidden');
  if (!username || !password) {
    if (errBox) { errBox.textContent = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; errBox.classList.remove('hidden'); }
    return;
  }
  if (loginBtn) {
    loginBtn.disabled = true;
    loginBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>กำลังเข้าสู่ระบบ...</span>`;
    refreshIcons();
  }
  try {
    const { data, error } = await db
      .from('app_users')
      .select('*')
      .ilike('username', username)
      .eq('password', password)
      .maybeSingle();

    if (error) throw error;

    if (!data) {
      if (errBox) { errBox.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; errBox.classList.remove('hidden'); }
      return;
    }
    if (data.status !== 'active') {
      const msg = data.status === 'pending' ? 'บัญชีนี้รออนุมัติ กรุณาติดต่อผู้ดูแลระบบ'
                : data.status === 'rejected' ? 'บัญชีนี้ถูกปฏิเสธการใช้งาน'
                : 'บัญชีนี้ถูกระงับการใช้งาน';
      if (errBox) { errBox.textContent = msg; errBox.classList.remove('hidden'); }
      return;
    }

    currentUser = data;
    // โหลด role-level permissions (default) + user-specific overrides แล้ว merge กัน
    try {
      const [permRes, rolePermRes] = await Promise.all([
        db.from('user_permissions').select('extra_dashboards, extra_manage').eq('user_id', data.id).maybeSingle(),
        db.from('role_permissions').select('extra_dashboards, extra_manage').eq('role_name', data.role).maybeSingle(),
      ]);
      const userDash    = (permRes.data    && permRes.data.extra_dashboards)    || [];
      const userManage  = (permRes.data    && permRes.data.extra_manage)        || [];
      const roleDash    = (rolePermRes.data && rolePermRes.data.extra_dashboards) || [];
      const roleManage  = (rolePermRes.data && rolePermRes.data.extra_manage)    || [];
      // role = base, user = override (union) → user สามารถมีสิทธิ์เพิ่มเติมจาก role
      currentUser._extraDashboards = [...new Set([...roleDash, ...userDash])];
      currentUser._extraManage     = [...new Set([...roleManage, ...userManage])];
    } catch (_) {
      currentUser._extraDashboards = [];
      currentUser._extraManage = [];
    }
    closeModal();
    try { localStorage.setItem('_sn_last_username', username); } catch (_) {}
    showToast(`ยินดีต้อนรับ ${data.full_name || data.username}`, 'success');
    await fetchPendingApprovalCount();
    navigateTo(defaultPageForUser(currentUser));
    startSessionTimer();
    startApprovalCountPolling();
    try { sessionStorage.setItem('_sn_sess', JSON.stringify({ user: currentUser, page: defaultPageForUser(currentUser), loginAt: Date.now() })); } catch (_) {}
    // redirect ไประบบที่เลือก (ถ้ามี)
    if (_loginTargetSystem === 'inventory') {
      try { sessionStorage.setItem('_sn_inv_sess', JSON.stringify({ id: currentUser.id, username: currentUser.username, full_name: currentUser.full_name, role: currentUser.role, _extraManage: currentUser._extraManage || [] })); } catch (_) {}
      window.location.href = 'inventory.html';
      return;
    }
    if (_loginTargetSystem === 'pm') {
      try { sessionStorage.setItem('_sn_pm_sess', JSON.stringify({ id: currentUser.id, username: currentUser.username, full_name: currentUser.full_name, role: currentUser.role, _extraManage: currentUser._extraManage || [] })); } catch (_) {}
      window.location.href = 'pm.html';
      return;
    }
  } catch (err) {
    console.error(err);
    if (errBox) { errBox.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อระบบ กรุณาลองใหม่'; errBox.classList.remove('hidden'); }
  } finally {
    if (loginBtn) {
      loginBtn.disabled = false;
      loginBtn.innerHTML = `<i data-lucide="log-in" class="w-4 h-4"></i><span>เข้าสู่ระบบ</span>`;
      refreshIcons();
    }
  }
}

function defaultPageForUser(user) {
  const allowed = getAllowedMenus(user);
  return allowed.dashboards.length > 0 ? allowed.dashboards[0] : 'landing';
}

function confirmLogout() {
  showModal({
    title: 'ออกจากระบบ',
    bodyHtml: 'คุณต้องการออกจากระบบใช่หรือไม่?',
    confirmText: 'ออกจากระบบ',
    cancelText: 'ยกเลิก',

  });
}
function doLogout() {

  stopApprovalCountPolling();
  currentUser = null;
  pendingApprovalCount = 0;
  isMobileSheetOpen = false;
  isManageSheetOpen = false;

}

// =====================================================================
// SECTION 7C: SESSION TIMEOUT (2 ชั่วโมง, ยกเว้น role admin)
// =====================================================================
const SESSION_TIMEOUT_SECONDS = 7200; // 2 ชั่วโมง
const SESSION_WARNING_AT_SECONDS = 60; // เตือนเมื่อเหลือ 60 วินาที

function startSessionTimer(initialSeconds) {
  stopSessionTimer();
  if (!currentUser || currentUser.role === 'admin') {
    updateSessionTimerDisplay();
    return; // admin ไม่จำกัดเวลา ไม่ต้องนับถอยหลัง
  }
  sessionSecondsLeft = (initialSeconds && initialSeconds > 0) ? initialSeconds : SESSION_TIMEOUT_SECONDS;
  sessionWarnShown = false;
  updateSessionTimerDisplay();
  sessionTimerInterval = setInterval(() => {
    sessionSecondsLeft -= 1;
    if (sessionSecondsLeft === SESSION_WARNING_AT_SECONDS && !sessionWarnShown) {
      sessionWarnShown = true;
      showToast('เซสชันจะหมดอายุในอีก 1 นาที กรุณาบันทึกข้อมูลที่ทำอยู่', 'warning', 6000);
    }
    if (sessionSecondsLeft <= 0) {
      handleSessionExpired();
      return;
    }
    updateSessionTimerDisplay();
  }, 1000);
}

function stopSessionTimer() {
  if (sessionTimerInterval) {
    clearInterval(sessionTimerInterval);
    sessionTimerInterval = null;
  }
  sessionSecondsLeft = 0;
  sessionWarnShown = false;
}

function updateSessionTimerDisplay() {
  const el = document.getElementById('session-countdown');
  if (!el) return;
  if (!currentUser || currentUser.role === 'admin') {
    el.classList.add('hidden');
    el.textContent = '';
    return;
  }
  el.classList.remove('hidden');
  const h = Math.floor(sessionSecondsLeft / 3600);
  const m = Math.floor((sessionSecondsLeft % 3600) / 60);
  el.textContent = `${pad2(h)}:${pad2(m)}`;
}

async function handleSessionExpired() {
  clearInterval(sessionTimerInterval);
  sessionTimerInterval = null;
  let savedSomething = false;
  try {
    savedSomething = await trySaveActiveForm();
  } catch (err) {
    console.error('trySaveActiveForm error', err);
    savedSomething = false;
  }
  stopApprovalCountPolling();
  currentUser = null;
  pendingApprovalCount = 0;
  isMobileSheetOpen = false;
  isManageSheetOpen = false;
  sessionSecondsLeft = 0;
  sessionWarnShown = false;
  try { sessionStorage.removeItem('_sn_sess'); } catch (_) {}
  showToast(
    savedSomething
      ? 'เซสชันหมดอายุ ระบบบันทึกข้อมูลที่ค้างไว้แล้ว (ถ้ามี) กรุณาเข้าสู่ระบบใหม่'
      : 'เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่',
    'warning', 6000
  );
  navigateTo('landing');
}

// พยายาม auto-save ฟอร์มที่กำลังกรอกอยู่ใน DOM ก่อน logout เนื่องจาก session timeout
// รองรับฟอร์มยอดผลิต (manage-prod-*) ซึ่งเป็นฟอร์มหลักที่ mount อยู่ในหน้า page-content โดยตรง
// บันทึกด้วย status='pending' เสมอ (บันทึกฉุกเฉิน ไม่ว่า role ใด)
async function trySaveActiveForm() {
  // หาฟอร์มยอดผลิตที่ mount อยู่บนหน้าปัจจุบัน (manage-prod-cde/propel/sanon1/sanon2)
  for (const plantKey of Object.keys(PRODUCTION_PLANT_CONFIG)) {
    const form = document.getElementById(`mp-${plantKey}-form`);
    if (!form || !document.body.contains(form)) continue;
    const dateInput = document.getElementById('pf-date');
    if (!dateInput || !dateInput.value) continue; // required field ว่าง ไม่ save

    const cfg = PRODUCTION_PLANT_CONFIG[plantKey];
    const payload = {
      production_date: dateInput.value,
      raw_material: (document.getElementById('pf-rawmat')?.value || '').trim() || null,
      start_hour: numOrNull(document.getElementById('pf-start-hour')?.value),
      start_minute: numOrNull(document.getElementById('pf-start-minute')?.value),
      stop_hour: numOrNull(document.getElementById('pf-stop-hour')?.value),
      stop_minute: numOrNull(document.getElementById('pf-stop-minute')?.value),
      feed_ton: numOrNull(document.getElementById('pf-feed-ton')?.value),
      breakdown_detail: (document.getElementById('pf-breakdown')?.value || '').trim() || null,
      note: (document.getElementById('pf-note')?.value || '').trim() || null,
    };
    cfg.productColumns.forEach(c => {
      payload[c.key] = numOrNull(document.getElementById(`pf-prod-${c.key}`)?.value);
    });
    payload.status = 'pending'; // บันทึกฉุกเฉินจาก session timeout เสมอเป็น pending
    payload.created_by = currentUser ? currentUser.id : null;

    try {
      const { error } = await db.from(cfg.table).insert([payload]);
      if (error) throw error;
      return true;
    } catch (err) {
      console.error('trySaveActiveForm insert error', err);
      return false;
    }
  }
  return false;
}

// =====================================================================
// SECTION 8: PENDING APPROVAL COUNT (ข้อมูลจริง รวม 4 ตาราง production_*)
// =====================================================================
// คืนรายชื่อ department ที่ user คนนี้มีสิทธิ์อนุมัติ (admin = null หมายถึงทุกแผนก)
// ใช้ user._extraManage จาก user_permissions — admin กำหนดสิทธิ์รายคนผ่าน UI
function approvalDepartmentsForUser(user) {
  if (!user) return [];
  if (user.role === 'admin') return null; // null = ไม่กรอง เห็นทุกแผนก

  const manage = user._extraManage || [];
  const depts = [];
  if (manage.includes('approve-cde'))    depts.push('CDE');
  if (manage.includes('approve-propel')) depts.push('Propel');
  if (manage.includes('approve-sanon1')) depts.push('Sanon1');
  if (manage.includes('approve-sanon2')) depts.push('Sanon2');
  return depts.length ? depts : []; // [] = ไม่เห็นรายการอนุมัติโรงงานใดเลย
}

// คืน true ถ้า user มีสิทธิ์อนุมัติ loader
function canApproveLoader(user) {
  if (!user) return false;
  if (user.role === 'admin') return true;
  return (user._extraManage || []).includes('approve-loader');
}

// คืน true ถ้า user มีสิทธิ์อนุมัติน้ำบาดาล
function canApproveWater(user) {
  if (!user) return false;
  if (user.role === 'admin') return true;
  return (user._extraManage || []).includes('approve-water');
}

async function fetchPendingApprovalCount() {
  if (!currentUser) { pendingApprovalCount = 0; return; }
  try {
    const depts = approvalDepartmentsForUser(currentUser);
    const prodTables = [
      { table: 'production_cde', dept: 'CDE' },
      { table: 'production_propel', dept: 'Propel' },
      { table: 'production_sanon1', dept: 'Sanon1' },
      { table: 'production_sanon2', dept: 'Sanon2' },
    ].filter(t => !depts || depts.includes(t.dept));
    const prodCounts = await Promise.all(prodTables.map(t =>
      db.from(t.table).select('id', { count: 'exact', head: true }).eq('status', 'pending')
    ));
    let total = prodCounts.reduce((sum, r) => sum + (r.count || 0), 0);

    // รถตักไฟฟ้า: กรองตาม canApproveLoader
    if (canApproveLoader(currentUser)) {
      let loaderQuery = db.from('electric_loader').select('id', { count: 'exact', head: true }).eq('status', 'pending');
      if (depts) loaderQuery = loaderQuery.in('factory_name', depts);
      const loaderRes = await loaderQuery;
      total += (loaderRes.count || 0);
    }

    // น้ำบาดาล: กรองตาม canApproveWater
    if (canApproveWater(currentUser)) {
      if (depts) {
        const { data: deptFactories } = await db.from('factories').select('id, name');
        const matchIds = (deptFactories || [])
          .filter(f => depts.some(d => normalizeFactoryName(f.name) === d))
          .map(f => f.id);
        if (matchIds.length) {
          const { count } = await db.from('groundwater_usage').select('id', { count: 'exact', head: true }).eq('status', 'pending').in('factory_id', matchIds);
          total += (count || 0);
        }
      } else {
        const { count } = await db.from('groundwater_usage').select('id', { count: 'exact', head: true }).eq('status', 'pending');
        total += (count || 0);
      }
    }

    pendingApprovalCount = total;
  } catch (err) {
    console.error('fetchPendingApprovalCount error', err);
    pendingApprovalCount = 0;
  }
  const _cnt = pendingApprovalCount > 99 ? '99+' : pendingApprovalCount;
  const badge = document.getElementById('approval-badge');
  if (badge) {
    if (pendingApprovalCount > 0) { badge.textContent = _cnt; badge.classList.remove('hidden'); }
    else { badge.classList.add('hidden'); }
  }
  const sbBadge = document.getElementById('sidebar-approval-badge');
  if (sbBadge) {
    if (pendingApprovalCount > 0) { sbBadge.textContent = _cnt; sbBadge.classList.remove('hidden'); }
    else { sbBadge.classList.add('hidden'); }
  }
}

function startApprovalCountPolling() {
  stopApprovalCountPolling();
  if (!currentUser) return;
  approvalCountInterval = setInterval(async () => {
    if (!currentUser) { stopApprovalCountPolling(); return; }
    await fetchPendingApprovalCount();
  }, 5000);
}
function stopApprovalCountPolling() {
  if (approvalCountInterval) { clearInterval(approvalCountInterval); approvalCountInterval = null; }
}

// =====================================================================
// SECTION 9: ROUTER
// เพิ่ม dashboard ใหม่: เพิ่ม case ใน renderPageContent() + เพิ่ม entry ใน DASHBOARD_MENUS
// หมวดหมู่ 2 (จัดการข้อมูล) ครบ 13 เมนูแล้ว — ดู case 'manage-*' ด้านล่าง
// =====================================================================
function navigateTo(pageKey, forceFullRender) {
  // guard: ถ้ายังไม่ login และพยายามเข้าหน้าอื่นที่ไม่ใช่ landing → กลับ landing
  if (!currentUser && pageKey !== 'landing') {
    pageKey = 'landing';
  }
  // guard RBAC: ตรวจว่า user มีสิทธิ์เข้า pageKey หรือไม่ (หน้า dashboard และหน้า manage)
  if (currentUser && pageKey.startsWith('dash-')) {
    const allowed = getAllowedMenus(currentUser);
    if (!allowed.dashboards.includes(pageKey)) {
      pageKey = defaultPageForUser(currentUser);
    }
  }
  if (currentUser && pageKey.startsWith('manage-')) {
    const allowed = getAllowedMenus(currentUser);
    if (!allowed.manage.includes(pageKey)) {
      pageKey = defaultPageForUser(currentUser);
    }
  }
  currentPage = pageKey;
  isMobileSheetOpen = false;
  isManageSheetOpen = false;
  if (pageKey !== 'landing') {
    try {
      const _ss = sessionStorage.getItem('_sn_sess');
      if (_ss) { const _sd = JSON.parse(_ss); _sd.page = pageKey; sessionStorage.setItem('_sn_sess', JSON.stringify(_sd)); }
    } catch (_) {}
  }

  // Soft navigate: ถ้า shell render แล้วและไม่ได้ force full render
  // → swap เฉพาะ page-content + อัปเดต active class ไม่ rebuild ทั้งหน้า (ไม่เด่งกลับบน)
  const pageContentEl = document.getElementById('page-content');
  if (!forceFullRender && currentUser && pageContentEl) {
    // อัปเดต active state ของ nav-link ทุกปุ่มใน sidebar/bottomnav
    qsa('.nav-link').forEach(btn => {
      const k = btn.getAttribute('data-nav');
      if (k === pageKey) {
        btn.classList.add('nav-active');
      } else {
        btn.classList.remove('nav-active');
      }
    });
    renderPageContent(pageKey);
    return;
  }

  render();
}

function render() {
  const app = document.getElementById('app');
  if (!currentUser) {
    app.innerHTML = renderLanding();
    refreshIcons();
    attachLandingEvents();
    loadLandingPublicStats();
    return;
  }
  app.innerHTML = renderAppShell();
  refreshIcons();
  attachShellEvents();
  updateSessionTimerDisplay();
  renderPageContent(currentPage);
}

function renderPageContent(pageKey) {
  const container = document.getElementById('page-content');
  if (!container) return;
  switch (pageKey) {
    case 'dash-cde':
      renderDashboardCdePropel(container, 'cde');
      break;
    case 'dash-propel':
      renderDashboardCdePropel(container, 'propel');
      break;
    case 'dash-sanon1':
      renderDashboardSanon(container, 'sanon1');
      break;
    case 'dash-sanon2':
      renderDashboardSanon(container, 'sanon2');
      break;
    case 'dash-drone':
      renderDashboardDrone(container);
      break;
    case 'dash-sales':
      renderDashboardSales(container);
      break;
    case 'dash-loader':
      renderDashboardLoader(container);
      break;
    case 'dash-water':
      renderDashboardWater(container);
      break;
    // ===========================================================
    // หมวดหมู่ 2: จัดการข้อมูล (13 เมนู)
    // ===========================================================
    case 'manage-materials':
      renderManageMaterials(container);
      break;
    case 'manage-reports':
      renderManageReports(container);
      break;
    case 'manage-users':
      renderManageUsers(container);
      break;
    case 'manage-factories':
      renderManageFactories(container);
      break;
    case 'manage-machines':
      renderManageMachines(container);
      break;
    case 'manage-water-sources':
      renderManageWaterSources(container);
      break;
    case 'manage-drone-stock':
      renderManageDroneStock(container);
      break;
    case 'manage-prod-cde':
      renderManageProduction(container, 'cde');
      break;
    case 'manage-prod-propel':
      renderManageProduction(container, 'propel');
      break;
    case 'manage-prod-sanon1':
      renderManageProduction(container, 'sanon1');
      break;
    case 'manage-prod-sanon2':
      renderManageProduction(container, 'sanon2');
      break;
    case 'manage-electric-loader':
      renderManageElectricLoader(container);
      break;
    case 'manage-sales':
      renderManageSales(container);
      break;
    case 'manage-groundwater':
      renderManageGroundwater(container);
      break;
    case 'manage-approvals':
      renderManageApprovals(container);
      break;
    case 'manage-settings':
      renderManageSettings(container);
      break;
    default: {
      const fallback = defaultPageForUser(currentUser);
      if (fallback !== pageKey) { navigateTo(fallback); return; }
      container.innerHTML = `<div class="p-8 text-center text-secondary-400">ไม่พบหน้านี้</div>`;
    }
  }
}

async function doRegister() {
  const root = document.getElementById('modal-root');
  const errBox = document.getElementById('register-error');
  const submitBtn = document.getElementById('register-submit-btn');
  if (errBox) errBox.classList.add('hidden');

  const fullName = qs('#reg-fullname', root).value.trim();
  const username = qs('#reg-username', root).value.trim();
  const password = qs('#reg-password', root).value;
  const phone = qs('#reg-phone', root).value.trim();
  const position = qs('#reg-position', root).value.trim();
  const department = qs('#reg-department', root).value;

  if (!username || !password) {
    if (errBox) { errBox.textContent = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; errBox.classList.remove('hidden'); }
    return;
  }

  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>กำลังลงทะเบียน...</span>`;
    refreshIcons();
  }

  try {
    const { data: existing, error: checkErr } = await db
      .from('app_users')
      .select('id')
      .eq('username', username)
      .maybeSingle();
    if (checkErr) throw checkErr;
    if (existing) {
      if (errBox) { errBox.textContent = 'Username นี้มีผู้ใช้แล้ว'; errBox.classList.remove('hidden'); }
      return;
    }

    const payload = {
      username,
      password,
      full_name: fullName || null,
      phone: phone || null,
      position: position || null,
      department,
      role: 'operator',
      status: 'pending',
    };
    const { error: insertErr } = await db.from('app_users').insert([payload]);
    if (insertErr) throw insertErr;

    showToast('ลงทะเบียนสำเร็จ กรุณารอการอนุมัติจากผู้ดูแลระบบ', 'success');
    closeModal();
    showLoginModal();
  } catch (err) {
    console.error(err);
    if (errBox) { errBox.textContent = 'เกิดข้อผิดพลาดในการลงทะเบียน กรุณาลองใหม่'; errBox.classList.remove('hidden'); }
    else showToast('เกิดข้อผิดพลาดในการลงทะเบียน', 'error');
  } finally {
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.innerHTML = `<i data-lucide="user-plus" class="w-4 h-4"></i><span>ลงทะเบียน</span>`;
      refreshIcons();
    }
  }
}

// public read-only preview stats จาก Supabase จริง (ไม่ mock)
async function loadLandingPublicStats() {
  try {
    const tables = [
      { name: 'production_cde', field: 'feed_ton' },
      { name: 'production_propel', field: 'feed_ton' },
      { name: 'production_sanon1', field: 'feed_ton' },
      { name: 'production_sanon2', field: 'feed_ton' },
    ];
    const results = await Promise.all(tables.map(t =>
      db.from(t.name).select('production_date, feed_ton').eq('status', 'approved')
    ));

    let totalTon = 0;
    let totalDays = new Set();
    let monthly = {}; // 'YYYY-MM' => total

    results.forEach(r => {
      if (r.error || !r.data) return;
      r.data.forEach(row => {
        const ton = Number(row.feed_ton) || 0;
        totalTon += ton;
        if (row.production_date) {
          totalDays.add(row.production_date);
          const ym = String(row.production_date).slice(0,7);
          monthly[ym] = (monthly[ym] || 0) + ton;
        }
      });
    });

    const cardsEl = document.getElementById('landing-stat-cards');
    if (cardsEl) {
      const factoriesActive = 4;
      cardsEl.innerHTML = `
        <div class="bg-white rounded-2xl shadow-sm p-5 hover:shadow-md transition">
          <div class="flex items-center gap-2 text-secondary-400 text-xs mb-1"><i data-lucide="package" class="w-4 h-4"></i>ยอดผลิตรวมสะสม</div>
          <div class="text-2xl font-bold text-secondary-800">${fmtNum(totalTon,0)} <span class="text-sm font-normal text-secondary-400">ตัน</span></div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-5 hover:shadow-md transition">
          <div class="flex items-center gap-2 text-secondary-400 text-xs mb-1"><i data-lucide="calendar-days" class="w-4 h-4"></i>วันที่มีข้อมูลผลิต</div>
          <div class="text-2xl font-bold text-secondary-800">${fmtNum(totalDays.size,0)} <span class="text-sm font-normal text-secondary-400">วัน</span></div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-5 hover:shadow-md transition">
          <div class="flex items-center gap-2 text-secondary-400 text-xs mb-1"><i data-lucide="factory" class="w-4 h-4"></i>หน่วยผลิตที่ติดตาม</div>
          <div class="text-2xl font-bold text-secondary-800">${factoriesActive} <span class="text-sm font-normal text-secondary-400">หน่วย</span></div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-5 hover:shadow-md transition">
          <div class="flex items-center gap-2 text-secondary-400 text-xs mb-1"><i data-lucide="trending-up" class="w-4 h-4"></i>เฉลี่ยต่อวัน</div>
          <div class="text-2xl font-bold text-secondary-800">${fmtNum(totalDays.size ? totalTon/totalDays.size : 0,1)} <span class="text-sm font-normal text-secondary-400">ตัน/วัน</span></div>
        </div>`;
      refreshIcons();
    }

    const months = Object.keys(monthly).sort().slice(-12);
    const chartWrap = document.getElementById('landing-chart-wrap');
    if (chartWrap) {
      const skeleton = chartWrap.querySelector('.skeleton');
      if (skeleton) skeleton.remove();
    }
    const ctx = document.getElementById('landing-chart');
    if (ctx) {
      if (chartRegistry['landing']) chartRegistry['landing'].destroy();
      chartRegistry['landing'] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: months.map(m => { const [y,mo] = m.split('-'); return monthNameTH(Number(mo)).slice(0,3) + ' ' + y; }),
          datasets: [{
            label: 'ยอดผลิตรวม (ตัน)',
            data: months.map(m => monthly[m]),
            backgroundColor: '#6366f1',
            borderRadius: 8,
            maxBarThickness: 40,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { callback: v => fmtNum(v,0) } } }
        }
      });
    }
  } catch (err) {
    console.error('loadLandingPublicStats error', err);
    const cardsEl = document.getElementById('landing-stat-cards');
    if (cardsEl) cardsEl.innerHTML = `<div class="col-span-2 sm:col-span-4 text-center text-secondary-400 text-sm py-6">ไม่สามารถโหลดข้อมูลภาพรวมได้ในขณะนี้</div>`;

}

// ช่วงเวลาเริ่มต้น: เดือนปัจจุบัน
function defaultRangeState() {
  const now = new Date();
  return { mode: 'month', year: now.getFullYear(), month: now.getMonth() + 1, date: now.toISOString().slice(0,10), _initialized: false };
}

// ดึงเดือน/ปีล่าสุดที่มีข้อมูลใน table (dateField เป็น YYYY-MM-DD)
async function detectLatestDataMonth(table, dateField) {
  try {
    const { data, error } = await db.from(table).select(dateField).order(dateField, { ascending: false }).limit(1);
    if (error || !data || !data.length || !data[0][dateField]) return null;
    const d = new Date(data[0][dateField]);
    if (isNaN(d.getTime())) return null;
    return { year: d.getFullYear(), month: d.getMonth() + 1 };
  } catch { return null; }
}

// อัปเดต rangeState + ซิงค์ DOM month/year select
function applyLatestMonthToState(rangeState, idPrefix, latest) {
  if (!latest) return;
  rangeState.mode = 'month';
  rangeState.month = latest.month;
  rangeState.year = latest.year;
  const mSel = document.getElementById(`${idPrefix}-month-select`);
  const ySel = document.getElementById(`${idPrefix}-year-select`);
  if (mSel) mSel.value = String(latest.month);
  if (ySel) ySel.value = String(latest.year);
}

// คำนวณ from/to date string (YYYY-MM-DD) จาก range state
function rangeToDates(rangeState) {
  const { mode, year, month, date } = rangeState;
  if (mode === 'day') {
    return { from: date, to: date };
  }
  if (mode === 'year') {
    return { from: `${year}-01-01`, to: `${year}-12-31` };
  }
  // month
  const lastDay = new Date(year, month, 0).getDate();
  return { from: `${year}-${pad2(month)}-01`, to: `${year}-${pad2(month)}-${pad2(lastDay)}` };
}

function rangeControlHtml(idPrefix, rangeState) {
  const years = [];
  const curY = new Date().getFullYear();
  for (let y = curY; y >= curY - 4; y--) years.push(y);
  return `
  <div class="flex flex-wrap items-center gap-2" id="${idPrefix}-range-controls">
    <div class="flex dash-dark-pill-wrap rounded-xl p-1" style="background:#0A192F; border:1px solid #1d3a5f;">
      ${['day','month','year'].map(m => `
        <button data-range-mode="${m}" class="range-mode-btn px-3 py-1.5 rounded-lg text-xs font-medium transition ${rangeState.mode === m ? 'dash-dark-pill-active' : 'dash-dark-text-muted'}">${m === 'day' ? 'รายวัน' : m === 'month' ? 'รายเดือน' : 'รายปี'}</button>
      `).join('')}
    </div>
    ${rangeState.mode === 'day' ? `
      <input type="date" id="${idPrefix}-date-input" value="${rangeState.date}" class="dash-dark-input rounded-xl px-3 py-1.5 text-xs">
    ` : ''}
    ${rangeState.mode === 'month' ? `
      <select id="${idPrefix}-month-select" class="dash-dark-input rounded-xl px-3 py-1.5 text-xs">
        ${Array.from({length:12},(_, i) => i+1).map(m => `<option value="${m}" ${m===rangeState.month?'selected':''}>${monthNameTH(m)}</option>`).join('')}
      </select>
      <select id="${idPrefix}-year-select" class="dash-dark-input rounded-xl px-3 py-1.5 text-xs">
        ${years.map(y => `<option value="${y}" ${y===rangeState.year?'selected':''}>${y}</option>`).join('')}
      </select>
    ` : ''}
    ${rangeState.mode === 'year' ? `
      <select id="${idPrefix}-year-only-select" class="dash-dark-input rounded-xl px-3 py-1.5 text-xs">
        ${years.map(y => `<option value="${y}" ${y===rangeState.year?'selected':''}>${y}</option>`).join('')}
      </select>
    ` : ''}
  </div>`;
}

function attachRangeControlEvents(idPrefix, rangeState, onChange) {
  qsa(`#${idPrefix}-range-controls .range-mode-btn`).forEach(btn => {
    btn.addEventListener('click', () => {
      rangeState.mode = btn.getAttribute('data-range-mode');
      onChange();
    });
  });
  const dateInput = document.getElementById(`${idPrefix}-date-input`);
  if (dateInput) dateInput.addEventListener('change', () => { rangeState.date = dateInput.value; onChange(); });
  const monthSel = document.getElementById(`${idPrefix}-month-select`);
  if (monthSel) monthSel.addEventListener('change', () => { rangeState.month = Number(monthSel.value); onChange(); });
  const yearSel = document.getElementById(`${idPrefix}-year-select`);
  if (yearSel) yearSel.addEventListener('change', () => { rangeState.year = Number(yearSel.value); onChange(); });
  const yearOnlySel = document.getElementById(`${idPrefix}-year-only-select`);
  if (yearOnlySel) yearOnlySel.addEventListener('change', () => { rangeState.year = Number(yearOnlySel.value); onChange(); });
}

// สัญญาณไฟจราจรตาม % เทียบเป้า/ประสิทธิภาพ
function trafficLightColor(pct) {
  if (pct >= 85) return { bg: '#34d399', text: 'text-emerald-400', bar: 'bg-emerald-400' };
  if (pct >= 60) return { bg: '#fbbf24', text: 'text-amber-400', bar: 'bg-amber-400' };
  return { bg: '#f87171', text: 'text-red-400', bar: 'bg-red-400' };
}

// custom Chart.js plugin: วาด % ตรงกลางตัวเองของแต่ละ slice ของ doughnut (ไม่พึ่ง CDN ภายนอก)
const yieldDataLabelsPlugin = {
  id: 'yieldDataLabelsPlugin',
  afterDraw(chart) {
    if (chart.config._yieldLabelsOff) return;
    const { ctx } = chart;
    const meta = chart.getDatasetMeta(0);
    const dataset = chart.data.datasets[0];
    const total = dataset.data.reduce((a, b) => a + (Number(b) || 0), 0);
    if (!total) return;
    ctx.save();
    ctx.font = '600 11px Kanit, sans-serif';
    ctx.fillStyle = '#0A192F';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    meta.data.forEach((arc, i) => {
      const val = Number(dataset.data[i]) || 0;
      if (!val) return;
      const pct = (val / total) * 100;
      if (pct < 3) return; // slice เล็กเกินไปไม่ใส่ label กันทับ
      const { x, y } = arc.tooltipPosition();
      ctx.fillStyle = '#fff';
      ctx.fillText(`${pct.toFixed(1)}%`, x, y);
    });
    ctx.restore();
  }
};

// custom Chart.js plugin: วาดตัวเลขปริมาณบนแท่ง bar chart (ใช้ในหลาย dashboard)
const barValueLabelsPlugin = {
  id: 'barValueLabelsPlugin',
  afterDatasetsDraw(chart) {
    if (chart.config._barLabelsOff) return;
    const { ctx } = chart;
    chart.data.datasets.forEach((dataset, dsIndex) => {
      if (dataset.type && dataset.type !== 'bar') return;
      const meta = chart.getDatasetMeta(dsIndex);
      if (meta.type && meta.type !== 'bar') return;
      ctx.save();
      ctx.font = '600 10px Kanit, sans-serif';
      ctx.fillStyle = '#e2e8f0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      meta.data.forEach((bar, i) => {
        const val = Number(dataset.data[i]) || 0;
        if (!val) return;
        const pos = bar.tooltipPosition ? bar.tooltipPosition() : { x: bar.x, y: bar.y };
        if (chart.options.indexAxis === 'y') {
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(fmtNum(val, 1), pos.x + 6, pos.y);
        } else {
          ctx.fillText(fmtNum(val, 1), pos.x, pos.y - 4);
        }
      });
      ctx.restore();
    });
  }
};

// custom Chart.js plugin: วาดยอดรวมบนยอดแท่ง stacked bar (1 ตัวเลขต่อ 1 แท่ง)
const stackedBarTotalPlugin = {
  id: 'stackedBarTotalPlugin',
  afterDatasetsDraw(chart) {
    const { ctx, data } = chart;
    if (!data.datasets.length) return;
    const numBars = data.labels.length;
    // คำนวณ total แต่ละ index
    const totals = Array(numBars).fill(0);
    data.datasets.forEach(ds => {
      ds.data.forEach((v, i) => { totals[i] += Number(v) || 0; });
    });
    // หา dataset สุดท้ายที่ไม่ hidden เพื่อดึง x position + y ด้านบนสุด
    let topMeta = null;
    for (let d = data.datasets.length - 1; d >= 0; d--) {
      const m = chart.getDatasetMeta(d);
      if (!m.hidden) { topMeta = m; break; }
    }
    if (!topMeta) return;
    // หา y ต่ำสุด (บนสุดของกราฟ) ของแต่ละแท่งจากทุก dataset
    const topY = Array(numBars).fill(Infinity);
    data.datasets.forEach((ds, di) => {
      const m = chart.getDatasetMeta(di);
      if (m.hidden) return;
      m.data.forEach((bar, i) => { if (bar.y < topY[i]) topY[i] = bar.y; });
    });
    ctx.save();
    ctx.font = 'bold 11px Kanit,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#e2e8f0';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 3;
    topMeta.data.forEach((bar, i) => {
      const total = totals[i];
      if (!total) return;
      const label = total >= 10000 ? fmtNum(total/1000,1)+'K ตัน' : fmtNum(total,0)+' ตัน';
      ctx.fillText(label, bar.x, topY[i] - 4);
    });
    ctx.shadowBlur = 0;
    ctx.restore();
  }
};

// วาด half-gauge progress ring ด้วย SVG arc — คืน HTML string
function gaugeSvg(pct, label, idSuffix) {
  const clamped = Math.max(0, Math.min(100, pct || 0));
  const color = trafficLightColor(clamped);
  const r = 54;
  const cx = 64, cy = 64;
  const circumference = Math.PI * r; // ครึ่งวงกลม
  const offset = circumference - (circumference * clamped / 100);
  return `
    <div class="flex flex-col items-center">
      <svg width="128" height="74" viewBox="0 0 128 74" class="overflow-visible">
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#1d3a5f" stroke-width="12" stroke-linecap="round"/>
        <path id="gauge-arc-${idSuffix}" d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${color.bg}" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="transition: stroke-dashoffset .5s ease;"/>
      </svg>
      <div class="text-2xl font-bold -mt-7 ${color.text}">${fmtNum(clamped,1)}%</div>
      <div class="text-xs dash-dark-text-muted mt-1">${escapeHtml(label)}</div>
    </div>`;
}

// นับ "วันทำงาน" เฉพาะวันที่มี runtime จริง (runtime_hour + runtime_minute > 0)
// วันที่มี record แต่ไม่มีเวลาเดินเครื่องเลย (เช่น วันหยุด/ไม่ได้ผลิต) จะไม่ถูกนับเป็นวันทำงาน
function countWorkingDays(rows) {
  const workingDates = new Set();
  rows.forEach(r => {
    const runtimeMinutes = (Number(r.runtime_hour)||0) * 60 + (Number(r.runtime_minute)||0);
    if (runtimeMinutes > 0) workingDates.add(r.production_date);
  });
  return workingDates.size;
}

// คำนวณ Availability% และ Performance% จากแถวข้อมูลจริงในช่วงที่เลือก
// Availability = runtime จริงรวม / (จำนวนวันทำงาน x ชั่วโมงกะมาตรฐาน 9 ชม.) x 100
// Performance  = avg_ton_per_hour เฉลี่ยจริง / target_throughput x 100
function computeOee(rows, targetThroughput) {
  const SHIFT_HOURS = 9; // ชั่วโมงกะมาตรฐานต่อวัน
  const days = countWorkingDays(rows);
  const runtimeTotal = rows.reduce((s,r) => s + (Number(r.runtime_hour)||0) + (Number(r.runtime_minute)||0)/60, 0);
  const standardHours = days * SHIFT_HOURS;
  const availabilityPct = standardHours > 0 ? Math.min(100, (runtimeTotal / standardHours) * 100) : 0;
  const avgThroughput = rows.length ? rows.reduce((s,r) => s + (Number(r.avg_ton_per_hour)||0), 0) / rows.length : 0;
  const performancePct = (targetThroughput && targetThroughput > 0) ? Math.min(150, (avgThroughput / targetThroughput) * 100) : 0;
  return { availabilityPct, performancePct, runtimeTotal, standardHours, avgThroughput, days };
}

function renderOeeGaugeBlock(type, rows, targetThroughput) {
  const el = document.getElementById(`${type}-oee-block`);
  if (!el) return;
  const oee = computeOee(rows, targetThroughput);
  el.innerHTML = `
    <div class="dash-dark-card rounded-2xl p-5">
      <h3 class="text-sm font-medium dash-dark-text-muted mb-3 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4 text-cyan-400"></i>OEE Gauge (Availability / Performance)</h3>
      <div class="grid grid-cols-2 gap-2">
        ${gaugeSvg(oee.availabilityPct, 'Availability', `${type}-avail`)}
        ${gaugeSvg(oee.performancePct, 'Performance', `${type}-perf`)}
      </div>
      <p class="text-xs dash-dark-text-muted mt-2 text-center">Runtime ${fmtNum(oee.runtimeTotal,1)}/${fmtNum(oee.standardHours,0)} ชม. • Throughput เฉลี่ย ${fmtNum(oee.avgThroughput,1)} / เป้า ${fmtNum(targetThroughput||0,1)} ตัน/ชม.</p>
    </div>`;
  refreshIcons();
}

// Breakdown analysis: group by breakdown_detail — แสดงครั้งละ 5 แถว + pagination
const _breakdownPage = {};
const _breakdownData = {};
const BREAKDOWN_PAGE_SIZE = 5;

window._breakdownChangePage = function(type, delta) {
  if (!_breakdownData[type]) return;
  const totalPages = Math.ceil(_breakdownData[type].entries.length / BREAKDOWN_PAGE_SIZE);
  _breakdownPage[type] = Math.max(0, Math.min(totalPages - 1, (_breakdownPage[type] || 0) + delta));
  renderBreakdownTable(type);
};

function renderParetoBlock(type, rows) {
  const counts = {};
  rows.forEach(r => {
    const detail = (r.breakdown_detail || '').trim();
    if (detail) counts[detail] = (counts[detail] || 0) + 1;
  });
  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const total = entries.reduce((s,e) => s + e[1], 0);
  _breakdownData[type] = { entries, total };
  _breakdownPage[type] = 0; // reset เมื่อโหลดข้อมูลใหม่
  renderBreakdownTable(type);
}

function renderBreakdownTable(type) {
  const el = document.getElementById(`${type}-breakdown-block`);
  if (!el) return;
  const stored = _breakdownData[type];
  if (!stored || !stored.entries.length) {
    el.innerHTML = `
      <div class="dash-dark-card rounded-2xl p-5">
        <h3 class="text-sm font-medium dash-dark-text-muted mb-3">สาเหตุหยุดเครื่อง (Breakdown)</h3>
        <p class="text-center dash-dark-text-muted text-sm py-12">ไม่มีข้อมูล breakdown ในช่วงเวลานี้</p>
      </div>`;
    refreshIcons();
    return;
  }
  const { entries, total } = stored;
  const page = _breakdownPage[type] || 0;
  const totalPages = Math.ceil(entries.length / BREAKDOWN_PAGE_SIZE);
  const pageEntries = entries.slice(page * BREAKDOWN_PAGE_SIZE, (page + 1) * BREAKDOWN_PAGE_SIZE);
  // คำนวณ cumulative ตั้งแต่แถวแรก ไม่ใช่แค่ในหน้า
  let cumBase = entries.slice(0, page * BREAKDOWN_PAGE_SIZE).reduce((s,e) => s + e[1], 0);
  let cum = cumBase;
  const rowsHtml = pageEntries.map(([detail, count]) => {
    const pct = (count / total) * 100;
    cum += count;
    const cumPct = (cum / total) * 100;
    return `
      <tr class="border-b dash-dark-border dash-dark-row-hover dash-dark-text">
        <td class="py-2 pr-3">${escapeHtml(detail)}</td>
        <td class="py-2 pr-3 text-right">${fmtNum(count,0)}</td>
        <td class="py-2 pr-3 text-right">${fmtNum(pct,1)}%</td>
        <td class="py-2 pr-3 text-right">${fmtNum(cumPct,1)}%</td>
      </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="dash-dark-card rounded-2xl p-5 overflow-x-auto">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-medium dash-dark-text-muted">สาเหตุหยุดเครื่อง (Breakdown)</h3>
        <span class="text-xs dash-dark-text-muted">${entries.length} รายการ</span>
      </div>
      <table class="w-full text-sm">
        <thead><tr class="text-left dash-dark-text-muted border-b dash-dark-border">
          <th class="py-2 pr-3">รายละเอียดสาเหตุ</th>
          <th class="py-2 pr-3 text-right">จำนวนครั้ง</th>
          <th class="py-2 pr-3 text-right">% ของรวม</th>
          <th class="py-2 pr-3 text-right">% สะสม</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
        <tfoot><tr class="dash-dark-text font-semibold border-t dash-dark-border">
          <td class="py-2 pr-3">รวม</td>
          <td class="py-2 pr-3 text-right">${fmtNum(total,0)}</td>
          <td class="py-2 pr-3 text-right">100%</td>
          <td class="py-2 pr-3 text-right">-</td>
        </tr></tfoot>
      </table>
      ${totalPages > 1 ? `
      <div class="flex items-center justify-between mt-3 pt-3 border-t dash-dark-border">
        <button onclick="_breakdownChangePage('${type}',-1)" class="text-xs px-3 py-1.5 rounded-lg dash-dark-card border dash-dark-border dash-dark-text-muted hover:dash-dark-text transition disabled:opacity-30" ${page === 0 ? 'disabled' : ''}>← ก่อนหน้า</button>
        <span class="text-xs dash-dark-text-muted">หน้า ${page+1} / ${totalPages}</span>
        <button onclick="_breakdownChangePage('${type}',1)" class="text-xs px-3 py-1.5 rounded-lg dash-dark-card border dash-dark-border dash-dark-text-muted hover:dash-dark-text transition disabled:opacity-30" ${page === totalPages-1 ? 'disabled' : ''}>ถัดไป →</button>
      </div>` : ''}
    </div>`;
  refreshIcons();
}

// custom Chart.js plugin: วาดตัวเลข Feed (ตัน) บนแท่ง และ Throughput (ตัน/ชม.) บนจุดของเส้น สำหรับ Feed/Throughput combo chart
const feedThroughputDataLabelsPlugin = {
  id: 'feedThroughputDataLabelsPlugin',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    ctx.save();
    ctx.font = '600 10px Kanit, sans-serif';
    ctx.textAlign = 'center';
    chart.data.datasets.forEach((dataset, dsIndex) => {
      const meta = chart.getDatasetMeta(dsIndex);
      if (meta.hidden) return;
      meta.data.forEach((point, i) => {
        const val = Number(dataset.data[i]) || 0;
        if (!val) return;
        const pos = point.tooltipPosition ? point.tooltipPosition() : { x: point.x, y: point.y };
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 3;
        if (dataset.type === 'bar') {
          ctx.fillStyle = '#ffffff';
          ctx.textBaseline = 'bottom';
          ctx.fillText(fmtNum(val, 0), pos.x, pos.y - 4);
        } else {
          ctx.fillStyle = '#fde68a';
          ctx.textBaseline = 'bottom';
          ctx.fillText(fmtNum(val, 1), pos.x, pos.y - 8);
        }
        ctx.shadowBlur = 0;
      });
    });
    ctx.restore();
  }
};

// Feed/Throughput combo chart: bar=feed_ton (แกนซ้าย), line=avg_ton_per_hour (แกนขวา)
// mode=year → aggregate by month (ยอดตันรวม + ตัน/ชม. weighted), mode=month/day → รายวัน
function renderFeedThroughputComboBlock(type, rows, rangeState) {
  const el = document.getElementById(`${type}-trend-chart-block`);
  if (!el) return;

  let labels, feedData, throughputData, chartTitle;
  const isYearMode = rangeState && rangeState.mode === 'year';

  if (isYearMode) {
    chartTitle = 'Feed / Throughput รายเดือน';
    const monthlyMap = {};
    rows.forEach(r => {
      const key = r.production_date ? String(r.production_date).slice(0, 7) : null;
      if (!key) return;
      if (!monthlyMap[key]) monthlyMap[key] = { feedSum: 0, runtimeSum: 0 };
      monthlyMap[key].feedSum += Number(r.feed_ton) || 0;
      const rth = (Number(r.runtime_hour) || 0) + (Number(r.runtime_minute) || 0) / 60;
      monthlyMap[key].runtimeSum += rth;
    });
    const keys = Object.keys(monthlyMap).sort();
    labels = keys.map(k => { const [,m] = k.split('-'); return monthNameTH(Number(m)); });
    feedData = keys.map(k => monthlyMap[k].feedSum);
    throughputData = keys.map(k => monthlyMap[k].runtimeSum > 0 ? monthlyMap[k].feedSum / monthlyMap[k].runtimeSum : 0);
  } else {
    chartTitle = 'Feed / Throughput รายวัน';
    labels = rows.map(r => fmtDate(r.production_date));
    feedData = rows.map(r => Number(r.feed_ton) || 0);
    throughputData = rows.map(r => Number(r.avg_ton_per_hour) || 0);
  }

  el.innerHTML = `
    <div class="dash-dark-card rounded-2xl p-5">
      <h3 class="text-sm font-medium dash-dark-text-muted mb-3">${chartTitle}</h3>
      ${labels.length ? `<div class="relative h-72"><canvas id="${type}-trend-canvas"></canvas></div>` : `<p class="text-center dash-dark-text-muted text-sm py-12">ไม่มีข้อมูลในช่วงเวลานี้</p>`}
    </div>`;
  refreshIcons();
  if (labels.length) {
    const ctx = document.getElementById(`${type}-trend-canvas`);
    destroyChart(`${type}-trend`);
    chartRegistry[`${type}-trend`] = new Chart(ctx, {
      data: {
        labels,
        datasets: [
          { type: 'bar', label: 'Feed (ตัน)', data: feedData, backgroundColor: '#4ade80', yAxisID: 'y', borderRadius: 4 },
          { type: 'line', label: 'Throughput (ตัน/ชม.)', data: throughputData, borderColor: '#f59e0b', backgroundColor: '#f59e0b', pointBackgroundColor: '#f59e0b', pointRadius: 4, yAxisID: 'y1', tension: 0.3 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 22 } },
        plugins: { legend: { labels: { color: '#cbd5e1' } } },
        scales: {
          y: { type: 'linear', position: 'left', title: { display: true, text: 'ตัน', color: '#94a3b8' }, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' }, suggestedMax: Math.max(...feedData) * 1.2 || undefined },
          y1: { type: 'linear', position: 'right', title: { display: true, text: 'ตัน/ชม.', color: '#94a3b8' }, ticks: { color: '#94a3b8' }, grid: { drawOnChartArea: false }, suggestedMax: Math.max(...throughputData) * 1.3 || undefined },
          x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } },
        }
      },
      plugins: [feedThroughputDataLabelsPlugin]
    });
  }
}

// คำนวณเป้า KPI Gap ตามโหมดช่วงเวลา (rayState.mode): รายเดือน/รายปี ใช้เป้าตรงตาม cfg, รายวัน prorate จากเป้ารายเดือน/จำนวนวันในเดือนนั้น
function resolveKpiTarget(cfg, rangeState) {
  if (rangeState.mode === 'year') return cfg.targetYear;
  if (rangeState.mode === 'day') {
    const d = new Date(rangeState.date);
    const daysInMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    return cfg.targetMonth / daysInMonth;
  }
  return cfg.targetMonth; // month (default)
}

// KPI Gap progress bar พร้อมสัญญาณไฟจราจร
function renderKpiGapBlock(type, cfg, rows, rangeState) {
  const el = document.getElementById(`${type}-kpi-block`);
  if (!el) return;
  const feedTotal = rows.reduce((s,r) => s + (Number(r.feed_ton)||0), 0);
  const target = resolveKpiTarget(cfg, rangeState);
  const pct = target > 0 ? Math.min(100, (feedTotal / target) * 100) : 0;
  const color = trafficLightColor(pct);
  const periodLabel = rangeState.mode === 'day' ? fmtDate(rangeState.date)
    : rangeState.mode === 'year' ? `ปี ${rangeState.year}`
    : `${monthNameTH(rangeState.month)} ${rangeState.year}`;
  el.innerHTML = `
    <div class="dash-dark-card rounded-2xl p-5">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium dash-dark-text-muted flex items-center gap-2"><i data-lucide="target" class="w-4 h-4 text-cyan-400"></i>KPI Gap เทียบเป้า (${escapeHtml(periodLabel)})</span>
        <span class="text-sm font-semibold ${color.text}">${fmtNum(pct,1)}%</span>
      </div>
      <div class="w-full h-3 rounded-full overflow-hidden" style="background:#1d3a5f">
        <div class="h-full ${color.bar} rounded-full transition-all" style="width:${pct}%"></div>
      </div>
      <p class="text-xs dash-dark-text-muted mt-2">${fmtNum(feedTotal,1)} / ${fmtNum(target,0)} ตัน</p>
    </div>`;
  refreshIcons();
}

// แสดง banner สถานะข้อมูล (เบื้องต้น / ข้อมูลจริง) บน Dashboard
async function renderDashboardStatusBanner(type, rows, from, to) {
  const el = document.getElementById(`${type}-data-status-block`);
  if (!el) return;
  try {
    const fc = { cde:'CDE', propel:'Propel', sanon1:'Sanon1', sanon2:'Sanon2' }[type];
    if (!fc) return;
    const uniqueDates = [...new Set(rows.map(r => r.production_date))];
    if (!uniqueDates.length) { el.innerHTML = `<span class="text-xs text-slate-400">ไม่มีข้อมูลในช่วงนี้</span>`; return; }
    const { data: sd } = await db.from('production_daily_status')
      .select('production_date,status').eq('factory_code', fc)
      .gte('production_date', from).lte('production_date', to);
    const sm = {}; (sd||[]).forEach(s => { sm[s.production_date] = s.status; });
    const confirmed = uniqueDates.filter(d => sm[d] === 'confirmed').length;
    const total = uniqueDates.length;
    const prelim = total - confirmed;
    let html;
    if (confirmed === total) {
      html = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-500 bg-opacity-20 text-green-300 border border-green-500 border-opacity-40"><i data-lucide="check-circle" class="w-3 h-3"></i>ข้อมูลจริง ✓ ครบ ${total} วัน</span>`;
    } else if (confirmed === 0) {
      html = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-500 bg-opacity-20 text-amber-300 border border-amber-500 border-opacity-40"><i data-lucide="clock" class="w-3 h-3"></i>ข้อมูลเบื้องต้น — ${total} วัน รอยืนยัน</span>`;
    } else {
      html = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-500 bg-opacity-20 text-amber-300 border border-amber-500 border-opacity-40"><i data-lucide="clock" class="w-3 h-3"></i>เบื้องต้น ${prelim} วัน</span><span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-500 bg-opacity-20 text-green-300 border border-green-500 border-opacity-40"><i data-lucide="check-circle" class="w-3 h-3"></i>จริง ${confirmed} วัน</span>`;
    }
    el.innerHTML = html; refreshIcons();
  } catch(e) { console.warn('status banner:', e); el.innerHTML = ''; }
}

            ${Array.from({length:12},(_, i) => i+1).map(m => `<option value="${m}" ${m===_droneState.month?'selected':''}>${monthNameTH(m)}</option>`).join('')}
          </select>
          <select id="drone-year-select" class="dash-dark-input rounded-xl px-3 py-1.5 text-xs">
            ${Array.from({length:5},(_, i) => new Date().getFullYear()-i).map(y => `<option value="${y}" ${y===_droneState.year?'selected':''}>${y}</option>`).join('')}
          </select>
          <div class="flex dash-dark-pill-wrap rounded-xl p-1" style="background:#0A192F; border:1px solid #1d3a5f;" id="drone-factory-toggle"></div>
        </div>
      </div>
      <div id="drone-chart-block">${skeletonBlockDark()}</div>
      <div id="drone-table-block">${skeletonBlockDark('h-56')}</div>
    </div>
    </div>`;
  refreshIcons();

  document.getElementById('drone-month-select').addEventListener('change', e => { _droneState.month = Number(e.target.value); loadDroneData(); });
  document.getElementById('drone-year-select').addEventListener('change', e => { _droneState.year = Number(e.target.value); loadDroneData(); });

  loadDroneFactories().then(loadDroneData);
}

async function loadDroneFactories() {
  if (_droneFactoriesCache) { populateDroneFactorySelect(); return; }
  try {
    const { data, error } = await db.from('factories').select('id, name').eq('status','active');
    if (error) throw error;
    // dedupe ด้วย Map ตาม id กันกรณีข้อมูลซ้ำจาก join/insert ซ้ำ
    const map = new Map();
    (data || []).forEach(f => { if (!map.has(f.id)) map.set(f.id, f); });
    _droneFactoriesCache = Array.from(map.values());
  } catch (err) {
    console.error(err);
    _droneFactoriesCache = [];
  }
  populateDroneFactorySelect();
}
function populateDroneFactorySelect() {
  const wrap = document.getElementById('drone-factory-toggle');
  if (!wrap) return;
  // ถ้ายังไม่เลือกโรงงานเลย ให้ default เป็นโรงงานแรกในรายการ (ไม่มีตัวเลือก "ทุกโรงงาน" ตามที่ระบุ)
  if (_droneState.factoryId === 'all' && _droneFactoriesCache.length) _droneState.factoryId = _droneFactoriesCache[0].id;
  wrap.innerHTML = _droneFactoriesCache.map(f => `
    <button data-factory-id="${f.id}" class="drone-factory-btn px-3 py-1.5 rounded-lg text-xs font-medium transition ${f.id===_droneState.factoryId?'dash-dark-pill-active':'dash-dark-text-muted'}">${escapeHtml(f.name)}</button>
  `).join('');
  qsa('.drone-factory-btn', wrap).forEach(btn => {
    btn.addEventListener('click', () => {
      _droneState.factoryId = btn.getAttribute('data-factory-id');
      populateDroneFactorySelect();
      loadDroneData();
    });
  });
}

async function loadDroneData() {
  const chartBlock = document.getElementById('drone-chart-block');
  const tableBlock = document.getElementById('drone-table-block');
  try {
    if (!_droneState._initialized) {
      const { data: latestDrone } = await db.from('drone_stock').select('stock_year, stock_month').order('stock_year', { ascending: false }).order('stock_month', { ascending: false }).limit(1);
      if (latestDrone && latestDrone.length) {
        _droneState.year = latestDrone[0].stock_year;
        _droneState.month = latestDrone[0].stock_month;
        const mSel = document.getElementById('drone-month-select');
        const ySel = document.getElementById('drone-year-select');
        if (mSel) mSel.value = String(_droneState.month);
        if (ySel) ySel.value = String(_droneState.year);
      }
      _droneState._initialized = true;
    }
    let query = db.from('drone_stock').select('*, factories(name)').eq('stock_month', _droneState.month).eq('stock_year', _droneState.year);
    if (_droneState.factoryId !== 'all') query = query.eq('factory_id', _droneState.factoryId);
    const { data, error } = await query;
    if (error) throw error;
    const rows = data || [];

    if (!rows.length) {
      chartBlock.innerHTML = `<div class="dash-dark-card rounded-2xl p-8 text-center dash-dark-text-muted text-sm">ไม่มีข้อมูลสต็อกในเดือน/ปีที่เลือก</div>`;
      tableBlock.innerHTML = '';
      refreshIcons();
      return;
    }

    const byType = {};
    rows.forEach(r => { byType[r.stone_type || 'ไม่ระบุ'] = (byType[r.stone_type || 'ไม่ระบุ'] || 0) + (Number(r.ton_amount)||0); });
    chartBlock.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">สต็อกตามประเภทหิน (ตัน)</h3><div class="relative h-72"><canvas id="drone-canvas"></canvas></div></div>`;
    refreshIcons();
    const ctx = document.getElementById('drone-canvas');
    destroyChart('drone');
    chartRegistry['drone'] = new Chart(ctx, {
      type: 'bar',
      data: { labels: Object.keys(byType), datasets: [{ label: 'ตัน', data: Object.values(byType), backgroundColor: '#39FF14', borderRadius: 8 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } }, x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } } }, layout: { padding: { top: 18 } } },
      plugins: [barValueLabelsPlugin]
    });

    // ตาราง "รายละเอียดสต็อก" — filter จริงตามโรงงานที่เลือกจาก dropdown (rows มาจาก query ที่ filter ด้วย _droneState.factoryId แล้ว)
    tableBlock.innerHTML = `
      <div class="dash-dark-card rounded-2xl p-5 overflow-x-auto">
        <h3 class="text-sm font-medium dash-dark-text-muted mb-3">รายละเอียดสต็อก${_droneState.factoryId !== 'all' && _droneFactoriesCache ? ' — ' + escapeHtml((_droneFactoriesCache.find(f=>f.id===_droneState.factoryId)||{}).name || '') : ''}</h3>
        <table class="w-full text-sm">
          <thead><tr class="text-left dash-dark-text-muted border-b dash-dark-border">
            <th class="py-2 pr-3">โรงงาน</th><th class="py-2 pr-3">ประเภทหิน</th><th class="py-2 pr-3">ปริมาตร (ลบ.ม.)</th><th class="py-2 pr-3">ถพ.</th><th class="py-2 pr-3">น้ำหนัก (ตัน)</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr class="border-b dash-dark-border dash-dark-row-hover dash-dark-text">
                <td class="py-2 pr-3">${escapeHtml(r.factories ? r.factories.name : '-')}</td>
                <td class="py-2 pr-3">${escapeHtml(r.stone_type || '-')}</td>
                <td class="py-2 pr-3">${fmtNum(r.volume_cum,2)}</td>
                <td class="py-2 pr-3">${fmtNum(r.bulk_density,2)}</td>
                <td class="py-2 pr-3 font-medium">${fmtNum(r.ton_amount,2)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    refreshIcons();
  } catch (err) {
    console.error(err);
    chartBlock.innerHTML = errorBlockDark();
    tableBlock.innerHTML = '';
    refreshIcons();
  }
}

async function loadSalesData() {
  const statsEl = document.getElementById('sales-stat-cards');
  const chartEl = document.getElementById('sales-chart-block');
  const monthlyChartEl = document.getElementById('sales-monthly-chart-block');
  const tableEl = document.getElementById('sales-table-block');
  try {
    if (!_salesRangeState._initialized) {
      const latest = await detectLatestDataMonth('sales', 'sale_date');
      applyLatestMonthToState(_salesRangeState, 'sales', latest);
      _salesRangeState._initialized = true;
    }
    const { from, to } = rangeToDates(_salesRangeState);
    let query = db
      .from('sales')
      .select('*, factories(name)')
      .gte('sale_date', from)
      .lte('sale_date', to)
      .order('sale_date', { ascending: false });
    if (_salesState.factoryId !== 'all') query = query.eq('factory_id', _salesState.factoryId);
    const { data, error } = await query;
    if (error) throw error;
    const rows = data || [];

    // --- previous period fetch (for MoM comparison) ---
    let byFactoryPrev = {}, totalQtyPrev = 0;
    try {
      const { mode, year, month, date } = _salesRangeState;
      let prevFrom, prevTo;
      if (mode === 'day') {
        const d = new Date(date); d.setDate(d.getDate() - 1);
        prevFrom = prevTo = d.toISOString().slice(0,10);
      } else if (mode === 'year') {
        prevFrom = `${year-1}-01-01`; prevTo = `${year-1}-12-31`;
      } else {
        const pm = month === 1 ? 12 : month - 1;
        const py = month === 1 ? year - 1 : year;
        prevFrom = `${py}-${pad2(pm)}-01`;
        prevTo = `${py}-${pad2(pm)}-${pad2(new Date(py, pm, 0).getDate())}`;
      }
      let prevQ = db.from('sales').select('*, factories(name)').gte('sale_date', prevFrom).lte('sale_date', prevTo);
      if (_salesState.factoryId !== 'all') prevQ = prevQ.eq('factory_id', _salesState.factoryId);
      const { data: pData } = await prevQ;
      (pData || []).forEach(r => {
        const fn = r.factories ? r.factories.name : (r.factory_code || 'ไม่ระบุ');
        byFactoryPrev[fn] = (byFactoryPrev[fn] || 0) + (Number(r.quantity_ton) || 0);
        totalQtyPrev += (Number(r.quantity_ton) || 0);
      });
    } catch(e) { console.error(e); }

    // --- YoY fetch (เดือนเดียวกัน ปีที่แล้ว) — เฉพาะ month mode ---
    let byFactoryYoy = {}, totalQtyYoy = 0;
    if (_salesRangeState.mode === 'month') {
      try {
        const yoyY = _salesRangeState.year - 1;
        const yoyM = _salesRangeState.month;
        const yoyFrom = `${yoyY}-${pad2(yoyM)}-01`;
        const yoyTo = `${yoyY}-${pad2(yoyM)}-${pad2(new Date(yoyY, yoyM, 0).getDate())}`;
        let yoyQ = db.from('sales').select('*, factories(name)').gte('sale_date', yoyFrom).lte('sale_date', yoyTo);
        if (_salesState.factoryId !== 'all') yoyQ = yoyQ.eq('factory_id', _salesState.factoryId);
        const { data: yData } = await yoyQ;
        (yData || []).forEach(r => {
          const fn = r.factories ? r.factories.name : (r.factory_code || 'ไม่ระบุ');
          byFactoryYoy[fn] = (byFactoryYoy[fn] || 0) + (Number(r.quantity_ton) || 0);
          totalQtyYoy += (Number(r.quantity_ton) || 0);
        });
      } catch(e) { console.error(e); }
    }

    // --- aggregations ---
    const totalQty = rows.reduce((s,r) => s + (Number(r.quantity_ton)||0), 0);
    const hasPrice = rows.some(r => r.price_per_ton != null && Number(r.price_per_ton) > 0);
    const totalValue = rows.reduce((s,r) => s + (Number(r.total_value)||0), 0);
    const byFactory = {};
    const byStoneType = {};
    rows.forEach(r => {
      const fname = r.factories ? r.factories.name : (r.factory_code || 'ไม่ระบุ');
      byFactory[fname] = (byFactory[fname] || 0) + (Number(r.quantity_ton)||0);
      const st = r.stone_type || 'ไม่ระบุ';
      byStoneType[st] = (byStoneType[st] || 0) + (Number(r.quantity_ton)||0);
    });
    const topFactory = Object.entries(byFactory).sort((a,b)=>b[1]-a[1])[0];
    const topStone = Object.entries(byStoneType).sort((a,b)=>b[1]-a[1])[0];

    // --- stat cards ---
    statsEl.innerHTML = [
      statCard('package','ยอดขายรวม', fmtNum(totalQty,1), 'ตัน'),
      statCard('gem','ประเภทหินขายดีสุด', topStone ? escapeHtml(topStone[0]) : '-', topStone ? fmtNum(topStone[1],1)+' ตัน' : ''),
      statCard('factory','โรงงานขายมากสุด', topFactory ? escapeHtml(topFactory[0]) : '-', topFactory ? fmtNum(topFactory[1],1)+' ตัน' : ''),
      hasPrice
        ? statCard('banknote','มูลค่าขายรวม', fmtNum(totalValue,0), 'บาท')
        : statCard('banknote','มูลค่าขายรวม', '-', 'ยังไม่มีข้อมูลราคา'),
    ].join('');
    refreshIcons();


    if (!rows.length) {
      const emptyHtml = `<div class="dash-dark-card rounded-2xl p-8 text-center dash-dark-text-muted text-sm">ไม่มีข้อมูลยอดขายในช่วงเวลานี้</div>`;
      chartEl.innerHTML = monthlyChartEl.innerHTML = tableEl.innerHTML = emptyHtml;
      refreshIcons();
      return;
    }

    // --- chart 1: Stacked bar — ยอดขายแยกโรงงาน สีตามประเภทหิน ---
    const factories = Object.keys(byFactory).sort();
    const allStoneTypes = Object.keys(byStoneType).sort((a,b) => byStoneType[b] - byStoneType[a]);
    const byFactoryStone = {};
    factories.forEach(f => { byFactoryStone[f] = {}; });
    rows.forEach(r => {
      const fname = r.factories ? r.factories.name : (r.factory_code || 'ไม่ระบุ');
      const st = r.stone_type || 'ไม่ระบุ';
      if (!byFactoryStone[fname]) byFactoryStone[fname] = {};
      byFactoryStone[fname][st] = (byFactoryStone[fname][st] || 0) + (Number(r.quantity_ton)||0);
    });
    const stackedColors = ['#378ADD','#1D9E75','#BA7517','#D85A30','#D4537E','#7F77DD','#39FF14','#888780'];
    // Grouped chart: แสดงเฉพาะ top stone types ที่มีข้อมูล (ไม่เกิน 6 ชนิด เพื่อไม่ให้แน่นเกิน)
    const displayStoneTypes = allStoneTypes.slice(0, 6);
    const groupedDatasets = displayStoneTypes.map((st, i) => ({
      label: st,
      data: factories.map(f => byFactoryStone[f][st] || 0),
      backgroundColor: stackedColors[i % stackedColors.length],
      borderRadius: 4,
      borderSkipped: false,
    }));
    chartEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">ยอดขายแยกโรงงาน (ตัน) — เปรียบเทียบชนิดหิน</h3><div class="relative" style="height:320px"><canvas id="sales-canvas"></canvas></div></div>`;
    refreshIcons();
    destroyChart('sales');
    chartRegistry['sales'] = new Chart(document.getElementById('sales-canvas'), {
      type: 'bar',
      data: { labels: factories, datasets: groupedDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 22 } },
        plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, padding: 8, boxWidth: 12 } } },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.06)' } },
          y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } }
        }
      },
      plugins: [barValueLabelsPlugin]
    });

    // --- chart 2: Donut — สัดส่วนประเภทหิน + factory breakdown ---
    const topStones = Object.entries(byStoneType).sort((a,b) => b[1]-a[1]).slice(0, 8);
    const donutTotal = topStones.reduce((s,[,v]) => s+v, 0);
    const factoryBreakdownHtml = Object.entries(byFactory).sort((a,b)=>b[1]-a[1]).map(([fname,fval]) => {
      const pct = totalQty ? fval/totalQty*100 : 0;
      return `<div class="mb-2.5">
        <div class="flex justify-between items-center text-xs mb-1">
          <span class="dash-dark-text font-medium">${escapeHtml(fname)}</span>
          <span style="color:#38bdf8" class="font-semibold">${fmtNum(pct,1)}%</span>
        </div>
        <div class="h-1.5 rounded-full overflow-hidden" style="background:rgba(255,255,255,0.1)">
          <div class="h-1.5 rounded-full" style="background:#378ADD;width:${Math.min(Math.round(pct),100)}%"></div>
        </div>
        <div class="text-xs dash-dark-text-muted mt-0.5">${fmtNum(fval,1)} ตัน</div>
      </div>`;
    }).join('');
    monthlyChartEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5">
      <h3 class="text-sm font-medium dash-dark-text-muted mb-4">สัดส่วนประเภทหิน</h3>
      <div class="flex flex-col sm:flex-row items-start gap-4">
        <div class="relative flex-shrink-0" style="height:200px;width:190px"><canvas id="sales-donut-canvas"></canvas></div>
        <div class="flex flex-col gap-1.5 flex-1 min-w-0 self-center">
          ${topStones.map(([st,v],i)=>`<div class="flex items-center gap-2 text-xs">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${stackedColors[i%stackedColors.length]}"></span>
            <span class="dash-dark-text truncate flex-1">${escapeHtml(st)}</span>
            <span class="dash-dark-text-muted whitespace-nowrap">${fmtNum(v,1)} ตัน</span>
            <span class="whitespace-nowrap w-11 text-right font-semibold" style="color:#38bdf8">${donutTotal?fmtNum(v/donutTotal*100,1):0}%</span>
          </div>`).join('')}
        </div>
        <div class="flex-shrink-0 border-l dash-dark-border pl-4 self-stretch" style="min-width:160px">
          <div class="text-xs dash-dark-text-muted mb-3 font-semibold tracking-wider uppercase">สัดส่วนตามโรงงาน</div>
          ${factoryBreakdownHtml}
        </div>
      </div>
    </div>`;
    refreshIcons();
    destroyChart('sales-monthly');
    chartRegistry['sales-monthly'] = new Chart(document.getElementById('sales-donut-canvas'), {
      type: 'doughnut',
      data: {
        labels: topStones.map(([st]) => st),
        datasets: [{ data: topStones.map(([,v]) => v), backgroundColor: stackedColors.slice(0, topStones.length), borderWidth: 2, borderColor: '#0A192F' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${fmtNum(ctx.raw,1)} ตัน (${donutTotal?fmtNum(ctx.raw/donutTotal*100,1):0}%)` } }
        },
        cutout: '62%'
      }
    });

    // --- chart 3: Line trend แยกโรงงาน + pivot table ใน tableEl ---
    const isYearMode = _salesRangeState && _salesRangeState.mode === 'year';
    const trendTitle = isYearMode ? 'แนวโน้มยอดขายรายเดือน แยกโรงงาน (ตัน)' : 'แนวโน้มยอดขายรายวัน แยกโรงงาน (ตัน)';
    const factoryLineColors = ['#38bdf8','#34d399','#fb923c','#a78bfa','#f472b6','#facc15'];
    // group by date key + factory
    const byKeyFactory = {};
    rows.forEach(r => {
      const fname = r.factories ? r.factories.name : (r.factory_code || 'ไม่ระบุ');
      const k = isYearMode ? String(r.sale_date).slice(0,7) : String(r.sale_date).slice(0,10);
      if (!byKeyFactory[k]) byKeyFactory[k] = {};
      byKeyFactory[k][fname] = (byKeyFactory[k][fname] || 0) + (Number(r.quantity_ton) || 0);
    });
    const allTrendKeys = Object.keys(byKeyFactory).sort();
    const trendLabels = isYearMode
      ? allTrendKeys.map(k => monthNameTH(Number(k.slice(5,7))).slice(0,3))
      : allTrendKeys.map(k => fmtDate(k));
    const trendDatasets = factories.map((fname, i) => ({
      label: fname,
      data: allTrendKeys.map(k => byKeyFactory[k][fname] || 0),
      borderColor: factoryLineColors[i % factoryLineColors.length],
      backgroundColor: factoryLineColors[i % factoryLineColors.length] + '22',
      borderWidth: 2,
      pointRadius: allTrendKeys.length > 25 ? 2 : 4,
      pointHoverRadius: 6,
      tension: 0.3,
      fill: false,
    }));
    const hasMoM = totalQtyPrev > 0 || Object.keys(byFactoryPrev).length > 0;
    const momColLabel = _salesRangeState.mode === 'day' ? 'วันก่อน' : _salesRangeState.mode === 'year' ? 'ปีก่อน' : 'เดือนก่อน';
    const mkMoM = (cur, prev) => {
      if (prev === 0) return `<span style="color:#475569">-</span>`;
      const d = cur - prev;
      const pct = prev ? (d/prev*100) : 0;
      const col = d > 0 ? '#34d399' : d < 0 ? '#f87171' : '#94a3b8';
      const arrow = d > 0 ? '↑' : d < 0 ? '↓' : '=';
      return `<span style="color:${col}" class="font-semibold">${arrow}${fmtNum(pct,1)}%</span><div class="text-xs" style="color:${col}">${d>=0?'+':''}${fmtNum(d,1)}</div>`;
    };
    tableEl.innerHTML = `
      <div class="grid grid-cols-2 gap-4">
        ${factories.map((fname, fi) => {
          const fColor = factoryLineColors[fi % factoryLineColors.length];
          const fTotal = byFactory[fname] || 0;
          const periodLabel = isYearMode ? 'รายเดือน' : 'รายวัน';
          return `<div class="dash-dark-card rounded-2xl p-4">
            <div class="flex items-center justify-between mb-1">
              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full" style="background:${fColor}"></span>
                <span class="text-sm font-semibold" style="color:${fColor}">${escapeHtml(fname)}</span>
              </div>
              <span class="text-xs dash-dark-text-muted font-medium">รวม ${fmtNum(fTotal,1)} ตัน</span>
            </div>
            <div class="text-xs dash-dark-text-muted mb-3">แนวโน้มยอดขาย${periodLabel} ${escapeHtml(fname)} (ตัน)</div>
            <div class="relative" style="height:160px"><canvas id="sales-ftrend-${fi}"></canvas></div>
          </div>`;
        }).join('')}
      </div>
      <div class="dash-dark-card rounded-2xl p-5 overflow-x-auto">
        <h3 class="text-sm font-medium dash-dark-text-muted mb-3">ยอดขาย — โรงงาน × ประเภทหิน (ตัน)</h3>
        <table class="w-full text-sm">
          <thead><tr class="text-left dash-dark-text-muted border-b dash-dark-border">
            <th class="py-2 pr-3">โรงงาน</th>
            ${allStoneTypes.map(st=>`<th class="py-2 pr-3 text-right">${escapeHtml(st)}</th>`).join('')}
            <th class="py-2 pr-3 text-right">รวม (ตัน)</th>
            ${hasPrice ? '<th class="py-2 pr-3 text-right">มูลค่า (บาท)</th>' : ''}
            ${hasMoM ? `<th class="py-2 pr-3 text-right text-xs" style="color:#38bdf8">MoM<div class="font-normal" style="color:#475569">${momColLabel}</div></th>` : ''}
          </tr></thead>
          <tbody>
            ${factories.map(f => {
              const fVal = rows.filter(r2 => (r2.factories?r2.factories.name:(r2.factory_code||''))=== f).reduce((s,r2)=>s+(Number(r2.total_value)||0),0);
              return `<tr class="border-b dash-dark-border dash-dark-row-hover dash-dark-text">
                <td class="py-2 pr-3 font-medium">${escapeHtml(f)}</td>
                ${allStoneTypes.map(st=>`<td class="py-2 pr-3 text-right">${byFactoryStone[f][st]?fmtNum(byFactoryStone[f][st],1):'-'}</td>`).join('')}
                <td class="py-2 pr-3 text-right font-semibold">${fmtNum(byFactory[f],1)}</td>
                ${hasPrice ? `<td class="py-2 pr-3 text-right">${fVal>0?fmtNum(fVal,0):'-'}</td>` : ''}
                ${hasMoM ? `<td class="py-2 pr-3 text-right">${mkMoM(byFactory[f]||0, byFactoryPrev[f]||0)}</td>` : ''}
              </tr>`;
            }).join('')}
            <tr class="dash-dark-text font-semibold" style="border-top:2px solid #1d3a5f">
              <td class="py-2 pr-3">รวม</td>
              ${allStoneTypes.map(st=>`<td class="py-2 pr-3 text-right">${fmtNum(byStoneType[st]||0,1)}</td>`).join('')}
              <td class="py-2 pr-3 text-right">${fmtNum(totalQty,1)}</td>
              ${hasPrice ? `<td class="py-2 pr-3 text-right">${fmtNum(totalValue,0)}</td>` : ''}
              ${hasMoM ? `<td class="py-2 pr-3 text-right">${mkMoM(totalQty, totalQtyPrev)}</td>` : ''}
            </tr>
          </tbody>
        </table>
      </div>`;
    refreshIcons();
    destroyChart('sales-trend');
    // สร้าง chart แยกของแต่ละโรงงาน
    factories.forEach((fname, fi) => {
      destroyChart(`sales-ftrend-${fi}`);
      const fColor = factoryLineColors[fi % factoryLineColors.length];
      const fData = allTrendKeys.map(k => (byKeyFactory[k] && byKeyFactory[k][fname]) || 0);
      chartRegistry[`sales-ftrend-${fi}`] = new Chart(document.getElementById(`sales-ftrend-${fi}`), {
        type: 'bar',
        data: {
          labels: trendLabels,
          datasets: [{ label: fname, data: fData, backgroundColor: fColor + 'aa', borderColor: fColor, borderWidth: 1, borderRadius: 3 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {

          },

            x: { ticks: { color: '#94a3b8', font: { size: 10 }, autoSkip: true, maxRotation: 35, maxTicksLimit: 12 }, grid: { display: false } }
          }
        },
        plugins: [barValueLabelsPlugin]
      });
    });

  } catch (err) {
    console.error(err);
    statsEl.innerHTML = [1,2,3,4].map(() => errorBlockDark()).join('');
    chartEl.innerHTML = monthlyChartEl.innerHTML = tableEl.innerHTML = '';
    refreshIcons();
  }
}

async function loadLoaderNames() {
  if (_loaderNamesCache) { populateLoaderNameSelect(); return; }
  try {

    if (error) throw error;

    _loaderNamesCache = [];
