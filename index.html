// custom Chart.js plugin: วาดตัวเลขชั่วโมงทำงาน (บนแท่ง) และค่าไฟรวม (บนจุดเส้น) สำหรับกราฟ "ชั่วโมงทำงาน เทียบ ค่าไฟรวม"
const loaderComboDataLabelsPlugin = {
  id: 'loaderComboDataLabelsPlugin',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    ctx.save();
    ctx.font = '600 10px Kanit, sans-serif';
    ctx.textAlign = 'center';
    chart.data.datasets.forEach((dataset, dsIndex) => {
      const meta = chart.getDatasetMeta(dsIndex);
      if (meta.hidden) return;
      meta.data.forEach((point, i) => {
        const val = Number(dataset.data[i]) || 0;
        if (!val) return;
        const pos = point.tooltipPosition ? point.tooltipPosition() : { x: point.x, y: point.y };
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 3;
        if (dataset.type === 'bar') {
          ctx.fillStyle = '#ffffff';
          ctx.textBaseline = 'bottom';
          ctx.fillText(fmtNum(val, 1), pos.x, pos.y - 4);
        } else {
          ctx.fillStyle = '#fde68a';
          ctx.textBaseline = 'bottom';
          ctx.fillText(fmtNum(val, 0), pos.x, pos.y - 8);
        }
        ctx.shadowBlur = 0;
      });
    });
    ctx.restore();
  }
};

async function loadLoaderData() {
  const statsEl = document.getElementById('loader-stat-cards');
  const ratioEl = document.getElementById('loader-ratio-block');
  const chartEl = document.getElementById('loader-chart-block');
  const cmpCostEl = document.getElementById('loader-cmp-cost-block');
  const cmpChargeEl = document.getElementById('loader-cmp-charge-block');
  const cmpWorkhourEl = document.getElementById('loader-cmp-workhour-block');
  const breakdownEl = document.getElementById('loader-breakdown-block');
  try {
    if (!_loaderRangeState._initialized) {
      const latest = await detectLatestDataMonth('electric_loader', 'work_date');
      applyLatestMonthToState(_loaderRangeState, 'loader', latest);
      _loaderRangeState._initialized = true;
    }
    const { from, to } = rangeToDates(_loaderRangeState);
    let query = db
      .from('electric_loader')
      .select('*')
      .eq('status', 'approved')
      .gte('work_date', from)
      .lte('work_date', to)
      .order('work_date', { ascending: true });
    if (_loaderDashState.loaderName !== 'all') query = query.eq('loader_name', _loaderDashState.loaderName);
    const { data, error } = await query;
    if (error) throw error;
    const rows = data || [];
    // คำนวณ Machine Hours จริงต่อ record: ใช้ machine_hour_stop - machine_hour_start เป็นหลัก
    // fallback ไปที่ machine_hour_total → total_work_hour ตามลำดับ
    const getMH = r => {
      if (r.machine_hour_start != null && r.machine_hour_stop != null)
        return Math.max(0, r.machine_hour_stop - r.machine_hour_start);
      if (r.machine_hour_total != null) return Number(r.machine_hour_total) || 0;
      return Number(r.total_work_hour) || 0;
    };

    const totalWorkHour = rows.reduce((s,r) => s + getMH(r), 0);
    const totalChargeMin = rows.reduce((s,r) => s + (Number(r.charge_minutes)||0), 0);
    const totalCost = rows.reduce((s,r) => s + (Number(r.electric_cost_baht)||0), 0);
    const loaders = new Set(rows.map(r => r.loader_name).filter(Boolean));

    const costPerHour = totalWorkHour > 0 ? totalCost / totalWorkHour : 0;

    statsEl.innerHTML = [
      statCard('timer','ชั่วโมงทำงานรวม', fmtNum(totalWorkHour,1), 'ชม.'),
      statCard('battery-charging','เวลาชาร์จรวม', fmtNum(totalChargeMin,0), 'นาที'),
      statCard('coins','ค่าไฟรวม', fmtNum(totalCost,0), 'บาท'),
      statCard('truck','จำนวนรถตัก', fmtNum(loaders.size,0), 'คัน'),
    ].join('');
    refreshIcons();

    ratioEl.innerHTML = `
      <div class="dash-dark-card rounded-2xl p-5 flex items-center justify-between">
        <span class="text-sm font-medium dash-dark-text-muted flex items-center gap-2"><i data-lucide="calculator" class="w-4 h-4 text-cyan-400"></i>ค่าไฟรวม / ชั่วโมงทำงานรวม</span>
        <span class="text-lg font-semibold text-amber-400">${fmtNum(costPerHour,2)} บาท/ชม.</span>
      </div>`;
    refreshIcons();

    if (!rows.length) {
      chartEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-8 text-center dash-dark-text-muted text-sm">ไม่มีข้อมูลรถตักไฟฟ้าในช่วงเวลานี้</div>`;
      cmpCostEl.innerHTML = ''; cmpChargeEl.innerHTML = ''; cmpWorkhourEl.innerHTML = '';
      breakdownEl.innerHTML = '';
      refreshIcons();
      return;
    }

    // กราฟ "ชั่วโมงทำงาน เทียบ ค่าไฟรวม" — รายวัน (month) หรือ รายเดือน (year)
    const isLoaderYearMode = _loaderRangeState && _loaderRangeState.mode === 'year';
    let loaderLabels, loaderWorkData, loaderCostData, loaderChartTitle;
    if (isLoaderYearMode) {
      loaderChartTitle = 'ชั่วโมงทำงาน เทียบ ค่าไฟรวม รายเดือน';
      const monthlyMap = {};
      rows.forEach(r => {
        const key = r.work_date ? String(r.work_date).slice(0, 7) : null;
        if (!key) return;
        if (!monthlyMap[key]) monthlyMap[key] = { workSum: 0, costSum: 0 };
        monthlyMap[key].workSum += getMH(r);
        monthlyMap[key].costSum += Number(r.electric_cost_baht) || 0;
      });
      const keys = Object.keys(monthlyMap).sort();
      loaderLabels = keys.map(k => { const [,m] = k.split('-'); return monthNameTH(Number(m)); });
      loaderWorkData = keys.map(k => Math.round(monthlyMap[k].workSum * 10) / 10);
      loaderCostData = keys.map(k => Math.round(monthlyMap[k].costSum));
    } else {
      loaderChartTitle = 'ชั่วโมงทำงาน เทียบ ค่าไฟรวม รายวัน';
      loaderLabels = rows.map(r => fmtDate(r.work_date));
      loaderWorkData = rows.map(r => Math.round(getMH(r) * 10) / 10);
      loaderCostData = rows.map(r => Number(r.electric_cost_baht) || 0);
    }
    const loaderSuffix = _loaderDashState.loaderName !== 'all' ? ' — ' + escapeHtml(_loaderDashState.loaderName) : '';
    chartEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">${loaderChartTitle}${loaderSuffix}</h3><div class="relative h-72"><canvas id="loader-canvas"></canvas></div></div>`;
    refreshIcons();
    const ctx = document.getElementById('loader-canvas');
    destroyChart('loader');
    chartRegistry['loader'] = new Chart(ctx, {
      data: {
        labels: loaderLabels,
        datasets: [
          { type: 'bar', label: 'ชั่วโมงทำงาน (ชม.)', data: loaderWorkData, backgroundColor: '#4ade80', yAxisID: 'y', borderRadius: 6 },
          { type: 'line', label: 'ค่าไฟรวม (บาท)', data: loaderCostData, borderColor: '#f59e0b', backgroundColor: '#f59e0b', pointBackgroundColor: '#f59e0b', pointRadius: 4, yAxisID: 'y1', tension: 0.3 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 22 } },
        plugins: { legend: { labels: { color: '#cbd5e1' } } },
        scales: {
          y: { type: 'linear', position: 'left', title: { display: true, text: 'ชม.', color: '#94a3b8' }, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' }, suggestedMax: Math.max(...loaderWorkData) * 1.2 || undefined },
          y1: { type: 'linear', position: 'right', title: { display: true, text: 'บาท', color: '#94a3b8' }, ticks: { color: '#94a3b8' }, grid: { drawOnChartArea: false }, suggestedMax: Math.max(...loaderCostData) * 1.3 || undefined },
          x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } },
        }
      },
      plugins: [loaderComboDataLabelsPlugin]
    });

    // 3 กราฟเปรียบเทียบระหว่างรถแต่ละคัน (group by loader_name): electric_cost_baht, charge_kw, total_work_hour
    const byLoaderCost = {};
    const byLoaderChargeKw = {};
    const byLoaderWorkHour = {};
    rows.forEach(r => {
      const name = r.loader_name || 'ไม่ระบุ';
      byLoaderCost[name] = (byLoaderCost[name] || 0) + (Number(r.electric_cost_baht)||0);
      byLoaderChargeKw[name] = (byLoaderChargeKw[name] || 0) + (Number(r.charge_kw)||0);
      byLoaderWorkHour[name] = (byLoaderWorkHour[name] || 0) + getMH(r);
    });
    const names = Object.keys(byLoaderWorkHour);

    cmpCostEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">ค่าไฟรวมต่อคัน (บาท)</h3><div class="relative h-56"><canvas id="loader-cmp-cost-canvas"></canvas></div></div>`;
    cmpChargeEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">พลังงานชาร์จรวมต่อคัน (kW)</h3><div class="relative h-56"><canvas id="loader-cmp-charge-canvas"></canvas></div></div>`;
    cmpWorkhourEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">ชั่วโมงทำงานรวมต่อคัน (ชม.)</h3><div class="relative h-56"><canvas id="loader-cmp-workhour-canvas"></canvas></div></div>`;
    refreshIcons();

    destroyChart('loader-cmp-cost');
    chartRegistry['loader-cmp-cost'] = new Chart(document.getElementById('loader-cmp-cost-canvas'), {
      type: 'bar',
      data: { labels: names, datasets: [{ label: 'บาท', data: names.map(n => byLoaderCost[n]), backgroundColor: '#FFD700', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, layout: { padding: { top: 18 } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } }, x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } } } },
      plugins: [barValueLabelsPlugin]
    });
    destroyChart('loader-cmp-charge');
    chartRegistry['loader-cmp-charge'] = new Chart(document.getElementById('loader-cmp-charge-canvas'), {
      type: 'bar',
      data: { labels: names, datasets: [{ label: 'kW', data: names.map(n => byLoaderChargeKw[n]), backgroundColor: '#00FFFF', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, layout: { padding: { top: 18 } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } }, x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } } } },
      plugins: [barValueLabelsPlugin]
    });
    destroyChart('loader-cmp-workhour');
    chartRegistry['loader-cmp-workhour'] = new Chart(document.getElementById('loader-cmp-workhour-canvas'), {
      type: 'bar',
      data: { labels: names, datasets: [{ label: 'ชม.', data: names.map(n => byLoaderWorkHour[n]), backgroundColor: '#39FF14', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, layout: { padding: { top: 18 } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } }, x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } } } },
      plugins: [barValueLabelsPlugin]
    });

    const breakdownRows = rows.filter(r => (r.breakdown_detail||'').trim());
    breakdownEl.innerHTML = `
      <div class="dash-dark-card rounded-2xl p-5 overflow-x-auto">
        <h3 class="text-sm font-medium dash-dark-text-muted mb-3">รายการเสีย/Breakdown</h3>
        ${breakdownRows.length ? `
        <table class="w-full text-sm">
          <thead><tr class="text-left dash-dark-text-muted border-b dash-dark-border">
            <th class="py-2 pr-3">วันที่</th><th class="py-2 pr-3">รถตัก</th><th class="py-2 pr-3">รายละเอียด</th>

          <tbody>
            ${breakdownRows.map(r => `

      </div>`;
    refreshIcons();
  } catch (err) {
    console.error(err);
    statsEl.innerHTML = [1,2,3,4].map(() => errorBlockDark()).join('');
    ratioEl.innerHTML = '';
    chartEl.innerHTML = '';
    cmpCostEl.innerHTML = ''; cmpChargeEl.innerHTML = ''; cmpWorkhourEl.innerHTML = '';
    breakdownEl.innerHTML = '';
    refreshIcons();
  }
}

    <div class="space-y-6 fade-in">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <h2 class="text-lg font-semibold dash-dark-text flex items-center gap-2"><i data-lucide="droplets" class="w-5 h-5 text-cyan-400"></i>น้ำบาดาล</h2>
        <div class="flex flex-wrap items-center gap-2">
          <select id="water-location-select" class="dash-dark-input rounded-xl px-3 py-1.5 text-xs">
            <option value="all">ทุกบ่อ</option>
          </select>
          ${rangeControlHtml('water', _waterRangeState)}
        </div>
      </div>
      <div id="water-stat-cards" class="grid grid-cols-2 sm:grid-cols-3 gap-4">${[1,2,3].map(skeletonCardDark).join('')}</div>
      <div id="water-chart-block">${skeletonBlockDark()}</div>
      <div id="water-quota-block">${skeletonBlockDark('h-40')}</div>
      <div id="water-table-block">${skeletonBlockDark('h-56')}</div>
    </div>
    </div>`;
  refreshIcons();
  attachRangeControlEvents('water', _waterRangeState, () => renderDashboardWater(container));
  document.getElementById('water-location-select').addEventListener('change', e => {
    _waterDashState.location = e.target.value;
    loadWaterData();
  });
  loadWaterLocations().then(loadWaterData);
}

async function loadWaterLocations() {
  if (_waterLocationsCache) { populateWaterLocationSelect(); return; }
  try {
    const { data, error } = await db.from('groundwater_usage').select('location');
    if (error) throw error;
    const normLoc = s => String(s || '').replace(/\(\s+/g, '(').replace(/\s+\)/g, ')').replace(/\s+/g, ' ').trim();
    const set = new Set((data || []).map(r => normLoc(r.location)).filter(Boolean));
    _waterLocationsCache = Array.from(set).sort();
  } catch (err) {
    console.error(err);
    _waterLocationsCache = [];
  }
  populateWaterLocationSelect();
}
function populateWaterLocationSelect() {
  const sel = document.getElementById('water-location-select');
  if (!sel) return;
  sel.innerHTML = `<option value="all">ทุกบ่อ</option>` + _waterLocationsCache.map(loc => `<option value="${escapeHtml(loc)}" ${loc===_waterDashState.location?'selected':''}>${escapeHtml(loc)}</option>`).join('');
}

async function loadWaterData() {
  const statsEl  = document.getElementById('water-stat-cards');
  const quotaEl  = document.getElementById('water-quota-block');
  const chartEl  = document.getElementById('water-chart-block');
  const tableEl  = document.getElementById('water-table-block');
  try {
    if (!_waterRangeState._initialized) {
      const latest = await detectLatestDataMonth('groundwater_usage', 'usage_date');
      applyLatestMonthToState(_waterRangeState, 'water', latest);
      _waterRangeState._initialized = true;
    }
    const { from, to } = rangeToDates(_waterRangeState);
    // ดึง groundwater_usage และ water_sources (เพื่อ monthly_limit_cum) พร้อมกัน
    const [{ data, error }, { data: srcData }] = await Promise.all([
      db.from('groundwater_usage').select('*').gte('usage_date', from).lte('usage_date', to).order('usage_date', { ascending: true }),
      db.from('water_sources').select('id,name,monthly_limit_cum').eq('status','active'),
    ]);
    if (error) throw error;
    // map: well name (normalized) → monthly_limit_cum
    const normLocKey = s => String(s||'').replace(/\(\s+/g,'(').replace(/\s+\)/g,')').replace(/\s+/g,' ').trim().toLowerCase();
    const limitByName = {};
    (srcData||[]).forEach(ws => { limitByName[normLocKey(ws.name)] = Number(ws.monthly_limit_cum)||0; });
    // คำนวณ multiplier ตาม range mode (month=1, year=12, day=1 ใช้ monthly เป็น reference)
    const monthCount = (() => {
      if (_waterRangeState.mode === 'year') return 12;
      if (_waterRangeState.mode === 'month') return 1;
      return 1; // day mode: ใช้ monthly limit เป็น reference
    })();

    const _normLocDash = s => String(s || '').replace(/\(\s+/g, '(').replace(/\s+\)/g, ')').replace(/\s+/g, ' ').trim();
    const rows = _waterDashState.location === 'all'
      ? (data || [])
      : (data || []).filter(r => _normLocDash(r.location) === _waterDashState.location);

    const totalUsage = rows.reduce((s,r) => s + (Number(r.usage_cum)||0), 0);
    const normLoc0 = s => String(s||'ไม่ระบุ').replace(/\(\s+/g,'(').replace(/\s+\)/g,')').replace(/\s+/g,' ').trim();
    const uniqueWells = new Set(rows.map(r => normLoc0(r.location)));
    const wellCount = uniqueWells.size;
    const avgPerWell = wellCount ? totalUsage / wellCount : 0;
    // บ่อที่ใช้น้ำมากสุด
    const byWell = {};
    rows.forEach(r => { const l = normLoc0(r.location); byWell[l] = (byWell[l]||0) + (Number(r.usage_cum)||0); });
    const topWell = Object.entries(byWell).sort((a,b) => b[1]-a[1])[0];

    statsEl.innerHTML = [
      statCard('droplets','ปริมาณใช้รวม', fmtNum(totalUsage,1), 'ลบ.ม.'),
      statCard('map-pin','จำนวนบ่อที่บันทึก', fmtNum(wellCount,0), 'บ่อ'),
      statCard('gauge','เฉลี่ยต่อบ่อ', fmtNum(avgPerWell,1), 'ลบ.ม./บ่อ'),
    ].join('');
    refreshIcons();

    // ── Quota block — ยอดใช้เทียบโควต้าแต่ละบ่อ ──
    if (quotaEl) {
      const wellEntries = Object.entries(byWell).sort((a,b) => b[1]-a[1]);
      const hasAnyLimit = wellEntries.some(([loc]) => limitByName[normLocKey(loc)] > 0);
      const periodLabel = _waterRangeState.mode==='year' ? '(รายปี)' : _waterRangeState.mode==='month' ? '(รายเดือน)' : '(อ้างอิงโควต้ารายเดือน)';
      quotaEl.innerHTML = `
        <div class="dash-dark-card rounded-2xl p-5">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-medium dash-dark-text-muted flex items-center gap-2"><i data-lucide="gauge" class="w-4 h-4 text-cyan-400"></i>ยอดใช้น้ำเทียบโควต้าแต่ละบ่อ ${periodLabel}</h3>
            ${!hasAnyLimit ? '<span class="text-xs text-amber-400">⚠ ยังไม่ได้กำหนดโควต้า — ตั้งค่าได้ที่เพิ่มแหล่งน้ำ</span>' : ''}
          </div>
          <div class="space-y-3">
            ${wellEntries.length ? wellEntries.map(([loc, used]) => {
              const monthlyLimit = limitByName[normLocKey(loc)] || 0;
              const periodLimit  = monthlyLimit * monthCount;
              const pct = periodLimit > 0 ? Math.min(used / periodLimit * 100, 100) : 0;
              const over = periodLimit > 0 && used > periodLimit;
              const barColor = pct >= 100 ? '#DC2626' : pct >= 80 ? '#F59E0B' : '#39FF14';
              const textColor = pct >= 100 ? 'text-red-400' : pct >= 80 ? 'text-amber-400' : 'text-emerald-400';
              return `
                <div>
                  <div class="flex justify-between items-center text-xs mb-1">
                    <span class="dash-dark-text font-medium">${escapeHtml(loc)}</span>
                    <span class="${textColor} font-semibold">
                      ${fmtNum(used,1)} / ${periodLimit>0?fmtNum(periodLimit,0)+' ลบ.ม.':'ไม่ได้กำหนด'}
                      ${periodLimit>0?` (${Math.round(pct)}%)${over?' <span style="color:#DC2626">⚠ เกินโควต้า</span>':''}`:''}
                    </span>
                  </div>
                  <div class="rounded-full overflow-hidden" style="background:rgba(255,255,255,0.1);height:10px">
                    <div class="rounded-full transition-all" style="background:${barColor};width:${Math.min(pct,100).toFixed(1)}%;height:10px"></div>
                  </div>
                  ${periodLimit>0 && monthCount===1 ? `<div class="text-xs mt-0.5" style="color:#64748b">โควต้า/เดือน: ${fmtNum(monthlyLimit,0)} ลบ.ม.</div>` : ''}
                </div>`;
            }).join('') : '<div class="text-sm dash-dark-text-muted text-center py-4">ไม่มีข้อมูลบ่อน้ำในช่วงนี้</div>'}
          </div>
        </div>`;
      refreshIcons();
    }

    if (!rows.length) {
      chartEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-8 text-center dash-dark-text-muted text-sm">ไม่มีข้อมูลการใช้น้ำในช่วงเวลานี้</div>`;
      tableEl.innerHTML = '';
      refreshIcons();
      return;
    }

    // normalize location name — ลบช่องว่างภายใน () และ collapse spaces
    const normLoc = s => String(s || 'ไม่ระบุ')
      .replace(/\(\s+/g, '(').replace(/\s+\)/g, ')')
      .replace(/\s+/g, ' ').trim();

    // กราฟเปรียบเทียบของแต่ละบ่อ (group by location) ตามเดือน — grouped bar
    const locations = Array.from(new Set(rows.map(r => normLoc(r.location)))).sort();
    const byLocMonth = {}; // { location: { 'YYYY-MM': total } }
    rows.forEach(r => {
      const loc = normLoc(r.location);
      const m = String(r.usage_date).slice(0,7);
      if (!byLocMonth[loc]) byLocMonth[loc] = {};
      byLocMonth[loc][m] = (byLocMonth[loc][m] || 0) + (Number(r.usage_cum)||0);
    });
    const monthKeys = Array.from(new Set(rows.map(r => String(r.usage_date).slice(0,7)))).sort();

    chartEl.innerHTML = `<div class="dash-dark-card rounded-2xl p-5"><h3 class="text-sm font-medium dash-dark-text-muted mb-3">เปรียบเทียบปริมาณการใช้น้ำของแต่ละบ่อ (ลบ.ม./เดือน)</h3><div class="relative h-72"><canvas id="water-canvas"></canvas></div></div>`;
    refreshIcons();
    const ctx = document.getElementById('water-canvas');
    destroyChart('water');
    chartRegistry['water'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: monthKeys.map(k => `${monthNameTH(Number(k.slice(5,7))).slice(0,3)} ${k.slice(0,4)}`),
        datasets: locations.map((loc, idx) => ({
          label: loc,
          data: monthKeys.map(k => (byLocMonth[loc] && byLocMonth[loc][k]) || 0),
          backgroundColor: CHART_COLORS[idx % CHART_COLORS.length],
          borderRadius: 6
        }))
      },
      options: { responsive: true, maintainAspectRatio: false, layout: { padding: { top: 18 } }, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 }, color: '#cbd5e1' } } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } }, x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.08)' } } } },
      plugins: [barValueLabelsPlugin]
    });

    // ตาราง pivot รายเดือน (แถว=เดือน, คอลัมน์=แต่ละบ่อ) + ลูกศรเทียบเดือนก่อน (เทียบยอดรวมทุกบ่อ)
    const pivot = {}; // { monthKey: { location: total, __total } }
    monthKeys.forEach(m => { pivot[m] = { __total: 0 }; locations.forEach(loc => pivot[m][loc] = 0); });
    rows.forEach(r => {
      const loc = normLoc(r.location);
      const m = String(r.usage_date).slice(0,7);
      pivot[m][loc] = (pivot[m][loc] || 0) + (Number(r.usage_cum)||0);
      pivot[m].__total += (Number(r.usage_cum)||0);
    });

    tableEl.innerHTML = `
      <div class="dash-dark-card rounded-2xl p-5 overflow-x-auto">
        <h3 class="text-sm font-medium dash-dark-text-muted mb-3">การใช้น้ำรายเดือน (Pivot ตามบ่อ)</h3>
        <table class="w-full text-sm">
          <thead><tr class="text-left dash-dark-text-muted border-b dash-dark-border">
            <th class="py-2 pr-3">เดือน</th>
            ${locations.map(loc => `<th class="py-2 pr-3">${escapeHtml(loc)}</th>`).join('')}
            <th class="py-2 pr-3">รวม (ลบ.ม.)</th>
            <th class="py-2 pr-3">เทียบเดือนก่อน</th>
          </tr></thead>
          <tbody>
            ${monthKeys.map((m, idx) => {
              const cur = pivot[m].__total;
              const prevKey = monthKeys[idx-1];
              const prev = prevKey ? pivot[prevKey].__total : null;
              let trendHtml = '<span class="dash-dark-text-muted">-</span>';
              if (prev !== null) {
                if (cur > prev) trendHtml = `<span class="text-emerald-400 inline-flex items-center gap-1"><i data-lucide="arrow-up" class="w-4 h-4"></i>${fmtNum(cur-prev,1)}</span>`;
                else if (cur < prev) trendHtml = `<span class="text-red-400 inline-flex items-center gap-1"><i data-lucide="arrow-down" class="w-4 h-4"></i>${fmtNum(prev-cur,1)}</span>`;
                else trendHtml = `<span class="dash-dark-text-muted">เท่าเดิม</span>`;
              }
              return `
              <tr class="border-b dash-dark-border dash-dark-row-hover dash-dark-text">
                <td class="py-2 pr-3 font-medium">${monthNameTH(Number(m.slice(5,7)))} ${m.slice(0,4)}</td>
                ${locations.map(loc => `<td class="py-2 pr-3">${fmtNum(pivot[m][loc],2)}</td>`).join('')}
                <td class="py-2 pr-3 font-semibold">${fmtNum(cur,2)}</td>
                <td class="py-2 pr-3">${trendHtml}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    refreshIcons();
  } catch (err) {
    console.error(err);
    statsEl.innerHTML = [1,2,3].map(() => errorBlockDark()).join('');
    chartEl.innerHTML = '';
    tableEl.innerHTML = '';
    refreshIcons();
  }
}

let _materialsCache = [];
let _materialsSearch = '';
let _materialsFactoryFilter = 'all';

function renderManageMaterials(container) {
  container.innerHTML = `
    <div class="space-y-4 fade-in">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <h2 class="text-lg font-semibold text-secondary-800 flex items-center gap-2"><i data-lucide="package" class="w-5 h-5 text-primary-600"></i>ประเภทวัสดุ</h2>
        <div class="flex items-center gap-2 flex-wrap">
          <button id="materials-add-btn" class="flex items-center gap-1.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium px-3 py-2 rounded-xl transition"><i data-lucide="plus" class="w-4 h-4"></i>เพิ่ม</button>
          <label class="flex items-center gap-1.5 bg-white border border-secondary-200 hover:bg-secondary-50 text-secondary-600 text-sm font-medium px-3 py-2 rounded-xl transition cursor-pointer" title="นำเข้าประเภทวัสดุจาก Excel/CSV — ถ้าชื่อ+โรงงานซ้ำ จะ update แทน">
            <i data-lucide="upload" class="w-4 h-4"></i>นำเข้า Excel/CSV

        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-4 flex flex-wrap gap-3 items-center">
        <input id="materials-search" type="text" value="${escapeHtml(_materialsSearch)}" placeholder="ค้นหาชื่อวัสดุ..." class="flex-1 min-w-[160px] sm:w-72 border border-secondary-200 rounded-xl px-3 py-2 text-sm">
        <select id="materials-factory-filter" class="border border-secondary-200 rounded-xl px-3 py-2 text-sm">
          <option value="all">ทุกโรงงาน</option>
        </select>
      </div>
      <div id="materials-table-block">${skeletonBlock('h-56')}</div>
    </div>`;

  searchInput.addEventListener('input', () => { _materialsSearch = searchInput.value; renderMaterialsTable(); });
  const factoryFilterSel = document.getElementById('materials-factory-filter');
  factoryFilterSel.addEventListener('change', () => { _materialsFactoryFilter = factoryFilterSel.value; renderMaterialsTable(); });
  loadMaterials();

async function loadMaterials() {
  const el = document.getElementById('materials-table-block');
  if (el) el.innerHTML = skeletonBlock('h-56');
  try {
    if (!_factoriesCache.length) {
      const { data: fData, error: fError } = await db.from('factories').select('*').order('name', { ascending: true });
      if (fError) throw fError;
      _factoriesCache = fData || [];
    }
    const { data, error } = await db.from('material_types').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    _materialsCache = data || [];
    renderMaterialsTable();
    populateMaterialsFactoryFilter();
  } catch (err) {
    console.error(err);
    if (el) el.innerHTML = errorBlock();
    refreshIcons();
  }
}

function populateMaterialsFactoryFilter() {
  const sel = document.getElementById('materials-factory-filter');
  if (!sel) return;
  sel.innerHTML = `<option value="all">ทุกโรงงาน</option>` + _factoriesCache.map(f => `<option value="${f.id}" ${_materialsFactoryFilter === f.id ? 'selected' : ''}>${escapeHtml(f.name)}</option>`).join('');
}

function renderMaterialsTable() {
  const el = document.getElementById('materials-table-block');
  if (!el) return;
  const kw = _materialsSearch.trim().toLowerCase();
  const rows = _materialsCache.filter(r => {
    if (kw && !(r.name || '').toLowerCase().includes(kw)) return false;
    if (_materialsFactoryFilter !== 'all' && r.factory_id !== _materialsFactoryFilter) return false;
    return true;
  });
  el.innerHTML = `
    <div class="bg-white rounded-2xl shadow-sm p-5 overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="text-left text-secondary-400 border-b border-secondary-100">
          <th class="py-2 pr-3">ลำดับ</th><th class="py-2 pr-3">ชื่อ</th><th class="py-2 pr-3">รายละเอียด</th><th class="py-2 pr-3">ถพ.</th><th class="py-2 pr-3">โรงงาน</th><th class="py-2 pr-3">สถานะ</th><th class="py-2 pr-3">จัดการ</th>
        </tr></thead>
        <tbody>
          ${rows.length ? rows.map((r,i) => `
            <tr class="border-b border-secondary-50 hover:bg-secondary-50">
              <td class="py-2 pr-3">${i+1}</td>
              <td class="py-2 pr-3 font-medium">${escapeHtml(r.name)}</td>
              <td class="py-2 pr-3 text-secondary-500">${escapeHtml(r.description || '-')}</td>
              <td class="py-2 pr-3">${r.bulk_density !== null && r.bulk_density !== undefined ? fmtNum(r.bulk_density, 2) : '-'}</td>
              <td class="py-2 pr-3 text-secondary-500">${escapeHtml((_factoriesCache.find(f => f.id === r.factory_id) || {}).name || '-')}</td>
              <td class="py-2 pr-3"><span class="px-2 py-0.5 rounded-full text-xs ${r.status==='active'?'bg-emerald-50 text-emerald-600':'bg-secondary-100 text-secondary-500'}">${escapeHtml(r.status)}</span></td>
              <td class="py-2 pr-3">
                <div class="flex items-center gap-1.5">
                  <button data-edit="${r.id}" class="p-1.5 rounded-lg hover:bg-secondary-100 text-secondary-500" title="แก้ไข"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                  <button data-del="${r.id}" class="p-1.5 rounded-lg hover:bg-red-50 text-red-500" title="ลบ"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
              </td>
            </tr>`).join('') : `<tr><td colspan="7" class="py-8 text-center text-secondary-400">ไม่พบข้อมูล</td></tr>`}
        </tbody>
      </table>
    </div>`;
  refreshIcons();
  qsa('[data-edit]', el).forEach(btn => btn.addEventListener('click', () => openMaterialForm(btn.getAttribute('data-edit'))));
  qsa('[data-del]', el).forEach(btn => btn.addEventListener('click', () => confirmDeleteMaterial(btn.getAttribute('data-del'))));
}

async function loadFactories() {
  const el = document.getElementById('factories-table-block');
  if (el) el.innerHTML = skeletonBlock('h-56');
  try {
    const { data, error } = await db.from('factories').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    _factoriesCache = data || [];
    _factoriesPage = 1;
    renderFactoriesTable();
  } catch (err) {
    console.error(err);
    if (el) el.innerHTML = errorBlock();
    refreshIcons();
  }

function renderFactoriesTable() {
  const el = document.getElementById('factories-table-block');
  if (!el) return;
  const kw = _factoriesSearch.trim().toLowerCase();
  const filtered = _factoriesCache.filter(r => !kw || (r.name || '').toLowerCase().includes(kw));
  const totalPages = Math.max(1, Math.ceil(filtered.length / FACTORIES_PAGE_SIZE));
  if (_factoriesPage > totalPages) _factoriesPage = totalPages;
  const startIdx = (_factoriesPage - 1) * FACTORIES_PAGE_SIZE;
  const pageRows = filtered.slice(startIdx, startIdx + FACTORIES_PAGE_SIZE);

  const pageButtons = [];
  for (let p = 1; p <= totalPages; p++) {
    pageButtons.push(`<button data-page="${p}" class="page-btn px-3 py-1.5 rounded-lg text-xs font-medium ${p === _factoriesPage ? 'bg-primary-600 text-white' : 'bg-white border border-secondary-200 text-secondary-600 hover:bg-secondary-50'}">${p}</button>`);
  }

  el.innerHTML = `
    <div class="bg-white rounded-2xl shadow-sm p-5 overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="text-left text-secondary-400 border-b border-secondary-100">
          <th class="py-2 pr-3">ลำดับ</th><th class="py-2 pr-3">ชื่อ</th><th class="py-2 pr-3">Target (ตัน/ชม.)</th><th class="py-2 pr-3">สถานะ</th><th class="py-2 pr-3">จัดการ</th>
        </tr></thead>
        <tbody>
          ${pageRows.length ? pageRows.map((r,i) => `
            <tr class="border-b border-secondary-50 hover:bg-secondary-50">
              <td class="py-2 pr-3">${startIdx + i + 1}</td>
              <td class="py-2 pr-3 font-medium">${escapeHtml(r.name)}</td>
              <td class="py-2 pr-3">${r.target_throughput ? `<span class="text-primary-600 font-medium">${fmtNum(r.target_throughput,1)}</span>` : '<span class="text-secondary-300">—</span>'}</td>
              <td class="py-2 pr-3"><span class="px-2 py-0.5 rounded-full text-xs ${r.status==='active'?'bg-emerald-50 text-emerald-600':'bg-secondary-100 text-secondary-500'}">${escapeHtml(r.status)}</span></td>
              <td class="py-2 pr-3">
                <div class="flex items-center gap-1.5">
                  <button data-edit="${r.id}" class="p-1.5 rounded-lg hover:bg-secondary-100 text-secondary-500" title="แก้ไข"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                  <button data-del="${r.id}" class="p-1.5 rounded-lg hover:bg-red-50 text-red-500" title="ลบ"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
              </td>
            </tr>`).join('') : `<tr><td colspan="4" class="py-8 text-center text-secondary-400">ไม่พบข้อมูล</td></tr>`}
        </tbody>
      </table>
      <div class="flex items-center justify-between mt-4 flex-wrap gap-2">
        <p class="text-xs text-secondary-400">ทั้งหมด ${filtered.length} รายการ</p>
        <div class="flex items-center gap-1.5">
          <button id="factories-prev-btn" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-white border border-secondary-200 text-secondary-600 hover:bg-secondary-50 disabled:opacity-40" ${_factoriesPage<=1?'disabled':''}>ก่อนหน้า</button>
          ${pageButtons.join('')}
          <button id="factories-next-btn" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-white border border-secondary-200 text-secondary-600 hover:bg-secondary-50 disabled:opacity-40" ${_factoriesPage>=totalPages?'disabled':''}>ถัดไป</button>
        </div>
      </div>
    </div>`;
  refreshIcons();
  qsa('[data-edit]', el).forEach(btn => btn.addEventListener('click', () => openFactoryForm(btn.getAttribute('data-edit'))));
  qsa('[data-del]', el).forEach(btn => btn.addEventListener('click', () => confirmDeleteFactory(btn.getAttribute('data-del'))));
  qsa('.page-btn', el).forEach(btn => btn.addEventListener('click', () => { _factoriesPage = Number(btn.getAttribute('data-page')); renderFactoriesTable(); }));
  const prevBtn = document.getElementById('factories-prev-btn');
  if (prevBtn) prevBtn.addEventListener('click', () => { if (_factoriesPage > 1) { _factoriesPage--; renderFactoriesTable(); } });
  const nextBtn = document.getElementById('factories-next-btn');
  if (nextBtn) nextBtn.addEventListener('click', () => { if (_factoriesPage < totalPages) { _factoriesPage++; renderFactoriesTable(); } });
}

function openFactoryForm(id) {

    } catch (err) {

async function loadManageWaterSources() {
  const el = document.getElementById('watersrc-table-block');
  if (el) el.innerHTML = skeletonBlock('h-56');
  try {
    if (!_factoriesCache.length) {
      const { data: fData, error: fError } = await db.from('factories').select('*').order('name', { ascending: true });
      if (fError) throw fError;
      _factoriesCache = fData || [];
    }
    const { data, error } = await db.from('water_sources').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    _mWaterSrcCache = data || [];
    renderManageWaterSourcesTable();

    console.error(err);
    if (el) el.innerHTML = errorBlock();
    refreshIcons();
  }
}

async function loadDroneStockFactoriesCache() {
  if (_mDroneFactories) return;
  try {
    const { data, error } = await db.from('factories').select('id, name').eq('status','active');
    if (error) throw error;
    _mDroneFactories = data || [];
  } catch (err) {
    console.error(err);
    _mDroneFactories = [];
  }
}

async function loadDroneStockMaterialsCache() {
  if (window._droneMaterialsCache) return;
  try {
    const { data, error } = await db.from('material_types').select('*').eq('status','active');
    if (error) throw error;
    window._droneMaterialsCache = data || [];
  } catch (err) {
    console.error(err);
    window._droneMaterialsCache = [];
  }
}

async function loadManageDroneStock() {
  const el = document.getElementById('drone-m-table-block');
  if (el) el.innerHTML = skeletonBlock('h-56');
  if (!_mDroneFilter._initialized) {
    _mDroneFilter._initialized = true;
    const { data: latest } = await db.from('drone_stock')
      .select('stock_year, stock_month')
      .order('stock_year', { ascending: false })
      .order('stock_month', { ascending: false })
      .limit(1);
    if (latest && latest.length) {
      _mDroneFilter.year = latest[0].stock_year;
      _mDroneFilter.month = latest[0].stock_month;
      const mSel = document.getElementById('drone-m-month');
      const ySel = document.getElementById('drone-m-year');
      if (mSel) mSel.value = _mDroneFilter.month;
      if (ySel) ySel.value = _mDroneFilter.year;
    }
  }
  try {
    let query = db.from('drone_stock').select('*, factories(name)').eq('stock_month', _mDroneFilter.month).eq('stock_year', _mDroneFilter.year);
    if (_mDroneFilter.factoryId !== 'all') query = query.eq('factory_id', _mDroneFilter.factoryId);
    const { data, error } = await query.order('created_at', { ascending: false });
    if (error) throw error;
    _mDroneCache = data || [];
    renderManageDroneStockTable();
  } catch (err) {
    console.error(err);
    if (el) el.innerHTML = errorBlock();
    refreshIcons();
  }
}

// helper: อ่านไฟล์ Excel (.xlsx/.xls) หรือ CSV แล้วคืน array of objects (ใช้ SheetJS)
// CSV: ลอง UTF-8 ก่อน ถ้ามี replacement char (ภาษาไทย Windows บันทึกเป็น TIS-620/windows-874) ให้ fallback อัตโนมัติ
async function readFileToJson(file) {
  const isCsv = file.name.toLowerCase().endsWith('.csv');
  if (isCsv) {
    const buffer = await file.arrayBuffer();
    let text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
    if (text.includes('�')) {
      try { text = new TextDecoder('windows-874').decode(buffer); } catch(_) {}
    }
    // raw:true ป้องกัน SheetJS แปลง "1/6/69" เป็น date object ก่อนส่งให้ normalizeDateStr
    const wb = XLSX.read(text, { type: 'string', raw: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(ws, { defval: '', raw: true });
  } else {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    // raw: false → ให้ SheetJS แปลง date serial เป็น string ตาม cell format เดิม (เช่น "1/5/69")
    return XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
  }
}

// แปลงรูปแบบวันที่หลายแบบให้เป็น YYYY-MM-DD (ค.ศ.)
// รองรับ: 2026-05-31 / 31/5/26 / 31/05/2026 / 2569-05-31 / 31/5/2569 / 31/5/69 (พ.ศ.)
// Logic แปลง พ.ศ. → ค.ศ.:
//   ปี 4 หลัก >= 2500  → ลบ 543  (เช่น 2569 → 2026)
//   ปี 2 หลัก >= 43   → +1957   (เช่น 69 = พ.ศ. 2569 → 2026)
//   ปี 2 หลัก < 43    → +2000   (เช่น 26 = ค.ศ. 2026)
function normalizeDateStr(str) {
  if (!str && str !== 0) return str;
  // Fallback: Excel date serial number (เลขทศนิยม เช่น 25208.000046296296)
  // กรณีนี้เกิดขึ้นเมื่อ SheetJS คืน raw serial แทน string — ใช้ raw:false แล้วปัญหานี้ไม่ควรเกิด
  // แต่เก็บ fallback ไว้กันกรณี edge case (แปลงตรงๆ ไม่ปรับปีไทย เพราะ serial สูญข้อมูล format ไปแล้ว)
  const numStr = String(str).trim();
  if (/^\d+(\.\d+)?$/.test(numStr)) {
    const serial = Number(numStr);
    if (serial > 20000 && serial < 100000) {
      const msec = (serial - 25569) * 86400 * 1000;
      const d = new Date(Math.round(msec));
      return d.toISOString().slice(0, 10);
    }
  }
  const s = String(str).trim();
  // YYYY-MM-DD (รวมกรณี พ.ศ. เช่น 2569-05-01)
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (iso) {
    let y = Number(iso[1]);
    if (y >= 2500) y -= 543;
    return `${y}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  }
  // DD/MM/YYYY หรือ D/M/YYYY (4-digit year, รวม พ.ศ.)
  const m4 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m4) {
    let y = Number(m4[3]);
    if (y >= 2500) y -= 543;
    return `${y}-${m4[2].padStart(2,'0')}-${m4[1].padStart(2,'0')}`;
  }
  // DD/MM/YY หรือ D/M/YY (2-digit year)
  const m2 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/);
  if (m2) {
    const yy = Number(m2[3]);
    const y = yy >= 43 ? yy + 1957 : yy + 2000;
    return `${y}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  }
  return s;
}

// คาดหวังหัวคอลัมน์ในไฟล์ Excel: factory_name (CDE/Propel/Sanon1/Sanon2), ชนิดหิน, ลบ.ม., ถพ., หน่วย, สถานะ, หมายเหตุ
// โดยจะ resolve factory_name -> factory_id ผ่าน cache _mDroneFactories ที่โหลดไว้แล้ว (รองรับชื่อทั้งแบบมี/ไม่มีเว้นวรรค)
async function importDroneStockExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = await readFileToJson(file);
    if (!json.length) { showToast('ไฟล์ไม่มีข้อมูล', 'warning'); return; }
    await loadDroneStockFactoriesCache();
    const notFound = [];
    const rows = json.map((row, i) => {
      // รองรับชื่อ column ทั้งภาษาไทยและอังกฤษ
      const fnameRaw = String(row['factory_name'] || row['โรงงาน'] || '').trim();
      const factory = findFactoryByName(_mDroneFactories, fnameRaw);
      if (fnameRaw && !factory) notFound.push(`แถว ${i+2}: "${fnameRaw}"`);
      const vol = Number(row['volume_cum'] !== '' ? row['volume_cum'] : null) || Number(row['ลบ.ม.']) || 0;
      const den = Number(row['bulk_density'] !== '' ? row['bulk_density'] : null) || Number(row['ถพ.']) || 0;
      const tonFromFile = Number(row['ton_amount'] !== '' ? row['ton_amount'] : null);
      const tonAmt = tonFromFile > 0 ? tonFromFile : (vol * den);
      const stockMonth = Number(row['stock_month']) || _mDroneFilter.month;
      const stockYear = Number(row['stock_year']) || _mDroneFilter.year;
      const unitVal = String(row['unit'] || row['หน่วย'] || '').trim() || 'ตัน';
      const statusVal = String(row['status'] || row['สถานะ'] || '').trim() || 'active';
      const noteVal = String(row['note'] !== undefined ? row['note'] : (row['หมายเหตุ'] || '')).trim() || null;
      return {
        stone_type: String(row['stone_type'] || row['ชนิดหิน'] || '').trim(),
        volume_cum: vol,
        bulk_density: den,
        ton_amount: tonAmt,
        factory_id: factory ? factory.id : null,
        factory_name: normalizeFactoryName(fnameRaw) || null,
        unit: unitVal,
        status: statusVal,
        note: noteVal,
        stock_month: stockMonth,
        stock_year: stockYear,
      };
    });
    if (notFound.length) {
      showToast(`ไม่พบโรงงานตามชื่อที่กรอก: ${notFound.join(', ')}`, 'error');
      return;
    }
    const { error } = await db.from('drone_stock').insert(rows);
    if (error) throw error;
    showToast(`นำเข้าข้อมูลสำเร็จ ${rows.length} รายการ`, 'success');
    e.target.value = '';
    loadManageDroneStock();
  } catch (err) {
    console.error(err);
    showToast('นำเข้าข้อมูลล้มเหลว: ' + (err.message || ''), 'error');
  }
}

const _mProdState = {}; // plantKey -> { rows, materialsCache, search, rawMaterialFilter, materialFilter, month, year, editingId, distinctRawMaterials, latestRow }
function getMProdState(plantKey) {
  if (!_mProdState[plantKey]) {
    _mProdState[plantKey] = {
      rows: [], materialsCache: null, search: '', rawMaterialFilter: 'all', materialFilter: 'all',
      month: new Date().getMonth()+1, year: new Date().getFullYear(), editingId: null,
      distinctRawMaterials: [], latestRow: null, _initialized: false, dailyStatusMap: {},
    };
  }
  return _mProdState[plantKey];
}

// โหลด raw_material แบบ distinct (self-referencing ตาราง production_* ของ plant นั้นเอง) และแถวล่าสุด
// (เพื่อ auto-fill ชม.เริ่ม/นาทีเริ่ม/มิเตอร์เริ่ม ของฟอร์ม "เพิ่ม" ใหม่)
async function loadProductionDistinctRawMaterialsAndLatest(plantKey) {
  const cfg = PRODUCTION_PLANT_CONFIG[plantKey];
  const st = getMProdState(plantKey);
  try {
    const { data, error } = await db.from(cfg.table).select('raw_material');
    if (error) throw error;
    const set = new Set();
    (data || []).forEach(r => { if (r.raw_material && String(r.raw_material).trim()) set.add(String(r.raw_material).trim()); });
    st.distinctRawMaterials = Array.from(set);
  } catch (err) {
    console.error(err);
    st.distinctRawMaterials = [];
  }
  try {
    const { data, error } = await db.from(cfg.table).select('*')
      .order('production_date', { ascending: false })
      .order('created_at', { ascending: false })
      .limit(1);
    if (error) throw error;
    st.latestRow = (data && data[0]) || null;
  } catch (err) {
    console.error(err);
    st.latestRow = null;
  }
}

async function loadProductionMaterialsCache() {
  // ใช้ cache กลางตัวเดียวสำหรับทุก plant (material_types ไม่ขึ้นกับ plant)
  if (window._prodMaterialsCache) {
    Object.values(_mProdState).forEach(s => { s.materialsCache = window._prodMaterialsCache; });
    return;
  }
  try {
    const { data, error } = await db.from('material_types').select('*').eq('status','active');
    if (error) throw error;
    window._prodMaterialsCache = data || [];
  } catch (err) {
    console.error(err);
    window._prodMaterialsCache = [];
  }
  Object.values(_mProdState).forEach(s => { s.materialsCache = window._prodMaterialsCache; });
}

async function loadProductionData(plantKey) {
  const cfg = PRODUCTION_PLANT_CONFIG[plantKey];
  const st = getMProdState(plantKey);
  ['table1','table2','table3'].forEach(t => {
    const el = document.getElementById(`mp-${plantKey}-${t}-block`);
    if (el) el.innerHTML = skeletonBlock('h-56');
  });
  if (!st._initialized) {
    st._initialized = true;
    const { data: latest } = await db.from(cfg.table)
      .select('production_date').order('production_date', { ascending: false }).limit(1);
    if (latest && latest.length) {
      const d = new Date(latest[0].production_date);
      st.month = d.getMonth() + 1;
      st.year = d.getFullYear();
      const mSel = document.getElementById(`mp-${plantKey}-month`);
      const ySel = document.getElementById(`mp-${plantKey}-year`);
      if (mSel) mSel.value = st.month;
      if (ySel) ySel.value = st.year;
    }
  }
  try {
    const from = `${st.year}-${pad2(st.month)}-01`;
    const lastDay = new Date(st.year, st.month, 0).getDate();
    const to = `${st.year}-${pad2(st.month)}-${pad2(lastDay)}`;
    const { data, error } = await db.from(cfg.table).select('*')
      .gte('production_date', from).lte('production_date', to)
      .order('production_date', { ascending: false });
    if (error) throw error;
    st.rows = data || [];
    // โหลด daily status สำหรับเดือนนี้
    try {
      const { data: sd } = await db.from('production_daily_status')
        .select('production_date,status,confirmed_by,confirmed_at')
        .eq('factory_code', PLANT_FACTORY_CODE[plantKey])
        .gte('production_date', from).lte('production_date', to);
      const sm = {}; (sd||[]).forEach(s => { sm[s.production_date] = s; });
      st.dailyStatusMap = sm;
    } catch(e) { st.dailyStatusMap = {}; }
    renderProductionTables(plantKey);
  } catch (err) {
    console.error(err);
    ['table1','table2','table3'].forEach(t => {
      const el = document.getElementById(`mp-${plantKey}-${t}-block`);
      if (el) el.innerHTML = errorBlock();
    });
    refreshIcons();
  }
}

function getFilteredProductionRows(plantKey) {
  const st = getMProdState(plantKey);
  const kw = st.search.trim().toLowerCase();
  return st.rows.filter(r => {
    if (kw && !(r.raw_material || '').toLowerCase().includes(kw)) return false;
    if (st.rawMaterialFilter !== 'all' && (r.raw_material || '') !== st.rawMaterialFilter) return false;
    // หมายเหตุ: production_* ไม่มี FK ไปยัง material_types — ใช้วิธี match แบบ substring
    // ระหว่างชื่อ material_types ที่เลือกกับข้อความ raw_material (best-effort, ไม่ใช่ FK จริง)
    if (st.materialFilter !== 'all' && !(r.raw_material || '').toLowerCase().includes(st.materialFilter.toLowerCase())) return false;
    return true;
  });
}

                <td class="py-1.5 pr-2">${fmtNum(r.feed_ton,1)}</td>
                ${cfg.productColumns.map(c => {
                  const val = Number(r[c.key]) || 0;
                  return `<td class="py-1.5 pr-2">${feed > 0 ? fmtNum((val/feed)*100,1) + '%' : '-'}</td>`;
                }).join('')}
              </tr>`;
            }).join('') : `<tr><td colspan="${3+cfg.productColumns.length}" class="py-8 text-center text-secondary-400">ไม่พบข้อมูล</td></tr>`}
          </tbody>
        </table>
      </div>`;
    refreshIcons();
  }

  // ตารางที่ 3: Breakdown
  const t3 = document.getElementById(`mp-${plantKey}-table3-block`);
  if (t3) {
    const bdRows = rows.filter(r => (r.breakdown_detail || '').trim());
    t3.innerHTML = `
      <div class="bg-white rounded-2xl shadow-sm p-5 overflow-x-auto">

          </tr></thead>
          <tbody>

}

function productionRowStatusForRole() {
  if (!currentUser) return 'pending';
  if (currentUser.role === 'admin') return 'approved';
  // ถ้า user มีสิทธิ์ approve-* ใดๆ → entry ที่สร้างจะ approved อัตโนมัติ
  const managePerms = getAllowedMenus(currentUser).manage;
  return managePerms.some(k => k.startsWith('approve-')) ? 'approved' : 'pending';
}

// =====================================================================
// IMPORT: material_types
// คอลัมน์ที่คาดหวังในไฟล์: name (required), description, bulk_density, factory_name, status
// ถ้า name+factory_id ซ้ำกับที่มีในระบบ → UPDATE, ถ้าไม่มี → INSERT
// =====================================================================
async function importMaterialTypesExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = await readFileToJson(file);
    if (!json.length) { showToast('ไฟล์ไม่มีข้อมูล', 'warning'); return; }

    // โหลด factories ถ้ายังไม่มี cache
    if (!_factoriesCache.length) {
      const { data: fData, error: fErr } = await db.from('factories').select('*').order('name', { ascending: true });
      if (fErr) throw fErr;
      _factoriesCache = fData || [];
    }

    // สร้าง map ชื่อโรงงาน → id (case-insensitive)
    const factoryNameMap = {};
    _factoriesCache.forEach(f => { factoryNameMap[f.name.trim().toLowerCase()] = f.id; });

    const rows = json.map(row => {
      const name = (row['name'] || '').toString().trim();
      if (!name) return null;
      const factoryNameRaw = (row['factory_name'] || '').toString().trim();
      const factory_id = factoryNameMap[factoryNameRaw.toLowerCase()] || null;
      return {
        name,
        description: (row['description'] || '').toString().trim() || null,
        bulk_density: row['bulk_density'] !== undefined && row['bulk_density'] !== '' ? Number(row['bulk_density']) : null,
        factory_id,
        status: (row['status'] || 'active').toString().trim() || 'active',
      };
    }).filter(r => r !== null);

    if (!rows.length) { showToast('ไม่พบแถวที่มีข้อมูล (ต้องมีคอลัมน์ name)', 'warning'); return; }

    // โหลด records เดิมจาก DB เพื่อ upsert
    const { data: existing, error: fetchErr } = await db.from('material_types').select('id, name, factory_id');
    if (fetchErr) throw fetchErr;

    // key = "name||factory_id" (factory_id อาจเป็น null → ใช้ string '__null__')
    const existMap = {};
    (existing || []).forEach(r => {
      const key = `${r.name.trim().toLowerCase()}||${r.factory_id || '__null__'}`;
      existMap[key] = r.id;
    });

    const toUpdate = [], toInsert = [];
    rows.forEach(row => {
      const key = `${row.name.trim().toLowerCase()}||${row.factory_id || '__null__'}`;
      if (existMap[key]) {
        toUpdate.push({ id: existMap[key], payload: row });
      } else {
        toInsert.push(row);
      }
    });

    for (const { id, payload } of toUpdate) {
      const { error } = await db.from('material_types').update(payload).eq('id', id);
      if (error) throw error;
    }
    if (toInsert.length) {
      const { error } = await db.from('material_types').insert(toInsert);
      if (error) throw error;
    }

    showToast(`นำเข้าสำเร็จ: อัปเดต ${toUpdate.length} รายการ, เพิ่มใหม่ ${toInsert.length} รายการ`, 'success');
    e.target.value = '';
    loadMaterials();
  } catch (err) {
    console.error(err);
    showToast('นำเข้าข้อมูลล้มเหลว: ' + (err.message || ''), 'error');
    e.target.value = '';
  }
}

// คาดหวังหัวคอลัมน์ในไฟล์ Excel ตรงกับชื่อ column จริงในตาราง production_* เช่น
// production_date, start_hour, start_minute, stop_hour, stop_minute, breakdown_detail, raw_material,
// feed_ton, note, และคอลัมน์ product เฉพาะของ plant นั้น (เช่น os_ton, stone_3_4_ton, ...)
// หมายเหตุ: runtime_hour, runtime_minute, avg_ton_per_hour เป็น generated column (คำนวณจาก start/stop time + feed_ton)
// ห้ามนำเข้าค่าตรงๆ ระบบจะคำนวณให้อัตโนมัติ
async function importProductionExcel(e, plantKey, finalMode = false) {
  const cfg = PRODUCTION_PLANT_CONFIG[plantKey];
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = await readFileToJson(file);
    if (!json.length) { showToast('ไฟล์ไม่มีข้อมูล', 'warning'); return; }
    const status = productionRowStatusForRole();
    const createdBy = currentUser ? currentUser.id : null;
    // flowmeter_total/flowmeter_result เป็น generated column — ไม่ใส่ใน payload
    const allowedKeys = ['production_date','start_hour','start_minute','stop_hour','stop_minute','breakdown_detail','raw_material','feed_ton','note',
      ...(cfg.hasFlowmeter ? ['meter_start','meter_stop'] : []),
    ].concat(cfg.productColumns.map(c => c.key));
    const integerImportKeys = new Set(['start_hour','start_minute','stop_hour','stop_minute']);
    const numericImportKeys = new Set([
      'feed_ton','meter_start','meter_stop',
      ...cfg.productColumns.map(c => c.key)
    ]);
    const rows = json.map(row => {
      const obj = { status, created_by: createdBy, is_final: finalMode };
      allowedKeys.forEach(k => {
        if (row[k] !== undefined) {
          if (k === 'production_date') obj[k] = normalizeDateStr(row[k]);
          else if (integerImportKeys.has(k)) obj[k] = (row[k] === '' || row[k] === null || row[k] === undefined) ? null : Math.round(Number(row[k]));
          else if (numericImportKeys.has(k)) obj[k] = numOrNull(row[k]);
          else obj[k] = row[k];
        }
      });
      return obj;
    }).filter(r => r.production_date); // กรองแถวที่ไม่มีวันที่ออก

    if (finalMode) {
      // Final import: ลบ row ซ้ำต่อวัน เก็บไว้แค่ 1 row แล้ว update ด้วยข้อมูลจาก CSV
      const dates = [...new Set(rows.map(r => r.production_date))];
      const { data: existing, error: fetchErr } = await db.from(cfg.table)
        .select('id, production_date, created_at')
        .in('production_date', dates)
        .order('created_at', { ascending: true });
      if (fetchErr) throw fetchErr;

      // จัดกลุ่มตามวัน → เก็บ id แรก (oldest) ไว้ update, ลบ id ที่เหลือ
      const keepMap = {};   // date -> id ที่จะ update
      const toDelete = [];  // id ที่ซ้ำ → ลบทิ้ง
      (existing || []).forEach(r => {
        if (!keepMap[r.production_date]) {
          keepMap[r.production_date] = r.id;
        } else {
          toDelete.push(r.id);
        }
      });

      // ลบ row ซ้ำก่อน
      if (toDelete.length) {
        const { error } = await db.from(cfg.table).delete().in('id', toDelete);
        if (error) throw error;
      }

      const toUpdate = [], toInsert = [];
      rows.forEach(row => {
        if (keepMap[row.production_date]) {
          toUpdate.push({ id: keepMap[row.production_date], payload: row });
        } else {
          toInsert.push(row);
        }
      });

      for (const { id, payload } of toUpdate) {
        const { error } = await db.from(cfg.table).update(payload).eq('id', id);
        if (error) throw error;
      }
      if (toInsert.length) {
        const { error } = await db.from(cfg.table).insert(toInsert);
        if (error) throw error;
      }
      showToast(`ยอดจริงสิ้นเดือน: อัปเดต ${toUpdate.length} วัน, เพิ่มใหม่ ${toInsert.length} วัน`, 'success');
      // Auto-confirm daily status สำหรับทุกวันที่นำเข้า
      if (currentUser) {
        const uniqueDates = [...new Set(rows.map(r => r.production_date))];
        const fc = PLANT_FACTORY_CODE[plantKey];
        const sp = uniqueDates.map(d => ({ factory_code:fc, production_date:d, status:'confirmed', confirmed_by:currentUser.id, confirmed_at:new Date().toISOString(), note:'อัตโนมัติ - นำเข้ายอดจริงสิ้นเดือน' }));
        try {
          await db.from('production_daily_status').upsert(sp, { onConflict:'factory_code,production_date' });
        } catch(e) { console.warn('auto-confirm:', e); }
      }
    } else {
      const { error } = await db.from(cfg.table).insert(rows);
      if (error) throw error;
      showToast(`นำเข้าข้อมูล (เบื้องต้น) สำเร็จ ${rows.length} รายการ`, 'success');
    }
    e.target.value = '';
    loadProductionData(plantKey);
    fetchPendingApprovalCount();
  } catch (err) {
    console.error(err);
    showToast('นำเข้าข้อมูลล้มเหลว: ' + (err.message || ''), 'error');
  }
}
// ยืนยันข้อมูลรายวัน (เปลี่ยนสถานะเป็น "ข้อมูลจริง")
async function confirmProductionDay(plantKey, date) {
  if (!currentUser || !['admin','manager','supervisor'].includes(currentUser.role)) {
    showToast('ไม่มีสิทธิ์ยืนยันข้อมูล', 'error'); return;
  }
  const fc = PLANT_FACTORY_CODE[plantKey];
  const cfg = PRODUCTION_PLANT_CONFIG[plantKey];
  try {
    // 1) Upsert production_daily_status → confirmed
    const { error: e1 } = await db.from('production_daily_status').upsert({
      factory_code: fc, production_date: date, status: 'confirmed',
      confirmed_by: currentUser.id, confirmed_at: new Date().toISOString(),
    }, { onConflict: 'factory_code,production_date' });
    if (e1) throw e1;
    // 2) อัปเดต is_final=true ในตารางผลผลิต
    const { error: e2 } = await db.from(cfg.table).update({ is_final: true }).eq('production_date', date);
    if (e2) throw e2;
    showToast(`✅ ยืนยันข้อมูลจริง — ${fmtDate(date)} สำเร็จ`, 'success');
    loadProductionData(plantKey);
  } catch(err) {
    console.error(err); showToast('ยืนยันไม่สำเร็จ: ' + (err.message||''), 'error');
  }
}

async function loadManageLoader() {
  const el = document.getElementById('loader-m-table-block');

  if (!_mLoaderFilter._initialized) {
    _mLoaderFilter._initialized = true;
    const { data: latest } = await db.from('electric_loader')
      .select('work_date').order('work_date', { ascending: false }).limit(1);
    if (latest && latest.length) {
      const d = new Date(latest[0].work_date);

    }
  }
  try {
    const from = `${_mLoaderFilter.year}-${pad2(_mLoaderFilter.month)}-01`;
    const lastDay = new Date(_mLoaderFilter.year, _mLoaderFilter.month, 0).getDate();
    const to = `${_mLoaderFilter.year}-${pad2(_mLoaderFilter.month)}-${pad2(lastDay)}`;

    console.error(err);

    if (bdEl) bdEl.innerHTML = '';

  }

            <input id="lf-cost" type="number" step="any" readonly value="${editing ? (editing.electric_cost_baht ?? '') : ''}" class="w-full border border-secondary-200 rounded-xl px-3 py-2 text-sm bg-secondary-50">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-secondary-500 mb-1">โรงงาน${isAdminOrAll ? '' : ' <span class="text-orange-500 text-xs">(ล็อกตามสิทธิ์)</span>'}</label>
          <select id="lf-factory" class="w-full border border-secondary-200 rounded-xl px-3 py-2 text-sm${isAdminOrAll ? '' : ' bg-secondary-50 text-secondary-500'}" ${isAdminOrAll ? '' : 'disabled'}>
            ${(_mLoaderFactories||[]).map(f => {
              const sel = editing ? editing.factory_id === f.id : (autoFactory ? autoFactory.id === f.id : false);

        </div>
        <div>
          <label class="block text-xs font-medium text-secondary-500 mb-1">หมายเหตุ</label>
          <textarea id="lf-note" rows="2" class="w-full border border-secondary-200 rounded-xl px-3 py-2 text-sm">${editing ? escapeHtml(editing.note || '') : ''}</textarea>

      </form>`,
  });

  const recomputeTime = () => {
    const startVal = document.getElementById('lf-start-time').value;
    const stopVal = document.getElementById('lf-stop-time').value;
    if (!startVal || !stopVal) return;
    const [sh, sm] = startVal.split(':').map(Number);
    const [eh, em] = stopVal.split(':').map(Number);
    let diffMin = (eh*60+em) - (sh*60+sm);
    if (diffMin < 0) diffMin += 24*60;
    const hh = Math.floor(diffMin/60), mm = diffMin%60;
    document.getElementById('lf-total-time').value = `${hh} ชม. ${mm} นาที`;
  };
  const recomputeCost = () => {
    const kw = Number(document.getElementById('lf-charge-kw').value) || 0;
    const rate = Number(document.getElementById('lf-rate').value) || 0;
    document.getElementById('lf-cost').value = (kw * rate) || '';
  };
  const recomputeMachineHour = () => {
    const s = parseFloat(document.getElementById('lf-mh-start').value);
    const e = parseFloat(document.getElementById('lf-mh-stop').value);
    const el = document.getElementById('lf-mh-total');
    if (!isNaN(s) && !isNaN(e) && e >= s) {
      el.value = fmtNum(e - s, 1) + ' ชม.';
    } else if (!isNaN(s) && !isNaN(e) && e < s) {
      el.value = 'ข้อมูลผิดพลาด (หยุด < เริ่ม)';
    } else {
      el.value = '';
    }
  };
  document.getElementById('lf-start-time').addEventListener('change', recomputeTime);
  document.getElementById('lf-stop-time').addEventListener('change', recomputeTime);
  document.getElementById('lf-charge-kw').addEventListener('input', recomputeCost);
  document.getElementById('lf-rate').addEventListener('input', recomputeCost);
  document.getElementById('lf-mh-start').addEventListener('input', recomputeMachineHour);
  document.getElementById('lf-mh-stop').addEventListener('input', recomputeMachineHour);

  const populateLoaderNameOptions = (factoryId, selectedName) => {
    const sel = document.getElementById('lf-name');
    if (!sel) return;
    const opts = (_mLoaderMachines || []).filter(m => m.factory_id === factoryId);
    sel.innerHTML = `<option value="">เลือกรถตัก...</option>` + opts.map(m => `<option value="${escapeHtml(m.name)}" data-id="${m.id}" ${m.name===selectedName?'selected':''}>${escapeHtml(m.name)}</option>`).join('');
    // ถ้ามีรถเพียง 1 คัน → auto-select แล้ว fetch HM อัตโนมัติ (เฉพาะ new form)
    if (!editing && opts.length === 1 && !selectedName) {
      sel.value = opts[0].name;
      fetchAndSetLastMH(opts[0].name);
    }
  };

  // ดึง Hour Meter ล่าสุดของรถที่เลือก (เฉพาะ new form)
  const fetchAndSetLastMH = async (loaderName) => {
    if (!loaderName || editing) return;
    try {
      const { data, error } = await db.from('electric_loader')
        .select('stop_hour, machine_hour_stop')
        .eq('loader_name', loaderName)
        .not('machine_hour_stop', 'is', null)
        .order('machine_hour_stop', { ascending: false })
        .limit(1);
      if (error) throw error;
      if (data && data.length) {
        const rec = data[0];
        if (rec.stop_hour != null) {
          const sh = Number(rec.stop_hour);
          const hh = Math.floor(sh), mm = Math.round((sh - hh) * 60);
          const startInput = document.getElementById('lf-start-time');
          if (startInput && !startInput.value) { startInput.value = `${pad2(hh)}:${pad2(mm)}`; recomputeTime(); }
        }
        const mhStartEl = document.getElementById('lf-mh-start');
        if (mhStartEl) { mhStartEl.value = rec.machine_hour_stop ?? ''; }
        // ไม่ auto-fill Offset — ผู้ใช้ตั้งเองเฉพาะเมื่อ PLC รีเซ็ตเท่านั้น
        recomputeMachineHour();
      } else {
        // ไม่เจอ record — ล้างค่า
        const mhStartEl = document.getElementById('lf-mh-start');
        if (mhStartEl) mhStartEl.value = '';
        recomputeMachineHour();
      }
    } catch (err) {
      console.error(err);
    }
  };

  loadLoaderMachinesCache().then(() => {
    const factorySel = document.getElementById('lf-factory');
    const curFactoryId = factorySel ? factorySel.value : null;
    populateLoaderNameOptions(curFactoryId, editing ? editing.loader_name : '');
    // auto-fetch MH สำหรับ new form เมื่อ loader ถูกเลือกอัตโนมัติ
    if (!editing) {
      const nameSel = document.getElementById('lf-name');
      if (nameSel && nameSel.value) fetchAndSetLastMH(nameSel.value);
    }
  });

  // เมื่อเปลี่ยนรถ → ดึง Hour Meter ล่าสุดของรถนั้น
  document.getElementById('lf-name').addEventListener('change', (e) => {
    fetchAndSetLastMH(e.target.value);
  });
  // เมื่อเปลี่ยนโรงงาน (admin) → reset loader list
  if (isAdminOrAll) {
    document.getElementById('lf-factory').addEventListener('change', (e) => {
      populateLoaderNameOptions(e.target.value, '');
    });
  }

  const form = document.getElementById('loader-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const startVal = document.getElementById('lf-start-time').value;
    const stopVal = document.getElementById('lf-stop-time').value;
    let startHour = null, stopHour = null, totalWorkHour = null;
    if (startVal) { const [sh, sm] = startVal.split(':').map(Number); startHour = sh + sm/60; }
    if (stopVal) { const [eh, em] = stopVal.split(':').map(Number); stopHour = eh + em/60; }
    if (startHour !== null && stopHour !== null) {
      totalWorkHour = stopHour - startHour;
      if (totalWorkHour < 0) totalWorkHour += 24;
    }
    const kw = Number(document.getElementById('lf-charge-kw').value) || 0;
    const rate = Number(document.getElementById('lf-rate').value) || 0;
    const lfFactoryId = document.getElementById('lf-factory').value || null;
    const lfFactoryObj = (_mLoaderFactories || []).find(f => f.id === lfFactoryId);
    const lfNameSel = document.getElementById('lf-name');
    const lfNameOpt = lfNameSel ? lfNameSel.options[lfNameSel.selectedIndex] : null;
    const lfMachineId = lfNameOpt ? (lfNameOpt.getAttribute('data-id') || null) : null;
    const payload = {
      work_date: document.getElementById('lf-date').value,
      loader_name: lfNameSel ? (lfNameSel.value.trim() || null) : null,
      machine_id: lfMachineId,
      start_time: startVal || null,
      stop_time: stopVal || null,
      total_work_time: document.getElementById('lf-total-time').value || null,
      start_hour: startHour,
      stop_hour: stopHour,
      total_work_hour: totalWorkHour,
      battery_start_pct: numOrNull(document.getElementById('lf-batt-start').value),
      battery_remaining_pct: numOrNull(document.getElementById('lf-batt-remain').value),
      charge_minutes: numOrNull(document.getElementById('lf-charge-min').value),
      charge_kw: kw,
      electric_rate: rate,
      electric_cost_baht: kw * rate,
      machine_hour_start: numOrNull(document.getElementById('lf-mh-start').value),
      machine_hour_stop: numOrNull(document.getElementById('lf-mh-stop').value),
      // machine_hour_total เป็น Generated Column ใน DB — ไม่ต้อง set
      hour_meter_offset: 0, // ไม่ใช้งานใน form นี้
      factory_id: lfFactoryId,
      factory_name: lfFactoryObj ? normalizeFactoryName(lfFactoryObj.name) : null,
      breakdown_detail: document.getElementById('lf-breakdown').value.trim() || null,
      note: document.getElementById('lf-note').value.trim() || null,
    };
    try {
      if (editing) {
        const { error } = await db.from('electric_loader').update(payload).eq('id', editing.id);
        if (error) throw error;
        showToast('แก้ไขข้อมูลสำเร็จ', 'success');
      } else {
        payload.status = productionRowStatusForRole();
        payload.created_by = currentUser ? currentUser.id : null;
        const { error } = await db.from('electric_loader').insert([payload]);
        if (error) throw error;
        showToast('เพิ่มข้อมูลสำเร็จ', 'success');
      }
      closeModal();
      loadManageLoader();
    } catch (err) {
      console.error(err);
      showToast('เกิดข้อผิดพลาด: ' + (err.message || ''), 'error');
    }
  });
}

// แปลง time string (H:MM:SS หรือ HH:MM:SS) → decimal hours (เช่น "6:30:00" → 6.5)
// ถ้าเป็นตัวเลขอยู่แล้วให้คืนค่าเดิม
function timeStrToDecimalHour(val) {
  if (val == null || val === '') return null;
  const s = String(val).trim();
  const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) return Number(m[1]) + Number(m[2]) / 60 + (m[3] ? Number(m[3]) / 3600 : 0);
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// คาดหวังหัวคอลัมน์ในไฟล์ CSV/Excel ของ electric_loader:
// factory_name, work_date, loader_name, start_hour, stop_hour,
// machine_hour_start, machine_hour_stop,
// battery_start_pct, battery_remaining_pct, charge_minutes, charge_kw, electric_rate, breakdown_detail, note
// หมายเหตุ: total_work_hour, machine_hour_total, electric_cost_baht คำนวณอัตโนมัติ (ไม่ต้องกรอก)
// start_hour/stop_hour รองรับทั้ง decimal (6.5) และ time string (6:30:00)
async function importLoaderExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = await readFileToJson(file);
    if (!json.length) { showToast('ไฟล์ไม่มีข้อมูล', 'warning'); return; }
    await loadLoaderFactoriesCache();
    const status = productionRowStatusForRole();
    const createdBy = currentUser ? currentUser.id : null;
    // ไม่รวม start_hour/stop_hour/total_work_hour/electric_cost_baht — จัดการแยกด้านล่าง
    // electric_cost_baht คำนวณอัตโนมัติ: charge_kw * electric_rate
    const allowedKeys = ['work_date','loader_name','start_time','stop_time','total_work_time','machine_hour_start','machine_hour_stop','hour_meter_offset','battery_start_pct','battery_remaining_pct','charge_minutes','charge_kw','electric_rate','breakdown_detail','note'];
    const notFound = [];
    const rows = json.map((row, i) => {
      const obj = { status, created_by: createdBy };
      const numericLoaderKeys = new Set(['machine_hour_start','machine_hour_stop','hour_meter_offset','battery_start_pct','battery_remaining_pct','charge_minutes','charge_kw','electric_rate']);
      allowedKeys.forEach(k => {
        if (row[k] === undefined) return;
        if (k === 'work_date') { obj[k] = normalizeDateStr(row[k]); return; }
        if (numericLoaderKeys.has(k)) {
          const v = row[k];
          obj[k] = (v === '' || v === null || v === undefined) ? null : (isNaN(Number(v)) ? null : Number(v));
          return;
        }
        obj[k] = row[k];
      });

      // start_hour / stop_hour — รองรับ time string ("6:30:00") และ decimal (6.5)
      const startRaw = String(row['start_hour'] !== undefined ? row['start_hour'] : '').trim();
      const stopRaw  = String(row['stop_hour']  !== undefined ? row['stop_hour']  : '').trim();
      const sh = timeStrToDecimalHour(startRaw);
      const eh = timeStrToDecimalHour(stopRaw);
      if (sh != null) {
        obj.start_hour = sh;
        // ถ้าเป็น time string → เก็บเป็น start_time ด้วย (ถ้ายังไม่มี)
        if (/^\d{1,2}:\d{2}/.test(startRaw) && !obj.start_time) obj.start_time = startRaw;
      }
      if (eh != null) {
        obj.stop_hour = eh;
        if (/^\d{1,2}:\d{2}/.test(stopRaw) && !obj.stop_time) obj.stop_time = stopRaw;
      }

      // machine_hour_total เป็น Generated Column ใน DB (คำนวณอัตโนมัติ) — ไม่ต้อง set

      // auto-คำนวณ electric_cost_baht = charge_kw * electric_rate
      if (obj.charge_kw != null && obj.electric_rate != null) {
        obj.electric_cost_baht = Math.round(obj.charge_kw * obj.electric_rate * 100) / 100;
      }

      // auto-คำนวณ total_work_hour จาก stop_hour - start_hour (รองรับกะข้ามคืน)
      if (sh != null && eh != null) {
        const diff = eh >= sh ? (eh - sh) : (24 + eh - sh);
        obj.total_work_hour = Math.round(diff * 10000) / 10000;
        if (!obj.total_work_time) {
          const hrs = Math.floor(diff);
          const mins = Math.round((diff - hrs) * 60);
          obj.total_work_time = `${hrs} ชม. ${mins} นาที`;
        }
      }
      const fnameRaw = String(row['factory_name'] || row['โรงงาน'] || '').trim();
      const factory = findFactoryByName(_mLoaderFactories, fnameRaw);
      if (fnameRaw && !factory) notFound.push(`แถว ${i+2}: "${fnameRaw}"`);
      obj.factory_id = factory ? factory.id : null;
      obj.factory_name = normalizeFactoryName(fnameRaw) || null;
      return obj;
    });
    if (notFound.length) {
      showToast(`ไม่พบโรงงานตามชื่อที่กรอก: ${notFound.join(', ')}`, 'error');
      return;
    }
    // ป้องกันซ้ำ: ลบ records เดิมในช่วงวันที่+loader เดียวกันก่อน insert
    const dates = [...new Set(rows.map(r => r.work_date).filter(Boolean))];
    const loaders = [...new Set(rows.map(r => r.loader_name).filter(Boolean))];
    const { error: delErr } = await db.from('electric_loader')
      .delete()
      .in('work_date', dates)
      .in('loader_name', loaders);
    if (delErr) throw delErr;
    const { error } = await db.from('electric_loader').insert(rows);
    if (error) throw error;
    showToast(`นำเข้าข้อมูลสำเร็จ ${rows.length} รายการ (แทนที่ข้อมูลเดิมอัตโนมัติ)`, 'success');
    e.target.value = '';
    loadManageLoader();
  } catch (err) {
    console.error(err);
    showToast('นำเข้าข้อมูลล้มเหลว: ' + (err.message || ''), 'error');
  }
}

// หมายเหตุ normalize: factories table เก็บชื่อ "Sanon 1"/"Sanon 2" (มีเว้นวรรค)
// แต่ sales.factory_code ต้องเป็น 'CDE'|'Propel'|'Sanon1'|'Sanon2' (ไม่มีเว้นวรรค) ตาม check constraint
// จึงต้อง strip ช่องว่างตอนแปลงชื่อโรงงาน -> factory_code
function factoryNameToCode(name) {
  const stripped = (name || '').replace(/\s+/g, '');
  if (['CDE','Propel','Sanon1','Sanon2'].includes(stripped)) return stripped;
  return null;
}

async function loadSalesFactoriesCache() {

async function loadManageSales() {
  const el = document.getElementById('sales-m-table-block');
  if (el) el.innerHTML = skeletonBlock('h-56');
  if (!_mSalesFilter._initialized) {
    _mSalesFilter._initialized = true;
    const { data: latest } = await db.from('sales')
      .select('sale_date').order('sale_date', { ascending: false }).limit(1);
    if (latest && latest.length) {
      const d = new Date(latest[0].sale_date);
      _mSalesFilter.month = d.getMonth() + 1;
      _mSalesFilter.year = d.getFullYear();
      const mSel = document.getElementById('sales-m-month');
      const ySel = document.getElementById('sales-m-year');
      if (mSel) mSel.value = _mSalesFilter.month;
      if (ySel) ySel.value = _mSalesFilter.year;
    }
  }
  try {
    const from = `${_mSalesFilter.year}-${pad2(_mSalesFilter.month)}-01`;
    const lastDay = new Date(_mSalesFilter.year, _mSalesFilter.month, 0).getDate();
    const to = `${_mSalesFilter.year}-${pad2(_mSalesFilter.month)}-${pad2(lastDay)}`;
    let query = db.from('sales').select('*, factories(name)').gte('sale_date', from).lte('sale_date', to);
    if (_mSalesFilter.factoryId !== 'all') query = query.eq('factory_id', _mSalesFilter.factoryId);
    const { data, error } = await query.order('sale_date', { ascending: false });
    if (error) throw error;
    _mSalesCache = data || [];
    renderManageSalesTable();
  } catch (err) {
    console.error(err);
    if (el) el.innerHTML = errorBlock();
    refreshIcons();
  }
}

// คาดหวังหัวคอลัมน์: factory_name, sale_date, stone_type, quantity_ton, price_per_ton, customer_name, note
async function importSalesExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = await readFileToJson(file);
    if (!json.length) { showToast('ไฟล์ไม่มีข้อมูล', 'warning'); return; }
    await loadSalesFactoriesCache();
    const createdBy = currentUser ? currentUser.id : null;
    const notFound = [];
    const rows = json.map((row, i) => {
      const fnameRaw = String(row['factory_name'] || row['โรงงาน'] || '').trim();
      const factory = findFactoryByName(_mSalesFactories, fnameRaw);
      if (fnameRaw && !factory) notFound.push(`แถว ${i+2}: "${fnameRaw}"`);
      const code = factory ? factoryNameToCode(factory.name) : normalizeFactoryName(fnameRaw);
      const saleDateVal = normalizeDateStr(row['sale_date'] || row['วันที่'] || '');
      const stoneTypeVal = String(row['stone_type'] || row['ชนิดหิน'] || '').trim() || null;
      const qtyVal = Number(row['quantity_ton'] !== '' ? row['quantity_ton'] : null) || Number(row['ปริมาณ(ตัน)']) || 0;
      const priceRaw = row['price_per_ton'] !== undefined ? row['price_per_ton'] : (row['ราคา(บาท/ตัน)'] !== undefined ? row['ราคา(บาท/ตัน)'] : '');
      const priceVal = priceRaw !== '' && priceRaw != null ? Number(priceRaw) || null : null;
      const customerVal = String(row['customer_name'] !== undefined ? row['customer_name'] : (row['ลูกค้า'] || '')).trim() || null;
      const noteVal = String(row['note'] !== '' ? row['note'] : (row['หมายเหตุ'] || '')).trim() || null;
      return {
        sale_date: saleDateVal,
        factory_id: factory ? factory.id : null,
        factory_code: code,
        factory_name: code,
        stone_type: stoneTypeVal,
        quantity_ton: qtyVal,
        price_per_ton: priceVal,
        customer_name: customerVal,
        note: noteVal,
        created_by: createdBy,
      };
    });
    if (notFound.length) {
      showToast(`ไม่พบโรงงานตามชื่อที่กรอก: ${notFound.join(', ')}`, 'error');
      return;
    }
    const { error } = await db.from('sales').insert(rows);
    if (error) throw error;
    showToast(`นำเข้าข้อมูลสำเร็จ ${rows.length} รายการ`, 'success');
    e.target.value = '';
    loadManageSales();
  } catch (err) {
    console.error(err);
    showToast('นำเข้าข้อมูลล้มเหลว: ' + (err.message || ''), 'error');
  }
}

async function loadWaterAvailableMonths() {
  if (_mWaterAvailableMonths) return;
  try {
    const { data, error } = await db.from('groundwater_usage').select('usage_date').order('usage_date', { ascending: false });
    if (error) throw error;
    const seen = new Set();
    const months = [];
    (data || []).forEach(r => {
      const key = String(r.usage_date).slice(0, 7);
      if (!seen.has(key)) {
        seen.add(key);
        const [y, m] = key.split('-');
        months.push({ year: Number(y), month: Number(m), key });
      }
    });
    _mWaterAvailableMonths = months;
  } catch(e) { _mWaterAvailableMonths = []; }
}

function populateWaterMonthSelect() {
  const sel = document.getElementById('water-m-ym');
  if (!sel || !_mWaterAvailableMonths) return;
  const months = _mWaterAvailableMonths;
  if (!months.length) {
    sel.innerHTML = '<option value="">ไม่มีข้อมูล</option>';
    return;
  }
  sel.innerHTML = months.map(({ year, month, key }) =>
    `<option value="${key}" ${key === _mWaterFilter.ym ? 'selected' : ''}>${monthNameTH(month)} ${year}</option>`
  ).join('');
  // auto-select latest if current ym not in list
  if (!_mWaterFilter.ym || !months.find(m => m.key === _mWaterFilter.ym)) {
    _mWaterFilter.ym = months[0].key;
    sel.value = _mWaterFilter.ym;
  }
}

  if (el) el.innerHTML = skeletonBlock('h-56');
  try {
    if (!_factoriesCache.length) {
      const { data: fData, error: fError } = await db.from('factories').select('*').order('name', { ascending: true });
      if (fError) throw fError;
      _factoriesCache = fData || [];
    }
    await loadWaterSourcesCacheForUsage();
